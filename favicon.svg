<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D3561"/>
      <stop offset="100%" stop-color="#1B2138"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <g transform="translate(235, 260) scale(1.45)">
    <!-- === BODY === profile facing right, tall and narrow like the coin -->
    <path d="M-20,-40 Q-40,30 -35,100 Q-30,130 10,135 Q40,130 50,100 Q55,30 35,-40 Z" fill="#C8A96E"/>

    <!-- === TAIL === extending down-left behind body -->
    <path d="M-35,90 L-70,155 L-55,155 L-25,100 Z" fill="#A8894E"/>
    <path d="M-30,95 L-60,160 L-45,160 L-20,105 Z" fill="#B89850"/>
    <path d="M-25,100 L-50,165 L-35,165 L-15,110 Z" fill="#A8894E"/>

    <!-- === WING === swept back, overlapping body left side -->
    <path d="M-15,-30 Q-55,20 -55,90 Q-45,100 -30,95 Q-35,40 -10,0 Z" fill="#A8894E"/>
    <!-- Wing feather lines -->
    <line x1="-40" y1="10" x2="-38" y2="85" stroke="#8A7040" stroke-width="1.5" opacity="0.5"/>
    <line x1="-30" y1="0" x2="-32" y2="88" stroke="#8A7040" stroke-width="1.5" opacity="0.5"/>
    <line x1="-22" y1="-10" x2="-26" y2="90" stroke="#8A7040" stroke-width="1.5" opacity="0.5"/>

    <!-- Breast stipple dots like the coin -->
    <circle cx="10" cy="10" r="2.5" fill="#B89850" opacity="0.6"/>
    <circle cx="20" cy="15" r="2.5" fill="#B89850" opacity="0.6"/>
    <circle cx="5" cy="25" r="2.5" fill="#B89850" opacity="0.6"/>
    <circle cx="15" cy="30" r="2.5" fill="#B89850" opacity="0.6"/>
    <circle cx="25" cy="25" r="2.5" fill="#B89850" opacity="0.6"/>
    <circle cx="10" cy="40" r="2.5" fill="#B89850" opacity="0.6"/>
    <circle cx="20" cy="45" r="2.5" fill="#B89850" opacity="0.6"/>
    <circle cx="30" cy="35" r="2.5" fill="#B89850" opacity="0.6"/>
    <circle cx="5" cy="55" r="2.5" fill="#B89850" opacity="0.5"/>
    <circle cx="15" cy="60" r="2.5" fill="#B89850" opacity="0.5"/>
    <circle cx="25" cy="55" r="2.5" fill="#B89850" opacity="0.5"/>
    <circle cx="10" cy="70" r="2.5" fill="#B89850" opacity="0.4"/>
    <circle cx="20" cy="75" r="2.5" fill="#B89850" opacity="0.4"/>

    <!-- === HEAD === large, facing viewer, flat on top like the coin -->
    <path d="M-50,-45 Q-55,-100 10,-110 Q75,-100 70,-45 Q60,-30 10,-25 Q-40,-30 -50,-45 Z" fill="#C8A96E"/>

    <!-- Flat stern brow ridge - very prominent like the coin -->
    <path d="M-48,-70 Q10,-95 68,-70 Q55,-60 10,-65 Q-35,-60 -48,-70 Z" fill="#B89850"/>

    <!-- === EYES === the dominant feature, huge and round -->
    <!-- Left eye socket -->
    <circle cx="-12" cy="-55" r="28" fill="#E8D8B8"/>
    <!-- Right eye socket -->
    <circle cx="32" cy="-55" r="28" fill="#E8D8B8"/>

    <!-- Left eye outer -->
    <circle cx="-12" cy="-55" r="23" fill="#1B2138"/>
    <!-- Right eye outer -->
    <circle cx="32" cy="-55" r="23" fill="#1B2138"/>

    <!-- Left iris -->
    <circle cx="-12" cy="-55" r="15" fill="#D4A020"/>
    <!-- Right iris -->
    <circle cx="32" cy="-55" r="15" fill="#D4A020"/>

    <!-- Left pupil -->
    <circle cx="-10" cy="-57" r="8" fill="#1B2138"/>
    <!-- Right pupil -->
    <circle cx="34" cy="-57" r="8" fill="#1B2138"/>

    <!-- Eye shine -->
    <circle cx="-15" cy="-61" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="29" cy="-61" r="3.5" fill="white" opacity="0.7"/>

    <!-- === BEAK === sharp downward triangle like the coin -->
    <path d="M5,-32 L10,-18 L15,-32 Z" fill="#E8A030"/>

    <!-- === TALONS === strong, gripping, like the coin -->
    <g transform="translate(0, 135)">
      <!-- Left foot -->
      <path d="M-8,0 Q-20,5 -28,15" stroke="#A8894E" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M-8,0 Q-12,8 -15,18" stroke="#A8894E" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M-8,0 Q0,8 5,15" stroke="#A8894E" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <!-- Right foot -->
      <path d="M25,0 Q15,5 8,15" stroke="#A8894E" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M25,0 Q22,8 20,18" stroke="#A8894E" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M25,0 Q33,8 40,15" stroke="#A8894E" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <!-- Talon tips -->
      <circle cx="-28" cy="15" r="2" fill="#8A7040"/>
      <circle cx="-15" cy="18" r="2" fill="#8A7040"/>
      <circle cx="5" cy="15" r="2" fill="#8A7040"/>
      <circle cx="8" cy="15" r="2" fill="#8A7040"/>
      <circle cx="20" cy="18" r="2" fill="#8A7040"/>
      <circle cx="40" cy="15" r="2" fill="#8A7040"/>
    </g>

    <!-- === OLIVE BRANCH === behind owl on the left, like the coin -->
    <g transform="translate(-75, -40)" opacity="0.7">
      <path d="M20,80 Q10,40 15,-20 Q18,-50 25,-80" stroke="#7A9A50" stroke-width="3" fill="none"/>
      <!-- Olive leaves -->
      <ellipse cx="8" cy="-40" rx="12" ry="5" fill="#7A9A50" transform="rotate(-30, 8, -40)"/>
      <ellipse cx="22" cy="-60" rx="12" ry="5" fill="#7A9A50" transform="rotate(20, 22, -60)"/>
      <ellipse cx="10" cy="-10" rx="11" ry="5" fill="#7A9A50" transform="rotate(-25, 10, -10)"/>
      <ellipse cx="22" cy="15" rx="11" ry="5" fill="#7A9A50" transform="rotate(15, 22, 15)"/>
      <ellipse cx="12" cy="45" rx="10" ry="4.5" fill="#7A9A50" transform="rotate(-20, 12, 45)"/>
    </g>
  </g>
</svg>
