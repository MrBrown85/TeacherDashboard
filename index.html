<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Teacher Dashboard</title>
<link rel="stylesheet" href="gb-styles.css?v=3">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>
<div class="page-layout" id="page-layout">
  <div style="display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden">
    <div id="dash-toolbar-mount"></div>
    <main class="page-main" id="main"></main>
  </div>
</div>
<script src="curriculum_data.js"></script>
<script src="vendor/supabase.min.js"></script>
<script src="gb-supabase.js"></script>
<script src="gb-constants.js"></script>
<script src="gb-data.js"></script>
<script src="gb-calc.js"></script>
<script src="gb-ui.js"></script>
<script src="gb-seed-data.js"></script>
<script>
requireAuth();
seedIfNeeded();
migrateAllStudents();
var activeCourse = getActiveCourse();
let showFlaggedOnly = false;
let sortMode = 'last-asc';
let searchQuery = '';
let _dashSearchTimer = null;
function dashSearchInput(el) {
  const val = el.value.toLowerCase();
  const pos = el.selectionStart;
  clearTimeout(_dashSearchTimer);
  _dashSearchTimer = setTimeout(() => {
    searchQuery = val;
    render();
    requestAnimationFrame(() => {
      const inp = document.querySelector('.dash-search-input');
      if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
    });
  }, 150);
}

// Class Manager state
let classManagerOpen = false;
let cmSelectedCourse = null;
let cmMode = 'edit';

// Curriculum Wizard state
let cwStep = 1;
let cwSelectedGrade = null;
let cwSelectedSubject = null;
let cwSelectedTags = [];  // array of short_tags
let cwCurriculumLoaded = false;
let cwLoadError = false;

const trendIcon = {
  up:   '<span style="color:var(--score-3);font-size:0.85rem">&#x2191;</span>',
  down: '<span style="color:var(--score-1);font-size:0.85rem">&#x2193;</span>',
  flat: '<span style="color:var(--text-3);font-size:0.85rem">&#x2192;</span>'
};

async function switchCourse(cid) {
  activeCourse = cid;
  setActiveCourse(cid);
  await initData(cid);
  render();
}

function render() {
  if (classManagerOpen) { renderClassManager(); return; }
  // If active course is archived, switch to first non-archived
  if (activeCourse && getCourseConfig(activeCourse).archived) {
    const nonArchived = Object.keys(COURSES).find(c => !getCourseConfig(c).archived);
    if (nonArchived) { activeCourse = nonArchived; setActiveCourse(nonArchived); }
  }
  const cid = activeCourse;
  const sections = getSections(cid);
  let students = getStudents(cid);
  const flags = getFlags(cid);
  const assessments = getAssessments(cid);
  const allScores = getScores(cid);

  // Sort
  switch (sortMode) {
    case 'last-asc':
      students = sortStudents(students, 'lastName');
      break;
    case 'last-desc':
      students = sortStudents(students, 'lastName').reverse();
      break;
    case 'first-asc':
      students = sortStudents(students, 'firstName');
      break;
    case 'first-desc':
      students = sortStudents(students, 'firstName').reverse();
      break;
    case 'overall-desc':
      students.sort((a, b) => getOverallProficiency(cid, b.id) - getOverallProficiency(cid, a.id));
      break;
    case 'overall-asc':
      students.sort((a, b) => {
        const pa = getOverallProficiency(cid, a.id);
        const pb = getOverallProficiency(cid, b.id);
        if (pa === 0 && pb === 0) return 0;
        if (pa === 0) return 1;
        if (pb === 0) return -1;
        return pa - pb;
      });
      break;
    case 'flagged':
      students.sort((a, b) => {
        const fa = flags[a.id] ? 0 : 1;
        const fb = flags[b.id] ? 0 : 1;
        if (fa !== fb) return fa - fb;
        return (a.lastName||'').localeCompare(b.lastName||'') || (a.firstName||'').localeCompare(b.firstName||'');
      });
      break;
  }

  // Search filter
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    students = students.filter(s => {
      return displayName(s).toLowerCase().includes(q) ||
        (s.firstName||'').toLowerCase().includes(q) ||
        (s.lastName||'').toLowerCase().includes(q) ||
        (s.studentNumber||'').toLowerCase().includes(q);
    });
  }

  if (showFlaggedOnly) {
    students = students.filter(s => flags[s.id]);
  }

  const flagCount = Object.keys(flags).length;
  const allStudents = getStudents(cid);

  /* ── Compute class-level data ─────────────────────────────── */
  const overallVals = allStudents.map(s => getOverallProficiency(cid, s.id)).filter(v => v > 0);
  const classAvg = overallVals.length > 0 ? overallVals.reduce((a, b) => a + b, 0) / overallVals.length : 0;
  const classR = Math.round(classAvg);

  const coverageVals = allStudents.map(s => getCompletionPct(cid, s.id));
  const classCoverage = coverageVals.length > 0 ? Math.round(coverageVals.reduce((a, b) => a + b, 0) / coverageVals.length) : 0;

  // Section-level class averages
  const sectionClassAvgs = sections.map(sec => {
    const vals = allStudents.map(s => getSectionProficiency(cid, s.id, sec.id)).filter(v => v > 0);
    const avg = vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
    return { section: sec, avg, count: vals.length };
  });

  // Tag coverage: how many tags have at least some evidence across the class?
  const allTags = getAllTags(cid);
  let tagsWithEvidence = 0;
  const tagCoverageMap = {};
  allTags.forEach(tag => {
    const hasEvidence = allStudents.some(s => {
      const scores = getTagScores(cid, s.id, tag.id);
      return scores.some(sc => sc.type === 'summative' && sc.score > 0);
    });
    tagCoverageMap[tag.id] = hasEvidence;
    if (hasEvidence) tagsWithEvidence++;
  });
  const tagCoveragePct = allTags.length > 0 ? Math.round((tagsWithEvidence / allTags.length) * 100) : 0;

  // Core competency coverage
  const assessedCCs = new Set();
  assessments.forEach(a => {
    (a.coreCompetencyIds || []).forEach(ccId => assessedCCs.add(ccId));
  });
  const ccCounts = {};
  const ccAssessments = {};
  assessments.forEach(a => {
    (a.coreCompetencyIds || []).forEach(ccId => {
      ccCounts[ccId] = (ccCounts[ccId] || 0) + 1;
      if (!ccAssessments[ccId]) ccAssessments[ccId] = [];
      ccAssessments[ccId].push(a.title || 'Untitled');
    });
  });

  // Recent observations
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  const weekAgoStr = weekAgo.toISOString().slice(0, 10);
  let recentObsCount = 0;
  allStudents.forEach(s => {
    const obs = getStudentQuickObs(cid, s.id);
    recentObsCount += obs.filter(o => o.date >= weekAgoStr).length;
  });

  // Action items
  const actionItems = [];

  // Tags with no evidence at all
  const uncoveredTags = allTags.filter(t => !tagCoverageMap[t.id]);
  if (uncoveredTags.length > 0) {
    const secNames = [...new Set(uncoveredTags.map(t => {
      const sec = getSectionForTag(cid, t.id);
      return sec ? (sec.shortName || sec.name) : '';
    }).filter(Boolean))];
    actionItems.push({ icon: '📋', text: `${uncoveredTags.length} learning standard${uncoveredTags.length !== 1 ? 's' : ''} not yet assessed (${secNames.join(', ')})`, link: 'settings.html?course=' + cid, linkText: 'Plan' });
  }

  // CCs not yet covered
  const uncoveredCCs = CORE_COMPETENCIES.filter(cc => !assessedCCs.has(cc.id));
  if (uncoveredCCs.length > 0) {
    actionItems.push({ icon: '🎯', text: `${uncoveredCCs.length} core competenc${uncoveredCCs.length !== 1 ? 'ies' : 'y'} not yet tagged: ${uncoveredCCs.map(cc => cc.label).join(', ')}`, link: 'settings.html?course=' + cid, linkText: 'Tag' });
  }

  // Students with low coverage
  const lowCoverageStudents = allStudents.filter(s => getCompletionPct(cid, s.id) < 50);
  if (lowCoverageStudents.length > 0) {
    actionItems.push({ icon: '⚠️', text: `${lowCoverageStudents.length} student${lowCoverageStudents.length !== 1 ? 's' : ''} below 50% evidence coverage`, link: '', linkText: '' });
  }

  // Observations prompt
  if (recentObsCount === 0) {
    actionItems.push({ icon: '📝', text: 'No observations recorded this week', link: 'observations.html', linkText: 'Observe' });
  }

  // Students without any observations
  const unobservedStudents = allStudents.filter(s => getStudentQuickObs(cid, s.id).length === 0);
  if (unobservedStudents.length > 0) {
    actionItems.push({ icon: '👤', text: `${unobservedStudents.length} student${unobservedStudents.length !== 1 ? 's have' : ' has'} no observations yet`, link: 'observations.html', linkText: 'Observe' });
  }

  let html = '';

  /* ── Toolbar (rendered to separate mount) ──────────────── */
  const courseOptions = Object.keys(COURSES).filter(cid => !getCourseConfig(cid).archived).map(cid =>
    `<option value="${cid}"${cid === activeCourse ? ' selected' : ''}>${esc(COURSES[cid].name)}</option>`
  ).join('');
  document.getElementById('dash-toolbar-mount').innerHTML = `<div class="dash-toolbar">
    <select class="dash-course-select" onchange="switchCourse(this.value)" aria-label="Select course">${courseOptions}</select>
    <button class="dash-add-btn" data-action="openClassManager">Class Management</button>
    <div class="dash-search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input class="dash-search-input" type="text" placeholder="Search students…" value="${esc(searchQuery)}" oninput="dashSearchInput(this)" aria-label="Search students">
    </div>
    <select class="dash-sort-select" onchange="sortMode=this.value;render()" aria-label="Sort students">
      <option value="last-asc"${sortMode === 'last-asc' ? ' selected' : ''}>Last Name A→Z</option>
      <option value="last-desc"${sortMode === 'last-desc' ? ' selected' : ''}>Last Name Z→A</option>
      <option value="first-asc"${sortMode === 'first-asc' ? ' selected' : ''}>First Name A→Z</option>
      <option value="first-desc"${sortMode === 'first-desc' ? ' selected' : ''}>First Name Z→A</option>
      <option value="overall-desc"${sortMode === 'overall-desc' ? ' selected' : ''}>Overall High→Low</option>
      <option value="overall-asc"${sortMode === 'overall-asc' ? ' selected' : ''}>Overall Low→High</option>
      <option value="flagged"${sortMode === 'flagged' ? ' selected' : ''}>Flagged First</option>
    </select>
    <button class="dash-filter-chip${showFlaggedOnly ? ' active' : ''}" data-action="toggleFlaggedFilter" aria-pressed="${showFlaggedOnly}" aria-label="Show flagged students only${flagCount > 0 ? ', '+flagCount+' flagged' : ''}">⚑ Flagged${flagCount > 0 ? ' (' + flagCount + ')' : ''}</button>
    <div class="dash-toolbar-spacer"></div>
    <span class="dash-toolbar-label">${students.length} student${students.length !== 1 ? 's' : ''}</span>
  </div>`;

  // CSV input moved to Class Manager

  /* ── Overview Panel ─────────────────────────────────────── */
  html += `<div class="dash-section">`;
  html += `<div class="dash-overview">`;

  // COLUMN 1: Learning Outcomes — section-level bars + tag coverage
  html += `<div class="dash-overview-section">
    <div class="dash-section-title">Learning Outcomes
      <a href="spreadsheet.html?course=${cid}">View Gradebook →</a>
    </div>`;

  // Quick stats row
  html += `<div class="dash-quick-stats">
    <div class="dash-mini-stat">
      <div class="dash-mini-stat-val" style="color:${classAvg > 0 ? PROF_COLORS[classR] : 'var(--text-3)'}">${classAvg > 0 ? classAvg.toFixed(1) : '—'}</div>
      <div class="dash-mini-stat-label">Class Avg</div>
    </div>
    <div class="dash-mini-stat">
      <div class="dash-mini-stat-val" style="color:${tagCoveragePct >= 75 ? 'var(--score-3)' : tagCoveragePct >= 50 ? 'var(--score-2)' : 'var(--score-1)'}">${tagCoveragePct}%</div>
      <div class="dash-mini-stat-label">Standards Covered</div>
    </div>
    <div class="dash-mini-stat">
      <div class="dash-mini-stat-val">${assessments.length}</div>
      <div class="dash-mini-stat-label">Assessments</div>
    </div>
  </div>`;

  // Section bars
  sectionClassAvgs.forEach(({ section: sec, avg, count }) => {
    const r = Math.round(avg);
    const pct = avg > 0 ? (avg / 4 * 100) : 0;
    const color = avg > 0 ? PROF_COLORS[r] : 'var(--text-3)';
    const rawColor = avg > 0 ? (r === 1 ? '#d32f2f' : r === 2 ? '#c07a00' : r === 3 ? '#2e7d32' : r === 4 ? '#1565c0' : '#bbb') : '#ddd';
    html += `<div class="dash-outcome-row">
      <span class="dash-outcome-label" style="color:${sec.color}">${esc(sec.shortName || sec.name)}</span>
      <div class="dash-outcome-bar-track">
        <div class="dash-outcome-bar-fill" style="width:${pct}%;background:${rawColor}"></div>
      </div>
      <span class="dash-outcome-val" style="color:${color}">${avg > 0 ? avg.toFixed(1) : '—'}</span>
    </div>`;
  });

  // Tag coverage pips
  html += `<div style="margin-top:10px">
    <div style="font-family:'SF Mono', ui-monospace, 'Menlo', monospace;font-size:0.52rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-3);margin-bottom:4px">${tagsWithEvidence} of ${allTags.length} standards assessed</div>
    <div class="dash-tag-grid">`;
  sections.forEach(sec => {
    sec.tags.forEach(tag => {
      const hasEv = tagCoverageMap[tag.id];
      const bg = hasEv ? sec.color : 'rgba(0,0,0,0.06)';
      html += `<div class="dash-tag-pip" title="${esc(tag.text || tag.label)}${hasEv ? '' : ' — not yet assessed'}" style="background:${bg}"></div>`;
    });
  });
  html += `</div></div>`;
  html += `</div>`;

  // COLUMN 2: Core Competencies + Observations
  html += `<div class="dash-overview-section">
    <div class="dash-section-title">Core Competencies</div>`;

  html += `<div class="dash-cc-grid">`;
  CORE_COMPETENCIES.forEach(cc => {
    const assessed = assessedCCs.has(cc.id);
    const count = ccCounts[cc.id] || 0;
    const aNames = (ccAssessments[cc.id] || []).map(n => `<div class="dist-tip-name">${esc(n)}</div>`).join('');
    html += `<div class="dash-cc-pill" style="${!assessed ? 'opacity:0.4' : ''}">
      <div class="dash-cc-dot" style="background:${assessed ? cc.color : 'var(--border)'}"></div>
      ${esc(cc.label)}
      ${count > 0 ? `<span class="dash-cc-count">${count}</span>` : ''}
      ${count > 0 ? `<div class="dist-tip"><div class="dist-tip-title">${esc(cc.label)}</div>${aNames}</div>` : ''}
    </div>`;
  });
  html += `</div>`;

  html += `<div style="margin-top:14px">
    <div class="dash-section-title">Observations
      <a href="observations.html">Record →</a>
    </div>
    <div class="dash-quick-stats">
      <div class="dash-mini-stat">
        <div class="dash-mini-stat-val" style="color:var(--active)">${recentObsCount}</div>
        <div class="dash-mini-stat-label">This Week</div>
      </div>
      <div class="dash-mini-stat">
        <div class="dash-mini-stat-val" style="color:${flagCount > 0 ? 'var(--priority)' : 'var(--text-3)'}">${flagCount}</div>
        <div class="dash-mini-stat-label">Flagged</div>
      </div>
      <div class="dash-mini-stat">
        <div class="dash-mini-stat-val">${allStudents.length}</div>
        <div class="dash-mini-stat-label">Students</div>
      </div>
    </div>
  </div>`;
  html += `</div>`;

  // COLUMN 3: Action Items — what should I do next?
  html += `<div class="dash-overview-section">
    <div class="dash-section-title">Next Steps</div>`;

  if (actionItems.length === 0) {
    html += `<div class="dash-action-item"><span class="dash-action-dot" style="background:var(--score-3)"></span><span class="dash-action-text" style="color:var(--score-3)">Looking good! All standards covered, all competencies tagged.</span></div>`;
  } else {
    html += `<div class="dash-action-list">`;
    actionItems.forEach(item => {
      html += `<div class="dash-action-item">
        <span class="dash-action-dot"></span>
        <span class="dash-action-text">${item.text}</span>
        ${item.link ? `<a class="dash-action-link" href="${item.link}">${item.linkText} &rarr;</a>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  // Proficiency distribution
  const distrib = { 1: 0, 2: 0, 3: 0, 4: 0 };
  const distribStudents = { 1: [], 2: [], 3: [], 4: [] };
  allStudents.forEach(s => {
    const p = Math.round(getOverallProficiency(cid, s.id));
    if (p >= 1 && p <= 4) {
      distrib[p]++;
      distribStudents[p].push(displayName(s));
    }
  });
  const totalWithProf = distrib[1] + distrib[2] + distrib[3] + distrib[4];

  html += `<div style="margin-top:16px">
    <div style="font-family:'SF Mono', ui-monospace, 'Menlo', monospace;font-size:0.52rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-3);margin-bottom:8px">Class Distribution</div>`;

  // Stacked horizontal bar
  if (totalWithProf > 0) {
    html += `<div style="display:flex;height:28px;gap:2px">`;
    const distribData = [
      { level: 4, label: 'Extending', color: '#1565c0', tint: 'var(--score-4-bg)' },
      { level: 3, label: 'Proficient', color: '#2e7d32', tint: 'var(--score-3-bg)' },
      { level: 2, label: 'Developing', color: '#c07a00', tint: 'var(--score-2-bg)' },
      { level: 1, label: 'Emerging', color: '#d32f2f', tint: 'var(--score-1-bg)' }
    ];
    distribData.forEach(d => {
      const pct = (distrib[d.level] / totalWithProf) * 100;
      if (pct > 0) {
        const names = distribStudents[d.level].sort().map(n => `<div class="dist-tip-name">${esc(n)}</div>`).join('');
        html += `<div class="dist-seg" style="flex:${distrib[d.level]};background:${d.tint};display:flex;align-items:center;justify-content:center;min-width:${pct > 8 ? '0' : '28px'};transition:flex 0.3s var(--ease-out)">
          <span style="font-family:var(--font-base);font-size:${pct > 15 ? '0.78rem' : '0.65rem'};font-weight:700;color:${d.color}">${distrib[d.level]}</span>
          <div class="dist-tip">
            <div class="dist-tip-title">${d.label}</div>
            ${names}
          </div>
        </div>`;
      }
    });
    html += `</div>`;

    // Legend row below the bar
    html += `<div style="display:flex;gap:12px;margin-top:6px;justify-content:center">`;
    distribData.forEach(d => {
      if (distrib[d.level] > 0) {
        html += `<div style="display:flex;align-items:center;gap:4px">
          <div style="width:8px;height:8px;border-radius:2px;background:${d.color}"></div>
          <span style="font-family:var(--font-base);font-size:0.65rem;color:var(--text-2)">${d.label}</span>
        </div>`;
      }
    });
    html += `</div>`;
  } else {
    html += `<div style="height:28px;border-radius:8px;background:rgba(0,0,0,0.04);display:flex;align-items:center;justify-content:center">
      <span style="font-family:var(--font-base);font-size:0.72rem;color:var(--text-3)">No data yet</span>
    </div>`;
  }
  html += `</div>`;

  html += `</div>`;

  html += `</div>`; // close dash-overview

  // ── Birthday Widget ──
  const upcomingBdays = getUpcomingBirthdays(cid);
  if (upcomingBdays.length > 0) {
    html += `<div class="dash-birthday-box">
      <div class="dash-section-title">Upcoming Birthdays</div>`;
    upcomingBdays.forEach(b => {
      const dob = new Date(b.student.dateOfBirth);
      const monthDay = dob.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
      const countdown = b.daysUntil === 0 ? '<span class="bday-today">Today!</span>'
        : b.daysUntil === 1 ? '<span class="bday-soon">Tomorrow</span>'
        : `<span class="bday-days">in ${b.daysUntil} days</span>`;
      html += `<div class="bday-row">
        <div class="bday-avatar">${initials(b.student)}</div>
        <div class="bday-info">
          <div class="bday-name">${esc(displayName(b.student))}</div>
          <div class="bday-date">${monthDay}</div>
        </div>
        <div class="bday-countdown">${countdown}</div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`; // close dash-section

  /* ── Student Card Grid ──────────────────────────────────── */
  html += `<div class="dash-section">`;
  if (students.length === 0 && allStudents.length === 0) {
    html += `<div class="dash-empty">
      <div class="dash-empty-icon">👩‍🏫</div>
      <div class="dash-empty-title">No students yet</div>
      <div class="dash-empty-text">Add your first student or import a class roster to get started.</div>
    </div>`;
  } else if (students.length === 0) {
    html += `<div class="dash-empty">
      <div class="dash-empty-icon">🔍</div>
      <div class="dash-empty-title">No matches</div>
      <div class="dash-empty-text">Try adjusting your search or filters.</div>
    </div>`;
  } else {
    html += `<div class="dash-grid">`;
    students.forEach(st => {
      const overall = getOverallProficiency(cid, st.id);
      const op = Math.round(overall);
      const flagged = isStudentFlagged(cid, st.id);
      const pct = getCompletionPct(cid, st.id);

      // Missing work count
      const missingCount = assessments.filter(a => {
        if (!a.dueDate || new Date(a.dueDate) >= new Date()) return false;
        const sc = allScores[st.id] || [];
        return !sc.some(x => x.assessmentId === a.id && x.score > 0);
      }).length;

      // Overall trend
      const allSc = (allScores[st.id] || []).filter(sc => sc.type === 'summative' && sc.score > 0);
      let trend = 'flat';
      if (allSc.length >= 4) {
        allSc.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
        const mid = Math.floor(allSc.length / 2);
        const earlyAvg = allSc.slice(0, mid).reduce((a, b) => a + b.score, 0) / mid;
        const lateAvg = allSc.slice(mid).reduce((a, b) => a + b.score, 0) / (allSc.length - mid);
        if (lateAvg > earlyAvg + 0.2) trend = 'up';
        else if (lateAvg < earlyAvg - 0.2) trend = 'down';
      }

      // Last observation
      const obs = getStudentQuickObs(cid, st.id);
      const lastObs = obs.length > 0 ? obs[0] : null;
      let obsText = '';
      if (lastObs) {
        const obsDate = lastObs.date || '';
        const snippet = lastObs.text.length > 45 ? lastObs.text.slice(0, 45) + '…' : lastObs.text;
        obsText = `📝 "${snippet}"`;
      } else {

        </button>

          <a class="dash-card-name" href="student.html?id=${st.id}&course=${cid}" data-stop-prop="true">${esc(displayName(st))}</a>

        </div>
        <div class="dash-card-badge" style="background:${PROF_TINT[op]}">
          <div class="dash-card-badge-num" style="color:${PROF_COLORS[op]}">${overall > 0 ? overall.toFixed(1) : '—'}</div>
          <div class="dash-card-badge-label" style="color:${PROF_COLORS[op]}">${overall > 0 ? PROF_LABELS[op] : ''}</div>
        </div>
        ${missingCount > 0 ? `<span class="dash-card-missing" title="${missingCount} past-due unscored">⚠${missingCount}</span>` : ''}
      </div>`;

      // Section strip
      html += `<div class="dash-card-sections">`;
      sections.forEach(sec => {
        const secVal = getSectionProficiency(cid, st.id, sec.id);
        const sr = Math.round(secVal);
        html += `<div class="dash-section-mini" style="background:${PROF_TINT[sr]}">
          <div style="position:absolute;top:0;left:4px;right:4px;height:3px;border-radius:2px;background:${sec.color}"></div>
          <div class="dash-section-name">${esc(sec.shortName || sec.name)}</div>
          <div class="dash-section-val" style="color:${PROF_COLORS[sr]}">${secVal > 0 ? secVal.toFixed(1) : '—'}</div>
        </div>`;
      });
      html += `</div>`;

      // Footer
      html += `<div class="dash-card-footer">
        <div class="dash-card-meta">
          <span style="color:${pct >= 75 ? 'var(--score-3)' : pct >= 50 ? 'var(--score-2)' : 'var(--score-1)'}">${pct}%</span>
          ${trendIcon[trend]}
        </div>
        <div class="dash-card-obs">${obsText}</div>
      </div>`;

      html += `</div>`; // close card
    });
    html += `</div>`; // close grid
  }
  html += `</div>`; // close dash-section (students)

  document.getElementById('main').innerHTML = html;

  // Restore sort dropdown
  const sortSelect = document.querySelector('.dash-sort-select');
  if (sortSelect) sortSelect.value = sortMode;
}

function deleteStudentUI(sid) {
  const students = getStudents(activeCourse);
  const st = students.find(s => s.id === sid);
  if (!st) return;
  const dname = displayName(st);
  showConfirm('Delete Student', 'Delete ' + dname + '? This removes all their scores, goals, and notes.', 'Delete', 'danger', () => {
    const snapshot = deleteStudent(activeCourse, sid);
    render();
    showUndoToast('Student deleted', () => {
      const cid = activeCourse;
      const sts = getStudents(cid); sts.push(snapshot.student); saveStudents(cid, sts);
      const sc = getScores(cid); sc[sid] = snapshot.scores; saveScores(cid, sc);
      if (snapshot.goals !== undefined) { const g = getGoals(cid); g[sid] = snapshot.goals; saveGoals(cid, g); }
      if (snapshot.reflections !== undefined) { const r = getReflections(cid); r[sid] = snapshot.reflections; saveReflections(cid, r); }
      if (snapshot.notes !== undefined) { const n = getNotes(cid); n[sid] = snapshot.notes; saveNotes(cid, n); }
      if (snapshot.flagged) { const f = getFlags(cid); f[sid] = true; saveFlags(cid, f); }
      if (snapshot.statuses) { const s = getAssignmentStatuses(cid); Object.assign(s, snapshot.statuses); saveAssignmentStatuses(cid, s); }
      render();
    });
  });
}

function cmSaveStudent() {
  if (!cmSelectedCourse) return;
  const firstName = (document.getElementById('cm-add-first')?.value||'').trim();
  const lastName = (document.getElementById('cm-add-last')?.value||'').trim();
  if (!firstName) { document.getElementById('cm-add-first')?.focus(); return; }
  const preferred = (document.getElementById('cm-add-pref')?.value||'').trim();
  const pronouns = (document.getElementById('cm-add-pro')?.value||'').trim();
  const studentNumber = (document.getElementById('cm-add-num')?.value||'').trim();
  const dateOfBirth = (document.getElementById('cm-add-dob')?.value||'').trim();
  const email = (document.getElementById('cm-add-email')?.value||'').trim();
  const designations = Array.from(document.querySelectorAll('.cm-desig-check:checked')).map(cb => cb.value);
  const students = getStudents(cmSelectedCourse);
  const sortName = ((lastName||'') + ' ' + firstName).trim();

  if (cmEditingStudentId) {
    const st = students.find(s => s.id === cmEditingStudentId);
    if (st) {
      st.firstName = firstName; st.lastName = lastName; st.preferred = preferred;
      st.pronouns = pronouns; st.sortName = sortName;
      st.studentNumber = studentNumber; st.dateOfBirth = dateOfBirth; st.email = email;
      st.designations = designations; delete st.designation;
      if (!st.attendance) st.attendance = [];
    }
    cmEditingStudentId = null;
  } else {
    students.push({ id: uid(), firstName, lastName, preferred, pronouns, studentNumber, dateOfBirth, email, designations, attendance:[], sortName, enrolledDate: new Date().toISOString().slice(0,10) });
  }
  saveStudents(cmSelectedCourse, students);
  cmCancelStudent();
  render();
  requestAnimationFrame(() => {
    const detail = document.querySelector('.cm-detail');
    if (detail) detail.scrollTop = 0;
  });
}

function cmEditStudent(sid) {
  if (!cmSelectedCourse) return;
  const students = getStudents(cmSelectedCourse);
  const st = students.find(s => s.id === sid);
  if (!st) return;
  cmEditingStudentId = sid;
  const form = document.getElementById('cm-add-student-form');
  if (form) form.style.display = 'block';

  if (el('cm-add-last')) el('cm-add-last').value = st.lastName || '';
  if (el('cm-add-pref')) el('cm-add-pref').value = st.preferred || '';
  if (el('cm-add-pro')) el('cm-add-pro').value = st.pronouns || '';
  if (el('cm-add-num')) el('cm-add-num').value = st.studentNumber || '';
  if (el('cm-add-dob')) el('cm-add-dob').value = st.dateOfBirth || '';

function cmHandleCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const lines = e.target.result.split('\n').map(l => l.trim()).filter(l => l);
    const hdr = (lines[0]||'').toLowerCase();
    const hasHeader = hdr.includes('first') || hdr.includes('name') || hdr.includes('last');
    const start = hasHeader ? 1 : 0;
    const parsed = [];
    for (let i = start; i < lines.length; i++) {
      const parts = lines[i].split(',').map(p => p.trim());
      if (!parts[0]) continue;
      if (hdr.includes('first') || parts.length >= 4) {
        parsed.push({ firstName: parts[0], lastName: parts[1]||'', preferred: parts[2]||'', pronouns: parts[3]||'', studentNumber: parts[4]||'', dateOfBirth: parts[5]||'', email: parts[6]||'' });
      } else {
        const np = parts[0].split(/\s+/);
        parsed.push({ firstName: np[0]||'', lastName: np.slice(1).join(' ')||'', preferred: parts[1]||'', pronouns: parts[2]||'' });
      }
    }
    cmShowImportPreview(parsed);
  };
  reader.readAsText(file);
  input.value = '';
}

  </div>`;
  const el = document.getElementById('cm-import-preview');

function cmConfirmImport() {
  if (!cmPendingImport || !cmSelectedCourse) return;

  });
  saveStudents(cmSelectedCourse, students);
  cmPendingImport = null;
  render();
}

  if (cmBulkMode && students.length > 0) {
    html += `<div class="cm-bulk-panel">

        <button class="cm-add-link" data-action="cmBulkSelectAll" style="font-size:0.7rem">Select All</button>

            <select class="cm-input" id="cm-bulk-att-status" style="font-size:0.78rem;flex:1">
              <option value="present">Present</option>
              <option value="absent">Absent</option>
              <option value="late">Late</option>
              <option value="excused">Excused</option>

      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-primary" data-action="cmApplyBulk" style="font-size:0.78rem;padding:6px 14px" ${cmBulkSelected.size===0?'disabled':''}>Apply to Selected</button>
      </div>
    </div>`;
  }
  // Add/Edit student form — two-column grid
  html += `<div id="cm-add-student-form" style="display:none" class="cm-add-student-form">
    <div class="cm-student-form">
      <div class="cm-field">
        <label class="cm-label">First Name *</label>
        <input class="cm-input" id="cm-add-first" placeholder="e.g. Amara" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field">
        <label class="cm-label">Last Name</label>
        <input class="cm-input" id="cm-add-last" placeholder="e.g. Osei" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field">
        <label class="cm-label">Preferred Name</label>
        <input class="cm-input" id="cm-add-pref" placeholder="e.g. Amara" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field">
        <label class="cm-label">Pronouns</label>
        ${pronounsSelect('cm-add-pro', '')}
      </div>
      <div class="cm-field">
        <label class="cm-label">Student Number</label>
        <input class="cm-input" id="cm-add-num" placeholder="e.g. STU-101" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field">
        <label class="cm-label">Email</label>
        <input class="cm-input" id="cm-add-email" type="email" placeholder="student@school.edu" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field">
        <label class="cm-label">Date of Birth</label>
        <input class="cm-input" id="cm-add-dob" type="date" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field" style="grid-column:1/-1">
        <label class="cm-label">Designations</label>
        <div class="desig-check-grid">
          ${Object.entries(BC_DESIGNATIONS).map(([k,v]) => `<label class="desig-check-item" title="${esc(v.desc)}"><input type="checkbox" class="cm-desig-check" value="${k}"><span class="desig-check-code">${k}</span><span class="desig-check-name">${esc(v.name)}</span></label>`).join('')}
        </div>
      </div>
      <div class="cm-field" style="grid-column:1/-1;display:flex;align-items:flex-end;gap:8px;justify-content:flex-end">
        <button class="btn btn-ghost" data-action="cmCancelStudent" style="padding:6px 10px;font-size:0.78rem">Cancel</button>
        <button class="btn btn-primary" id="cm-save-btn" data-action="cmSaveStudent" style="padding:6px 14px;font-size:0.78rem">Save</button>

  <div class="cm-roster-actions">

      <div id="cm-cw-sliders" style="${cwEnabled?'':'display:none'}">
        <div style="display:flex;gap:20px;align-items:center">
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-2);margin-bottom:4px">
              <span>Summative</span><span>Formative</span>
            </div>
            <input type="range" id="cm-cw-range" min="0" max="100" value="${Math.round(cw.summative*100)}"
              oninput="cmUpdateCatWeights(this.value)" style="width:100%">
            <div style="display:flex;justify-content:space-between;font-size:0.78rem;font-weight:600;margin-top:2px">

              <span id="cm-cw-form">${Math.round(cw.formative*100)}%</span>
            </div>

    <div class="cm-field">
      <label class="cm-label">Report Card Format</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;cursor:pointer">
        <input type="checkbox" id="cm-report-pct" ${cc.reportAsPercentage?'checked':''}

      </label>
      <div class="cm-hint">When enabled, the overall grade on reports displays as a percentage instead of a proficiency level.</div>
    </div>

  // Section 3: Curriculum — Subjects
  html += `<div class="cm-section">
    <div class="cm-section-title">Curriculum</div>
    <div class="cm-field">
      <label class="cm-label">Subjects</label>`;
  (lm.subjects||[]).forEach(sub => {
    html += `<div class="cm-subject-row">
      <div class="cm-subject-color" style="background:${sub.color}">
        <input type="color" value="${sub.color}" onchange="cmUpdateSubjectColor('${sub.id}',this.value)">
      </div>
      <input class="cm-input" value="${esc(sub.name)}" style="flex:1"
        onblur="cmUpdateSubjectName('${sub.id}',this.value)">
      <button class="cm-delete-mini" data-action="cmDeleteSubject" data-subid="${sub.id}" title="Delete subject" aria-label="Delete subject">✕</button>
    </div>`;
  });
  html += `<button class="cm-add-link" data-action="cmAddSubject">+ Add Subject</button>
    </div>`;

  // Sections & Standards
  html += `<div class="cm-field">
      <label class="cm-label">Sections &amp; Learning Standards</label>`;
  if ((lm.sections||[]).length === 0) {
    html += `<div class="cm-curriculum-empty">
      <div class="cm-curriculum-empty-icon">📐</div>

  (lm.sections||[]).forEach(sec => {

    const subColor = sub ? sub.color : '#999';
    html += `<div class="cm-sec-group" id="cm-sec-${sec.id}">
      <div class="cm-sec-header" data-action="cmToggleSec">
        <div class="cm-sec-header-top">
          <span class="cm-sec-chevron">▶</span>
          <div class="cm-sec-color-bar" style="background:${sec.color}"></div>
          <span class="cm-sec-name-display">${esc(sec.name)}</span>
          <span class="cm-sec-count">${sec.tags.length} standard${sec.tags.length!==1?'s':''}</span>
        </div>
        <div class="cm-sec-header-meta">
          <span class="cm-sec-subject-badge"><span class="cm-sec-subject-dot" style="background:${subColor}"></span>${esc(subName)}</span>
        </div>
      </div>
      <div class="cm-sec-body">
        <div class="cm-sec-edit-row">
          <div class="cm-sec-edit-name">
            <label class="cm-label">Section Name</label>
            <input class="cm-input" value="${esc(sec.name)}" style="font-weight:600;font-size:0.82rem"

          </div>
          <div class="cm-sec-edit-subject">
            <label class="cm-label">Subject</label>
            <select class="cm-input" style="font-size:0.78rem"
              data-stop-prop="true" onchange="cmUpdateSecSubject('${sec.id}',this.value)">
              ${(lm.subjects||[]).map(s => `<option value="${s.id}"${s.id===sec.subject?' selected':''}>${esc(s.name)}</option>`).join('')}
            </select>
          </div>
          <div style="display:flex;gap:6px;align-items:flex-end">
            <div>
              <label class="cm-label">Color</label>
              <div class="cm-sec-color-dot" style="background:${sec.color};width:32px;height:32px;border-radius:8px;margin-top:2px">
                <input type="color" value="${sec.color}" data-stop-prop="true" onchange="cmUpdateSecColor('${sec.id}',this.value)">
              </div>
            </div>
            <button class="cm-delete-mini" data-action="cmDeleteSec" data-stop-prop="true" data-secid="${sec.id}" title="Delete section"
              style="width:32px;height:32px;margin-bottom:2px">✕</button>
          </div>
        </div>`;
    sec.tags.forEach(tag => {
      html += `<div class="cm-tag-row">
        <span class="cm-tag-id" style="color:${sec.color}">${esc(tag.id)}</span>
        <div class="cm-tag-fields">
          <input class="cm-input" value="${esc(tag.label)}" placeholder="Standard label"
            style="padding:5px 8px;font-size:0.82rem;font-weight:500"
            onblur="cmUpdateTagLabel('${sec.id}','${tag.id}',this.value)">
          <textarea class="cm-textarea" placeholder="I can… statement"
            style="min-height:34px;padding:5px 8px;font-size:0.78rem"
            onblur="cmUpdateTagText('${sec.id}','${tag.id}',this.value)">${esc(tag.text||'')}</textarea>
        </div>
        <button class="cm-delete-mini" data-action="cmDeleteTag" data-secid="${sec.id}" data-tagid="${tag.id}" title="Delete tag" aria-label="Delete tag" style="margin-top:4px">✕</button>
      </div>`;
    });
    html += `<button class="cm-add-link" data-action="cmAddTag" data-secid="${sec.id}">+ Add Standard</button>
      </div>
    </div>`;
  });
  html += `<button class="cm-add-link" data-action="cmAddSec">+ Add Section</button>
    </div>
  </div>`;

  // Section 4: BC Curriculum Link
  const linkedTags = course.curriculumTags || [];
  html += `<div class="cm-section">
    <div class="cm-section-title">BC Curriculum Link</div>`;
  if (linkedTags.length > 0) {
    linkedTags.forEach(tag => {
      const courseData = CURRICULUM_INDEX ? CURRICULUM_INDEX[tag] : null;
      const courseName = courseData ? courseData.course_name : tag;
      html += `<div class="cm-curric-link">
        <span class="cm-curric-tag">${esc(tag)}</span>
        <span class="cm-curric-name">${esc(courseName)}</span>
      </div>`;
    });
    html += `<button class="cm-relink-btn" data-action="cmStartRelink" data-cid="${cid}">Re-link Curriculum</button>`;
  } else {
    html += `<div class="cm-curric-unlinked">Not linked to BC Curriculum</div>
      <button class="cm-relink-btn" data-action="cmStartRelink" data-cid="${cid}">Link to BC Curriculum</button>`;
  }
  html += `</div>`;

  html += '</div>'; // close right column

  // Actions row
  const isArchived = cc.archived || false;
  html += `<div class="cm-actions-row">
    <button class="cm-action-btn" data-action="cmDuplicateCourse" data-cid="${cid}">⧉ Duplicate Class</button>

      <span class="cm-hint" style="margin:0">Permanently removes all data for this class.</span>

  html += '</div>'; // close cm-detail-inner
  return html;
}

function renderCmCreateForm() {
  if (cwStep === 1) return renderCwStep1();
  if (cwStep === 2) return renderCwStep2();
  if (cwStep === 3) return renderCwStep3();
  return '';
}

function renderCwStepBar() {
  const labels = ['Choose Courses', 'Class Details', 'Review'];
  return `<div class="cw-steps">${labels.map((l, i) => {
    const n = i + 1;
    const cls = n < cwStep ? 'done' : n === cwStep ? 'active' : '';
    return `${i > 0 ? '<span class="cw-step-arrow">›</span>' : ''}
      <div class="cw-step ${cls}">
        <span class="cw-step-num">${n < cwStep ? '✓' : n}</span>
        <span>${l}</span>
      </div>`;
  }).join('')}</div>`;
}

/* ── Step 1: Grade → Subject → Course selection ── */
function renderCwStep1() {
  let html = '<div class="cm-detail-inner" style="display:block">';
  html += renderCwStepBar();

  // Loading state
  if (!cwCurriculumLoaded && !cwLoadError) {
    html += `<div class="cm-section"><div class="cw-empty-msg">Loading BC Curriculum data…</div></div>`;
    html += `<div class="cw-footer">
      <button class="btn btn-ghost" data-action="cmCancelCreate">Cancel</button>
    </div>`;
    html += '</div>';
    return html;
  }

  // Load error — offer custom fallback
  if (cwLoadError) {
    html += `<div class="cm-section">
      <div class="cw-empty-msg">
        Could not load BC Curriculum data.<br>
        You can still create a class with a custom learning map.
      </div>
    </div>`;
    html += `<div class="cw-footer">
      <button class="btn btn-ghost" data-action="cmCancelCreate">Cancel</button>
      <button class="btn btn-primary" data-action="cwSkipToCustom">Custom Class</button>
    </div>`;
    html += '</div>';
    return html;
  }

  // Grade selection
  html += `<div class="cm-section">
    <div class="cm-section-title">Grade</div>
    <div class="cw-grade-row">`;
  [8, 9, 10, 11, 12].forEach(g => {
    const active = cwSelectedGrade === g ? ' active' : '';
    html += `<button class="cw-grade-btn${active}" data-action="cwSelectGrade" data-grade="${g}">Grade ${g}</button>`;
  });
  html += `</div></div>`;

  // Subject selection (only if grade chosen)
  if (cwSelectedGrade !== null) {
    const allCourses = getCoursesByGrade(cwSelectedGrade);
    // Group by subject
    const bySubject = {};
    allCourses.forEach(c => {
      if (!bySubject[c.subject]) bySubject[c.subject] = [];
      bySubject[c.subject].push(c);
    });
    const subjectNames = Object.keys(bySubject).sort();

    html += `<div class="cm-section">
      <div class="cm-section-title">Subject</div>
      <div class="cw-subject-row">`;

    subjectNames.forEach(subj => {
      const active = cwSelectedSubject === subj ? ' active' : '';
      const color = SUBJECT_COLOURS[subj] || '#6366f1';
      html += `<button class="cw-subject-btn${active}" data-action="cwSelectSubject" data-subject="${esc(subj)}">
        <span class="cw-subject-dot" style="background:${color}"></span>
        ${esc(subj)}
      </button>`;
    });
    html += `</div></div>`;

    // Course checklist (only if subject chosen)
    if (cwSelectedSubject && bySubject[cwSelectedSubject]) {
      const courses = bySubject[cwSelectedSubject];
      html += `<div class="cm-section">
        <div class="cm-section-title">Courses</div>
        <div class="cm-hint" style="margin-bottom:8px">Select one or more courses. Multiple selections create a combined class.</div>
        <div class="cw-course-list">`;

      courses.forEach(c => {
        const sel = cwSelectedTags.includes(c.short_tag) ? ' selected' : '';
        // Get full course data from index for competency count
        const fullCourse = CURRICULUM_INDEX[c.short_tag];
        let compCount = 0;
        let catCount = 0;
        if (fullCourse && fullCourse.categories) {
          catCount = fullCourse.categories.length;
          for (const cat of fullCourse.categories) compCount += (cat.competencies || []).length;
        }
        html += `<div class="cw-course-item${sel}" data-action="cwToggleCourse" data-tag="${esc(c.short_tag)}">
          <span class="cw-course-check">${sel ? '✓' : ''}</span>
          <span class="cw-course-name">${esc(c.course_name)}</span>
          <span class="cw-course-tag">${esc(c.short_tag)}</span>
          <span class="cw-course-count">${catCount} categories · ${compCount} standards</span>
        </div>`;
      });
      html += `</div>`;

      // Selection summary
      if (cwSelectedTags.length > 0) {
        let totalComps = 0;
        cwSelectedTags.forEach(tag => {
          const full = CURRICULUM_INDEX[tag];
          if (full && full.categories) {
            for (const cat of full.categories) totalComps += (cat.competencies || []).length;
          }
        });
        html += `<div class="cw-selection-summary">
          <strong>${cwSelectedTags.length}</strong> course${cwSelectedTags.length !== 1 ? 's' : ''} selected ·
          <strong>${totalComps}</strong> competencies will become gradebook standards
        </div>`;
      }
      html += `</div>`;
    }
  }

  // Custom class option
  html += `<button class="cw-custom-btn" data-action="cwSkipToCustom">
    ✎ Create a custom class without BC Curriculum
  </button>`;

  // Footer
  html += `<div class="cw-footer">
    <button class="btn btn-ghost" data-action="cmCancelCreate">Cancel</button>
    <button class="btn btn-primary" data-action="cwGoToStep2" ${cwSelectedTags.length === 0 ? 'disabled style="opacity:0.4;pointer-events:none"' : ''}>Next</button>
  </div>`;
  html += '</div>';
  return html;
}

/* ── Step 2: Class Details (pre-filled) ── */
function renderCwStep2() {
  // Determine pre-filled values from curriculum selection
  let preName = '';
  let preGrade = '';
  if (cwSelectedTags.length > 0 && CURRICULUM_INDEX) {
    const names = cwSelectedTags
      .map(tag => CURRICULUM_INDEX[tag])
      .filter(Boolean)
      .map(c => c.course_name);
    preName = names.join(' / ');
    preGrade = cwSelectedGrade ? String(cwSelectedGrade) : '';
  }

  let html = '<div class="cm-detail-inner" style="display:block">';
  html += renderCwStepBar();

  html += `<div class="cm-section">
    <div class="cm-section-title">Class Details</div>
    <div class="cm-field">
      <label class="cm-label">Class Name</label>
      <input class="cm-input" id="cm-new-name" value="${esc(preName)}" placeholder="e.g. English 10" autofocus>
    </div>
    <div style="display:flex;gap:16px">
      <div class="cm-field" style="flex:1">
        <label class="cm-label">Grade Level</label>
        <input class="cm-input" id="cm-new-grade" value="${esc(preGrade)}" placeholder="e.g. 8, 10-12">
      </div>
    </div>
    <div class="cm-field">
      <label class="cm-label">Description</label>
      <textarea class="cm-textarea" id="cm-new-desc" placeholder="Optional"></textarea>
    </div>
  </div>`;

  html += `<div class="cm-section">
    <div class="cm-section-title">Grading &amp; Calculation</div>
    <div class="cm-field">
      <label class="cm-label">Grading System</label>
      <div class="cm-seg" id="cm-cg-grading">

function renderCwStep3() {
  let html = '<div class="cm-detail-inner" style="display:block">';
  html += renderCwStepBar();

  const className = document.getElementById('cm-new-name')?.value || cwGetPreName();
  const gradeLevel = document.getElementById('cm-new-grade')?.value || (cwSelectedGrade ? String(cwSelectedGrade) : '');

  html += `<div class="cm-section">
    <div class="cm-section-title">Review</div>
    <div class="cm-field">
      <label class="cm-label">Class Name</label>
      <div style="font-size:var(--text-lg);font-weight:600;color:var(--text)">${esc(className || 'Untitled')}</div>
    </div>
    <div class="cm-field">
      <label class="cm-label">Grade</label>
      <div style="font-size:var(--text-md);color:var(--text-2)">${esc(gradeLevel || '—')}</div>
    </div>
  </div>`;

  // Preview learning map sections
  if (cwSelectedTags.length > 0 && CURRICULUM_INDEX) {
    const subjectColors = ['#0891b2','#7c3aed','#059669','#d97706','#dc2626','#2563eb','#db2777','#4f46e5'];
    let colorIdx = 0;

    cwSelectedTags.forEach(tag => {
      const courseData = CURRICULUM_INDEX[tag];
      if (!courseData) return;

      const color = subjectColors[colorIdx % subjectColors.length];
      colorIdx++;

      const cats = courseData.categories || [];
      let totalComps = 0;
      cats.forEach(c => totalComps += (c.competencies || []).length);

      html += `<div class="cw-review-card">
        <div class="cw-review-title" style="color:${color}">${esc(courseData.course_name)}</div>
        <div class="cw-review-meta">${esc(tag)} · ${totalComps} competencies across ${cats.length} categories</div>
        <div class="cw-review-sections">`;
      cats.forEach(cat => {
        const compCount = (cat.competencies || []).length;
        html += `<div class="cw-review-sec">
          <span class="cw-review-sec-dot" style="background:${color}"></span>
          ${esc(cat.name)}
          <span class="cw-review-sec-count">${compCount} standard${compCount !== 1 ? 's' : ''}</span>
        </div>`;
      });
      html += `</div></div>`;
    });
  } else {
    html += `<div class="cm-section">
      <div class="cw-empty-msg">Custom class — no curriculum data. You can add sections and tags manually after creation.</div>
    </div>`;
  }

  html += `<div class="cw-footer">
    <button class="btn btn-ghost" data-action="cwGoBack">Back</button>
    <button class="btn btn-primary" data-action="cwFinishCreate">Create Class</button>
  </div>`;
  html += '</div>';
  return html;
}

// Stash for step 2 values

}

function cwGetPreName() {
  if (cwStep2Name) return cwStep2Name;
  if (cwSelectedTags.length > 0 && CURRICULUM_INDEX) {
    return cwSelectedTags
      .map(tag => CURRICULUM_INDEX[tag])
      .filter(Boolean)
      .map(c => c.course_name)
      .join(' / ');
  }
  return '';

function cwFinishCreate() {
  const name = cwStep2Name || cwGetPreName();
  if (!name.trim()) { cwStep = 2; renderClassManager(); return; }

  const course = createCourse({
    name: name.trim(),
    gradeLevel: (cwStep2Grade || (cwSelectedGrade ? String(cwSelectedGrade) : '')).trim(),
    description: (cwStep2Desc || '').trim(),
    gradingSystem: cwStep2Grading,
    calcMethod: cwStep2Calc,
    decayWeight: parseInt(cwStep2Decay) / 100
  });

  const cc = getCourseConfig(course.id);
  cc.calcMethod = cwStep2Calc;
  cc.decayWeight = parseInt(cwStep2Decay) / 100;
  saveCourseConfig(course.id, cc);

  // Build learning map from curriculum if courses were selected
  if (cwSelectedTags.length > 0 && CURRICULUM_INDEX) {
    const map = buildLearningMapFromTags(cwSelectedTags);
    if (map) {
      saveLearningMap(course.id, map);
      // Store curriculum link on the course object for re-linking
      updateCourse(course.id, { curriculumTags: [...cwSelectedTags] });
    }
  }

  cmSelectedCourse = course.id;
  cmMode = 'edit';

let cmRelinkCid = null;
let cmRelinkStep = 0; // 0 = not active, 1 = selecting courses, 2 = confirm

function cmStartRelink(cid) {
  cmRelinkCid = cid;
  cmRelinkStep = 1;
  cwSelectedGrade = null;
  cwSelectedSubject = null;
  const course = COURSES[cid];
  cwSelectedTags = course && course.curriculumTags ? [...course.curriculumTags] : [];
  cwLoadError = false;
  // Load curriculum
  loadCurriculumIndex().then(idx => {
    cwCurriculumLoaded = !!idx;
    cwLoadError = !idx;
    renderClassManager();
  });
  renderClassManager();
}

function cmRelinkCancel() {
  cmRelinkCid = null;
  cmRelinkStep = 0;
  cwSelectedTags = [];
  renderClassManager();
}

function cmRelinkNext() {
  if (cwSelectedTags.length === 0) return;
  cmRelinkStep = 2;
  renderClassManager();
}

function cmRelinkConfirm(mode) {
  if (!cmRelinkCid || cwSelectedTags.length === 0) return;
  const cid = cmRelinkCid;

  if (mode === 'replace') {
    // Build new learning map from selected curriculum
    const map = buildLearningMapFromTags(cwSelectedTags);
    if (map) {
      saveLearningMap(cid, map);
      updateCourse(cid, { curriculumTags: [...cwSelectedTags] });
    }
  } else if (mode === 'merge') {
    // Merge: keep existing sections/tags, add new ones from curriculum
    const existing = getLearningMap(cid);
    const newMap = buildLearningMapFromTags(cwSelectedTags);
    if (newMap) {
      // Add new subjects that don't exist
      const existingSubIds = new Set((existing.subjects || []).map(s => s.id));
      (newMap.subjects || []).forEach(s => {
        if (!existingSubIds.has(s.id)) existing.subjects.push(s);
      });
      // Add new sections that don't exist
      const existingSecIds = new Set((existing.sections || []).map(s => s.id));
      (newMap.sections || []).forEach(s => {
        if (!existingSecIds.has(s.id)) {
          existing.sections.push(s);
        } else {
          // Section exists — add any new tags
          const existingSec = existing.sections.find(es => es.id === s.id);
          const existingTagIds = new Set(existingSec.tags.map(t => t.id));
          s.tags.forEach(t => {
            if (!existingTagIds.has(t.id)) existingSec.tags.push(t);
          });
        }
      });
      existing._customized = true;
      saveLearningMap(cid, existing);
      // Merge curriculum tags
      const allTags = new Set([...(COURSES[cid].curriculumTags || []), ...cwSelectedTags]);
      updateCourse(cid, { curriculumTags: [...allTags] });
    }
  }

  cmRelinkCid = null;
  cmRelinkStep = 0;
  cwSelectedTags = [];
  renderClassManager();
}

    if (tagCount > 0) {
      html += `<button class="btn btn-primary" data-action="cmRelinkConfirm" data-mode="merge" style="width:100%;text-align:left;padding:12px 16px">

      <button class="cm-relink-btn" data-action="cmRelinkConfirm" data-mode="replace" style="width:100%;text-align:left;padding:12px 16px;border-color:var(--score-2);color:var(--score-2)">
        <strong>Replace</strong> — Remove current standards and replace with curriculum. Existing scores may be orphaned.
      </button>`;
    } else {

function cmDeleteCourse() {
  if (!cmSelectedCourse) return;
  const name = COURSES[cmSelectedCourse].name;
  showConfirm('Delete "' + name + '"',
    'This permanently removes all students, assessments, scores, and settings. This cannot be undone.',
    'Delete Class', 'danger', () => {
      const wasActive = (cmSelectedCourse === activeCourse);
      deleteCourseData(cmSelectedCourse);
      const remaining = Object.keys(COURSES);
      if (remaining.length > 0) {
        cmSelectedCourse = remaining[0];
        if (wasActive) { activeCourse = remaining[0]; setActiveCourse(remaining[0]); }
      } else {
        cmSelectedCourse = null;
        activeCourse = null;
      }
      cmMode = 'edit';
      render();
    }
  );
}

// ── CM Duplicate ──
function cmToggleArchive(cid) {
  const cc = getCourseConfig(cid);
  cc.archived = !cc.archived;
  saveCourseConfig(cid, cc);
  renderClassManager();
}

function cmDuplicateCourse(sourceCid) {
  const src = COURSES[sourceCid];
  if (!src) return;
  const newCourse = createCourse({
    name: src.name + ' (Copy)',
    gradeLevel: src.gradeLevel || '',
    description: src.description || '',
    gradingSystem: src.gradingSystem || 'proficiency',
    calcMethod: src.calcMethod || 'mostRecent',
    decayWeight: src.decayWeight || 0.65
  });
  // Copy course config (calc method, weights, etc.)
  const srcCC = getCourseConfig(sourceCid);
  if (Object.keys(srcCC).length > 0) {
    saveCourseConfig(newCourse.id, JSON.parse(JSON.stringify(srcCC)));
  }
  // Copy learning map (curriculum)
  const srcMap = getLearningMap(sourceCid);
  if (srcMap && (srcMap.subjects?.length || srcMap.sections?.length)) {
    const clone = JSON.parse(JSON.stringify(srcMap));
    clone._customized = true;
    clone._version = 1;
    saveLearningMap(newCourse.id, clone);
  }
  cmSelectedCourse = newCourse.id;
  cmMode = 'edit';
  render();
}

function cmUpdateSecColor(secId, color) {
  if (!cmSelectedCourse) return;
  const map = ensureCustomLearningMap(cmSelectedCourse);
  const sec = map.sections.find(s => s.id === secId);
  if (sec) { sec.color = color; saveLearningMap(cmSelectedCourse, map); render(); }
}

function cmDeleteSec(secId) {
  showConfirm('Delete Section', 'Delete this section and all its tags? Existing scores are preserved.',
    'Delete', 'danger', () => {
      const map = ensureCustomLearningMap(cmSelectedCourse);
      map.sections = map.sections.filter(s => s.id !== secId);
      saveLearningMap(cmSelectedCourse, map);
      render();
    });
}

function cmToggleSec(headerEl) {
  const group = headerEl.closest('.cm-sec-group');
  group.classList.toggle('open');
}

function cmAddTag(secId) {
  if (!cmSelectedCourse) return;
  const map = ensureCustomLearningMap(cmSelectedCourse);
  const sec = map.sections.find(s => s.id === secId);
  if (!sec) return;
  sec.tags.push({ id: uid(), label:'New Standard', text:'' });
  saveLearningMap(cmSelectedCourse, map);
  render();
  requestAnimationFrame(() => {
    const el = document.getElementById('cm-sec-'+secId);
    if (el) el.classList.add('open');
  });
}

function cmUpdateTagLabel(secId, tagId, val) {
  if (!cmSelectedCourse) return;
  const map = ensureCustomLearningMap(cmSelectedCourse);
  const sec = map.sections.find(s => s.id === secId);
  const tag = sec?.tags.find(t => t.id === tagId);
  if (tag) { tag.label = val.trim(); saveLearningMap(cmSelectedCourse, map); }
}

function cmUpdateTagText(secId, tagId, val) {
  if (!cmSelectedCourse) return;
  const map = ensureCustomLearningMap(cmSelectedCourse);
  const sec = map.sections.find(s => s.id === secId);
  const tag = sec?.tags.find(t => t.id === tagId);
  if (tag) { tag.text = val.trim(); saveLearningMap(cmSelectedCourse, map); }
}

function cmDeleteTag(secId, tagId) {
  if (!cmSelectedCourse) return;
  const map = ensureCustomLearningMap(cmSelectedCourse);
  const sec = map.sections.find(s => s.id === secId);
  if (sec) {
    sec.tags = sec.tags.filter(t => t.id !== tagId);
    saveLearningMap(cmSelectedCourse, map);
    render();
    requestAnimationFrame(() => {
      const el = document.getElementById('cm-sec-'+secId);
      if (el) el.classList.add('open');
    });
  }
}

/* ── Init ─────────────────────────────────────────────────── */
(async function() {
  await initAllCourses();
  activeCourse = getActiveCourse();
  await initData(activeCourse);
  document.body.insertAdjacentHTML('afterbegin', renderDock('dashboard'));
  // Dashboard has no sidebar — hide the toggle button
  const sidebarBtn = document.querySelector('.tb-btn');
  if (sidebarBtn) sidebarBtn.style.display = 'none';
  render();
  // Ensure page starts at top
  requestAnimationFrame(() => { document.getElementById('main').scrollTop = 0; });
})();

/* ── Delegated click handler ──────────────────────────────── */
document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;
  if (el.dataset.stopProp === 'true') e.stopPropagation();
  var handlers = {
    'openClassManager':     function() { openClassManager(); },
    'closeClassManager':    function() { closeClassManager(); },
    'cmStartCreate':        function() { cmStartCreate(); },
    'cmCancelCreate':       function() { cmCancelCreate(); },
    'cmSelectClass':        function() { cmSelectClass(el.dataset.cid); },
    'cmEditStudent':        function() { cmEditStudent(el.dataset.sid); },
    'cmRemoveStudent':      function() { cmRemoveStudent(el.dataset.sid); },
    'cmCancelStudent':      function() { cmCancelStudent(); },
    'cmSaveStudent':        function() { cmSaveStudent(); },
    'cmShowAddStudent':     function() { cmShowAddStudent(); },
    'cmImportRoster':       function() { cmImportRoster(); },
    'cmConfirmImport':      function() { cmConfirmImport(); },
    'cmCancelImport':       function() { cmCancelImport(); },
    'cmToggleBulk':         function() { cmToggleBulk(); },
    'cmBulkSelectAll':      function() { cmBulkSelectAll(); },
    'cmBulkDeselectAll':    function() { cmBulkDeselectAll(); },
    'cmApplyBulk':          function() { cmApplyBulk(); },
    'cmSetGradingSystem':   function() { cmSetGradingSystem(el.dataset.value); },
    'cmSetCalcMethod':      function() { cmSetCalcMethod(el.dataset.value); },
    'cmDeleteSubject':      function() { cmDeleteSubject(el.dataset.subid); },
    'cmAddSubject':         function() { cmAddSubject(); },
    'cmToggleSec':          function() { cmToggleSec(el); },
    'cmDeleteSec':          function() { cmDeleteSec(el.dataset.secid); },
    'cmDeleteTag':          function() { cmDeleteTag(el.dataset.secid, el.dataset.tagid); },
    'cmAddTag':             function() { cmAddTag(el.dataset.secid); },
    'cmAddSec':             function() { cmAddSec(); },
    'cmStartRelink':        function() { cmStartRelink(el.dataset.cid); },
    'cmDuplicateCourse':    function() { cmDuplicateCourse(el.dataset.cid); },
    'cmToggleArchive':      function() { cmToggleArchive(el.dataset.cid); },
    'cmDeleteCourse':       function() { cmDeleteCourse(); },
    'cwSelectGrade':        function() { cwSelectGrade(parseInt(el.dataset.grade)); },
    'cwSelectSubject':      function() { cwSelectSubject(el.dataset.subject); },
    'cwToggleCourse':       function() { cwToggleCourse(el.dataset.tag); },
    'cwSkipToCustom':       function() { cwSkipToCustom(); },
    'cwGoToStep2':          function() { cwGoToStep2(); },
    'cwGoToStep3':          function() { cwGoToStep3(); },
    'cwGoBack':             function() { cwGoBack(); },
    'cwFinishCreate':       function() { cwFinishCreate(); },
    'cmCreateToggle':       function() { cmCreateToggle(el, el.dataset.group); },
    'cmCreateToggleDecay':  function() { cmCreateToggle(el, el.dataset.group); document.getElementById('cm-cg-decay').style.display = el.classList.contains('active') && el.dataset.val === 'decayingAvg' ? '' : 'none'; },
    'cmRelinkCancel':       function() { cmRelinkCancel(); },
    'cmRelinkNext':         function() { cmRelinkNext(); },
    'cmRelinkConfirm':      function() { cmRelinkConfirm(el.dataset.mode); },
    'cmRelinkBack':         function() { cmRelinkStep = 1; renderClassManager(); },
    'goToStudent':          function() { window.location = 'student.html?id=' + el.dataset.sid + '&course=' + el.dataset.course; },
    'toggleFlag':           function() { toggleFlag(el.dataset.cid, el.dataset.sid); render(); },
    'toggleFlaggedFilter':  function() { showFlaggedOnly = !showFlaggedOnly; render(); },
    'createSectionWithColor': function() { createSectionWithColor(el.dataset.color); }
  };
  if (handlers[action]) {
    e.preventDefault();
    handlers[action]();
  }
});
</script>
