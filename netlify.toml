[build]
  command = "bash scripts/build.sh"
  publish = "dist"

# Sentry build plugin config:
# - skipSetCommits: the default sentry-cli `releases set-commits` step fails
#   because Netlify uses a shallow git clone (parent SHAs missing) AND we
#   have no Sentry → GitHub repo integration configured.
# - deployPreviews: skip the plugin entirely on PR previews — we only care
#   about Sentry release tagging on production deploys, and there are no
#   source maps to upload anyway (no bundler in this project).
[[plugins]]
  package = "@sentry/netlify-build-plugin"
  [plugins.inputs]
    skipSetCommits = true
    deployPreviews = false

[[headers]]
  for = "/**/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/**/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/**/*.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/**/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[edge_functions]]
  path = "/*"
  function = "inject-env"

# Root → login
[[redirects]]
  from = "/"
  to = "/login.html"
  status = 200

# Legacy URL redirects
[[redirects]]
  from = "/app.html"
  to = "/teacher/app.html"
  status = 301

[[redirects]]
  from = "/app"
  to = "/teacher/app.html"
  status = 301

[[redirects]]
  from = "/mobile.html"
  to = "/teacher-mobile/"
  status = 301

[[redirects]]
  from = "/mobile"
  to = "/teacher-mobile/"
  status = 301

# ── Future portals ───────────────────────────────────────────────────────────
# These redirects are wired up now so the URLs work the moment index.html exists.
# Do NOT build UI here yet — just reserving the routes.

[[redirects]]
  from = "/student"
  to = "/student/index.html"
  status = 200

[[redirects]]
  from = "/parent"
  to = "/parent/index.html"
  status = 200
