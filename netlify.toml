[build]
  command = "bash scripts/build.sh"
  publish = "dist"

# Sentry build plugin: skip set-commits since we don't have a Sentry → GitHub
# repo integration, and the build runs on a shallow clone that lacks the parent
# commits set-commits would walk. The release tag and source-map upload still
# run (no maps to upload yet — vanilla JS, no bundler).
[[plugins]]
  package = "@sentry/netlify-build-plugin"
  [plugins.inputs]
    setCommits = "skip"

[[headers]]
  for = "/**/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/**/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/**/*.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/**/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[edge_functions]]
  path = "/*"
  function = "inject-env"

# Root → login
[[redirects]]
  from = "/"
  to = "/login.html"
  status = 200

# Legacy URL redirects
[[redirects]]
  from = "/app.html"
  to = "/teacher/app.html"
  status = 301

[[redirects]]
  from = "/app"
  to = "/teacher/app.html"
  status = 301

[[redirects]]
  from = "/mobile.html"
  to = "/teacher-mobile/"
  status = 301

[[redirects]]
  from = "/mobile"
  to = "/teacher-mobile/"
  status = 301

# ── Future portals ───────────────────────────────────────────────────────────
# These redirects are wired up now so the URLs work the moment index.html exists.
# Do NOT build UI here yet — just reserving the routes.

[[redirects]]
  from = "/student"
  to = "/student/index.html"
  status = 200

[[redirects]]
  from = "/parent"
  to = "/parent/index.html"
  status = 200
