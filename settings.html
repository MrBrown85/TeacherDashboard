<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignments — Gradebook</title>
<link rel="stylesheet" href="gb-styles.css?v=3">
<link rel="stylesheet" href="assignments.css">
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>
<div class="page-layout" id="page-layout">
  <div id="sidebar-mount"></div>
  <div style="display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden">
    <div id="assess-toolbar-mount"></div>
    <main class="page-main" id="main"></main>
  </div>
</div>
<script src="vendor/supabase.min.js"></script>
<script src="gb-supabase.js"></script>
<script src="gb-constants.js"></script>
<script src="gb-data.js"></script>
<script src="gb-calc.js"></script>
<script src="gb-ui.js"></script>
<script src="gb-seed-data.js"></script>
<script>
requireAuth();
seedIfNeeded();
migrateAllStudents();
var activeCourse = getParam('course') || getActiveCourse();
setActiveCourse(activeCourse);
let openAssessIds = new Set(getParam('open') ? [getParam('open')] : []);
let focusStudentParam = getParam('student') || null;
// If arriving with a specific open param, start collapsed so only that card shows
let _allExpanded = !(getParam('open') && focusStudentParam);
let _collapsedIds = new Set();
let assessFilterType = 'all';
let assessSearch = '';
let showUngraded = false;
let rubricViewStates = {};  // { assessId: true/false } — true = rubric view, false = tag grid
let _rubricsPanelOpen = false;
let _advancedPanelOpen = false;
let _showingNewForm = false;      // whether the new assessment form is open
let _editingAssessId = null;      // id of assessment being edited (null = new)
let collapsedModules = {};  // { moduleId: true } — collapsed folder state
let _dragAssessId = null;  // currently dragged assessment id
let _dragModuleId = null;    // currently dragged module id (for reorder)
let _mergeTargetId = null;   // merge-to-module: target card being hovered
let _mergeHoverTimer = null; // merge-to-module: 300ms delay timer
let _mergeAnimating = false; // merge-to-module: true once animation active
let focusStudentId = focusStudentParam || null;   // student focus mode — show only this student's rows

async function switchCourse(cid) {
  activeCourse = cid; setActiveCourse(cid);
  await initData(cid);
  assessFilterType = 'all'; assessSearch = ''; showUngraded = false; focusStudentId = null;
  document.getElementById('sidebar-mount').innerHTML = renderSidebar(activeCourse, focusStudentId, 'toggleFocusStudent');
  render();
}

function toggleFocusStudent(sid) {
  if (focusStudentId === sid) {
    // Exiting focus mode — reset everything
    focusStudentId = null;
    openAssessIds.clear(); _allExpanded = true; _collapsedIds.clear();
  } else if (!focusStudentId) {
    // Entering focus mode from normal — expand all
    focusStudentId = sid;
    openAssessIds.clear(); _allExpanded = true; _collapsedIds.clear();
  } else {
    // Switching between students — keep current expand/collapse state
    focusStudentId = sid;
  }
  document.getElementById('sidebar-mount').innerHTML = renderSidebar(activeCourse, focusStudentId, 'toggleFocusStudent');
  render();
}
function clearFocusStudent() {
  focusStudentId = null;
  openAssessIds.clear(); _allExpanded = true; _collapsedIds.clear();
  document.getElementById('sidebar-mount').innerHTML = renderSidebar(activeCourse, focusStudentId, 'toggleFocusStudent');
  render();
}

function setAssessTypeFilter(val) {
  assessFilterType = val;
  render();
}
let _searchTimer = null;
function setAssessSearch(val) {
  assessSearch = (val || '').trim();
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    render();
    // Restore focus to search input after re-render
    const inp = document.querySelector('.assess-search-input');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }, 200);
}

function renderAssessToolbar(cid, method, dw, assessments) {
  const courseOptions = Object.values(COURSES).map(c =>
    `<option value="${c.id}"${c.id === cid ? ' selected' : ''}>${esc(c.name)}</option>`
  ).join('');

  let toolbarHtml = `<div class="assess-toolbar">
    <select class="assess-course-select" onchange="switchCourse(this.value)" aria-label="Select course">${courseOptions}</select>
    <div class="assess-seg-control" role="tablist" aria-label="Assessment type filter">
      <button class="assess-seg-btn${assessFilterType==='all'?' active':''}" data-action="setAssessTypeFilter" data-type="all" role="tab" aria-selected="${assessFilterType==='all'}">All</button>
      <button class="assess-seg-btn${assessFilterType==='summative'?' active':''}" data-action="setAssessTypeFilter" data-type="summative" role="tab" aria-selected="${assessFilterType==='summative'}">Summative</button>
      <button class="assess-seg-btn${assessFilterType==='formative'?' active':''}" data-action="setAssessTypeFilter" data-type="formative" role="tab" aria-selected="${assessFilterType==='formative'}">Formative</button>
    </div>
    <button class="assess-ungraded-chip${showUngraded?' active':''}" data-action="toggleUngraded" aria-pressed="${showUngraded}" aria-label="Show ungraded assessments only">⚠ Ungraded</button>
    <div class="assess-search-wrap">
      <span class="assess-search-icon" aria-hidden="true">🔍</span>
      <input class="assess-search-input" type="text" placeholder="Search…" value="${esc(assessSearch)}" oninput="setAssessSearch(this.value)" aria-label="Search assessments">
    </div>
    <div class="assess-seg-control" style="margin-left:4px">
      <button class="assess-seg-btn${(focusStudentId ? (_allExpanded && _collapsedIds.size===0) : false) ? ' active' : ''}" data-action="expandAllAssess">Expand</button>
      <button class="assess-seg-btn${(focusStudentId ? (!_allExpanded && openAssessIds.size===0) : openAssessIds.size===0) ? ' active' : ''}" data-action="collapseAllAssess">Collapse</button>
    </div>
    ${focusStudentId ? '<button class="tb-action-btn tb-show-all-btn" data-action="clearFocusStudent">Show All Students</button>' : ''}
    <div class="assess-toolbar-actions">
      <div class="tb-dropdown-wrap">
        <button class="tb-dropdown-btn${_rubricsPanelOpen?' open':''}" data-action="toggleToolbarDropdown" data-panel="rubrics">Rubrics</button>
        <div class="tb-dropdown-panel${_rubricsPanelOpen?' open':''}" id="tb-rubrics-panel"></div>
      </div>
      <div class="tb-dropdown-wrap">
        <button class="tb-dropdown-btn${_advancedPanelOpen?' open':''}" data-action="toggleToolbarDropdown" data-panel="advanced">Advanced</button>
        <div class="tb-dropdown-panel${_advancedPanelOpen?' open':''}" id="tb-advanced-panel"></div>
      </div>
      <button class="tb-action-btn" data-action="showNewForm">+ New Assessment</button>
    </div>
  </div>`;

  // Focus banner when grading a single student
  if (focusStudentId) {
    const focusSt = getStudents(cid).find(s => s.id === focusStudentId);
    if (focusSt) {
      toolbarHtml += `<div class="focus-banner">
        <span class="focus-banner-label">Grading: <strong>${esc(focusSt.firstName)} ${esc(focusSt.lastName)}</strong></span>
      </div>`;
    }
  }

  // Rubrics dropdown content
  const rubrics = getRubrics(cid);
  let rubHtml = `<div class="settings-title">Rubrics</div><ul class="rubric-list">`;
  if (rubrics.length === 0) {
    rubHtml += `<li style="font-size:0.82rem;color:var(--text-3);padding:8px 10px">No rubrics yet.</li>`;
  }
  rubrics.forEach(r => {
    rubHtml += `<li class="rubric-list-item">
      <span class="rubric-list-name">${esc(r.name)}</span>
      <span class="rubric-list-count">${r.criteria.length} criteria</span>
      <button class="rubric-list-btn" data-action="editRubricUI" data-rid="${r.id}" title="Edit">✎</button>
      <button class="rubric-list-btn delete" data-action="deleteRubricUI" data-rid="${r.id}" title="Delete" aria-label="Delete rubric">✕</button>
    </li>`;
  });
  rubHtml += `</ul><button class="lo-add-btn" data-action="newRubricUI" style="display:block;width:100%">+ New Rubric</button>`;

  // Advanced dropdown content
  let advHtml = `<div class="settings-title">Calculation</div>
    <div class="settings-row"><label>Method</label><select class="form-input" style="width:auto" onchange="updateCalc(this.value)"><option value="mostRecent"${method==='mostRecent'?' selected':''}>Most Recent</option><option value="highest"${method==='highest'?' selected':''}>Highest</option><option value="mode"${method==='mode'?' selected':''}>Mode</option><option value="decayingAvg"${method==='decayingAvg'?' selected':''}>Decaying Average</option></select></div>
    <div id="decay-row" style="display:${method==='decayingAvg'?'flex':'none'}" class="settings-row"><label>Weight: <span id="decay-val">${(dw*100).toFixed(0)}%</span></label><input type="range" min="0" max="100" value="${(dw*100).toFixed(0)}" oninput="updateDecay(this.value)"></div>
    ${renderGradingScaleEditor(cid)}
    ${renderCategoryWeightsEditor(cid)}
    <div class="settings-title" style="margin-top:16px;padding-top:12px;border-top:0.5px solid rgba(0,0,0,0.06)">Data</div>
    <div class="settings-row"><label>Export</label><button class="btn btn-primary" data-action="exportData">JSON</button></div>
    <div class="settings-row"><label>Export Scores</label><button class="btn btn-primary" data-action="exportScoresCSV">Export Scores CSV</button></div>
    <div class="settings-row"><label>Export Summary</label><button class="btn btn-primary" data-action="exportSummaryCSV">Export Summary CSV</button></div>
    <div class="settings-row"><label>Import</label><input type="file" accept=".json" onchange="importData(this)" style="font-size:0.75rem;max-width:150px"></div>
    <div class="settings-row"><label>Clear all</label><button class="btn btn-danger" data-action="clearData">Clear</button></div>
    <div class="settings-title" style="margin-top:16px;padding-top:12px;border-top:0.5px solid rgba(0,0,0,0.06)">Demo</div>
    <div class="settings-row"><label>Reset to demo data</label><button class="btn btn-danger" data-action="resetDemoData">Reset Demo</button></div>`;

  return { toolbarHtml, rubHtml, advHtml };
}

function renderAssessmentList(cid, assessments, allAssessments, students, scores, modules) {
  let html = `<div class="settings-grid" style="display:grid;grid-template-columns:1fr;gap:20px;align-items:start;padding:16px 20px">`;

  // LEFT: Assessment list with inline scoring
  html += '<div>';

  // New assessment form (persists across re-renders via _showingNewForm flag)
  html += `<div id="new-assess-form" style="display:${_showingNewForm ? 'block' : 'none'};background:#fff;border:2px solid var(--active);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,122,255,0.12)">
    ${_showingNewForm ? renderAssessForm(cid, _editingAssessId ? getAssessments(cid).find(a => a.id === _editingAssessId) : null) : ''}
  </div>`;

  // ── Assessment cards grouped by module folders ──────────────
  function renderAssessCard(a, isUncategorized) {
    const isOpen = focusStudentId
      ? (_allExpanded ? !_collapsedIds.has(a.id) : openAssessIds.has(a.id))
      : openAssessIds.has(a.id);
    const tagObjs = (a.tagIds||[]).map(tid => getTagById(cid, tid)).filter(Boolean);
    let c = `<div class="assess-card${isOpen?' open active':''}" id="ac-${a.id}" draggable="true"
      ondragstart="onAssessDragStart(event,'${a.id}')" ondragend="onAssessDragEnd(event)"
      ${isUncategorized ? `ondragover="onAssessCardDragOver(event,'${a.id}')" ondragleave="onAssessCardDragLeave(event,'${a.id}')" ondrop="onAssessCardDrop(event,'${a.id}')"` : ''}>
      <div class="assess-header" data-action="toggleAssess" data-aid="${a.id}">
        <span class="type-badge ${a.type==='summative'?'type-badge-s':'type-badge-f'}">${a.type==='summative'?'S':'F'}</span>
        <div class="assess-header-info">
          <span class="assess-title">${esc(a.title)}</span>
          <span class="assess-meta">
            ${a.rubricId ? (() => { const r = getRubricById(cid, a.rubricId); return r ? '<span class="rubric-badge">📋 '+esc(r.name)+'</span>' : ''; })() : ''}
            ${(a.coreCompetencyIds||[]).map(ccId => { const cc = getCoreCompetency(ccId); return cc ? '<span class="cc-badge" title="'+esc(cc.label)+'" style="border-color:'+cc.color+';color:'+cc.color+'">'+esc(cc.id)+'</span>' : ''; }).join('')}
            ${a.collaboration && a.collaboration !== 'individual' ? `<span class="collab-badge">👥 ${a.collaboration[0].toUpperCase()+a.collaboration.slice(1)}</span>` : ''}

            <span class="assess-date">${a.dateAssigned ? formatDate(a.dateAssigned)+' → ' : ''}${formatDate(a.date)}</span>
            ${(() => { if (a.dueDate) { const isPastDue = new Date(a.dueDate) < new Date(); if (isPastDue) { const unscoredCount = students.filter(st => { const sc = scores[st.id] || []; return !sc.some(s => s.assessmentId === a.id && s.score > 0); }).length; if (unscoredCount > 0) return '<span style="font-family:\'SF Mono\', ui-monospace, \'Menlo\', monospace;font-size:0.6rem;color:var(--priority);margin-left:6px" title="' + unscoredCount + ' students unscored past due date">\u26A0 ' + unscoredCount + ' missing</span>'; } } return ''; })()}
          </span>
        </div>
        <div class="assess-header-actions" data-stop-prop="true">
          ${a.rubricId && getRubricById(cid, a.rubricId) ? (() => {
            const showRubric = rubricViewStates[a.id] !== undefined ? rubricViewStates[a.id] : true;
            return `<div class="rubric-view-toggle">
              <button class="rubric-view-btn${!showRubric ? ' active' : ''}" data-action="setRubricView" data-aid="${a.id}" data-rubric="false">Tags</button>
              <button class="rubric-view-btn${showRubric ? ' active' : ''}" data-action="setRubricView" data-aid="${a.id}" data-rubric="true">Rubric</button>
            </div>`;
          })() : ''}
          <button class="assess-header-action-btn" data-action="editAssess" data-aid="${a.id}" title="Edit">✏️</button>
          <button class="assess-header-action-btn" data-action="dupeAssess" data-aid="${a.id}" title="Duplicate">📄</button>
          <button class="assess-header-action-btn action-delete" data-action="deleteAssess" data-aid="${a.id}" title="Delete assessment" aria-label="Delete assessment">🗑️</button>
        </div>
        <span class="assess-chevron">${isOpen ? '▾' : '▸'}</span>
      </div>
      <div class="assess-body">
        ${a.description ? `<div style="font-size:0.88rem;color:var(--text-2);margin:8px 0 12px;line-height:1.5;padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm)">${esc(a.description)}</div>` : ''}
        ${(() => { const gridStudents = focusStudentId ? students.filter(st => st.id === focusStudentId) : students;
        return a.scoreMode === 'points' ? renderPointsGrid(cid, a, gridStudents, scores)
        : a.rubricId && getRubricById(cid, a.rubricId) ? (() => {
          const showRubric = rubricViewStates[a.id] !== undefined ? rubricViewStates[a.id] : true;
          return showRubric ? renderRubricGradingView(cid, a, gridStudents, scores) : renderTagGrid(cid, a, tagObjs, gridStudents, scores);
        })() : renderTagGrid(cid, a, tagObjs, gridStudents, scores); })()}
      </div>
    </div>`;
    return c;
  }

  // Group assessments by module
  const grouped = {};
  modules.forEach(u => { grouped[u.id] = []; });
  grouped['__none__'] = [];
  assessments.forEach(a => {
    const key = (a.moduleId && grouped[a.moduleId]) ? a.moduleId : '__none__';
    grouped[key].push(a);
  });

  // When any filter is active, hide module folders with 0 matching assignments
  const filtersActive = assessFilterType !== 'all' || showUngraded || !!assessSearch;

  // Render module folders with drop zones for reordering
  modules.forEach((u, idx) => {
    const items = grouped[u.id];
    // Skip empty folders when filters are narrowing results
    if (filtersActive && items.length === 0) return;
    const isOpen = !collapsedModules[u.id];
    const containsOpen = openAssessIds.size > 0 && items.some(a => openAssessIds.has(a.id));
    const folderOpen = isOpen || containsOpen;
    // Drop zone before this folder (for module reorder)
    html += `<div class="mod-drop-zone" data-drop-index="${idx}"
      ondragover="onModuleDropZoneOver(event)" ondragleave="onModuleDropZoneLeave(event)" ondrop="onModuleDropZoneDrop(event,${idx})"></div>`;
    html += `<div class="mod-folder${folderOpen ? ' open' : ''}" data-module-id="${u.id}" draggable="true"
      ondragstart="onModuleDragStart(event,'${u.id}')" ondragend="onModuleDragEnd(event)"
      ondragover="onFolderDragOver(event,'${u.id}')" ondragleave="onFolderDragLeave(event)" ondrop="onFolderDrop(event,'${u.id}')">
      <div class="mod-folder-header" data-action="toggleModuleFolder" data-uid="${u.id}">
        <span class="mod-folder-grip">⠿</span>
        <span class="mod-folder-chevron">▶</span>
        <span class="mod-folder-color" style="background:${u.color||'#6366f1'}" title="Change color" data-action="openColorPicker" data-stop-prop="true">
          <input type="color" value="${u.color||'#6366f1'}" onchange="event.stopPropagation();updateModuleColor('${u.id}',this.value)">
        </span>
        <input class="mod-folder-name-input" value="${esc(u.name)}" draggable="false"
          data-stop-prop="true" onblur="updateModuleName('${u.id}',this.value)"
          onkeydown="if(event.key==='Enter'){this.blur()}">
        <span class="mod-folder-meta">${items.length} assignment${items.length!==1?'s':''}</span>
        <div class="mod-folder-actions" data-stop-prop="true">
          <button class="mod-folder-action delete" data-action="deleteModule" data-uid="${u.id}" data-count="${items.length}" title="Delete module">✕</button>
        </div>
      </div>
      <div class="mod-folder-body">
        ${items.length > 0 ? items.map(a => renderAssessCard(a)).join('') : '<div class="mod-folder-empty">Drop assignments here or create a new one</div>'}
      </div>
    </div>`;
  });
  // Final drop zone after last module (for reordering to end)
  if (modules.length > 0) {
    html += `<div class="mod-drop-zone" data-drop-index="${modules.length}"
      ondragover="onModuleDropZoneOver(event)" ondragleave="onModuleDropZoneLeave(event)" ondrop="onModuleDropZoneDrop(event,${modules.length})"></div>`;
  }

  // Ungrouped assessments — show "Unassigned" folder only when relevant
  const ungrouped = grouped['__none__'];
  if (modules.length === 0) {
    // No modules exist — render cards flat
    ungrouped.forEach(a => { html += renderAssessCard(a, true); });
  } else if (filtersActive && ungrouped.length === 0) {
    // Filters active and no matching unassigned items — hide folder entirely
  } else {
    const noModOpen = !collapsedModules['__none__'];
    const containsOpenNoMod = openAssessIds.size > 0 && ungrouped.some(a => openAssessIds.has(a.id));
    const folderOpen = (ungrouped.length > 0 && noModOpen) || containsOpenNoMod;
    html += `<div class="mod-folder no-module${folderOpen ? ' open' : ''}${ungrouped.length === 0 ? ' empty-target' : ''}" data-module-id="__none__"
      ondragover="onFolderDragOver(event,'__none__')" ondragleave="onFolderDragLeave(event)" ondrop="onFolderDrop(event,'__none__')">
      <div class="mod-folder-header" data-action="toggleModuleFolder" data-uid="__none__">
        <span class="mod-folder-chevron">▶</span>
        <span style="font-size:0.88rem;color:var(--text-3)">📁</span>
        <span class="mod-folder-name" style="font-size:0.95rem;font-weight:500;color:var(--text-3)">Unassigned</span>
        <span class="mod-folder-meta">${ungrouped.length} assignment${ungrouped.length!==1?'s':''}</span>
      </div>
      <div class="mod-folder-body">
        ${ungrouped.length > 0 ? ungrouped.map(a => renderAssessCard(a, true)).join('') : '<div class="mod-folder-empty">Drop assignments here to unassign from a module</div>'}
      </div>
    </div>`;
  }

  // Add module button
  html += `<button class="add-module-btn" data-action="addModuleInline">+ Add Module</button>`;

  if (assessments.length === 0 && allAssessments.length > 0) {
    html += `<div style="text-align:center;color:var(--text-3);padding:40px 0">
      <div style="font-size:1.2rem;margin-bottom:6px;opacity:0.4">📋</div>
      <div style="font-size:0.88rem;margin-bottom:4px">No matching assignments.</div>
      <div style="font-size:0.78rem">Try adjusting your filters or <a href="#" data-action="clearAssessFilters" style="color:var(--active)">clear all filters</a>.</div>
    </div>`;
  } else if (assessments.length === 0 && allAssessments.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-state-icon">📝</div>
      <div class="empty-state-title">No assignments yet</div>
      <div class="empty-state-text">Create your first assignment to start grading.</div>
    </div>`;
  }
  html += '</div>';

  html += '</div>'; // close settings-grid

  return html;
}

function render() {
  const cid = activeCourse;
  const course = COURSES[cid];
  const cc = getCourseConfig(cid);
  const method = cc.calcMethod || course.calcMethod || 'mostRecent';
  const dw = cc.decayWeight != null ? cc.decayWeight : (course.decayWeight || 0.65);
  const sections = getSections(cid);
  const allAssessments = getAssessments(cid).sort((a,b) => (b.date||'').localeCompare(a.date||''));
  const students = sortStudents(getStudents(cid), 'lastName');
  const scores = getScores(cid);
  const modules = getModules(cid);

  // Apply filters
  let assessments = allAssessments;
  if (assessFilterType !== 'all') assessments = assessments.filter(a => a.type === assessFilterType);
  if (assessSearch) {
    const q = assessSearch.toLowerCase();
    assessments = assessments.filter(a =>
      (a.title||'').toLowerCase().includes(q) ||
      (a.description||'').toLowerCase().includes(q) ||
      (a.tagIds||[]).some(tid => {
        const tag = getTagById(cid, tid);
        return tid.toLowerCase().includes(q) ||
               (tag && tag.label.toLowerCase().includes(q));
      }) ||
      (a.moduleId && (() => {
        const mod = getModuleById(cid, a.moduleId);
        return mod && mod.name.toLowerCase().includes(q);
      })())
    );
  }
  if (showUngraded) {
    assessments = assessments.filter(a => {
      return students.some(st => {
        const sc = scores[st.id] || [];
        return !(a.tagIds || []).every(tid => sc.some(s => s.assessmentId === a.id && s.tagId === tid && s.score > 0));
      });
    });
  }

  // Render toolbar
  const { toolbarHtml, rubHtml, advHtml } = renderAssessToolbar(cid, method, dw, assessments);
  document.getElementById('assess-toolbar-mount').innerHTML = toolbarHtml;
  document.getElementById('tb-rubrics-panel').innerHTML = rubHtml;
  document.getElementById('tb-advanced-panel').innerHTML = advHtml;

  // Render assessment list
  document.getElementById('main').innerHTML = renderAssessmentList(cid, assessments, allAssessments, students, scores, modules);

  // Show/hide persistent descriptor bar based on whether any open assessment has rubric view active
  let hasActiveRubricView = false;
  if (openAssessIds.size > 0 || (focusStudentId && _allExpanded)) {
    const checkIds = focusStudentId && _allExpanded ? assessments.map(a => a.id) : [...openAssessIds];
    hasActiveRubricView = checkIds.some(aid => {
      if (focusStudentId && _allExpanded && _collapsedIds.has(aid)) return false;
      const a = assessments.find(x => x.id === aid);
      return a && a.rubricId && getRubricById(cid, a.rubricId) &&
        (rubricViewStates[a.id] !== undefined ? rubricViewStates[a.id] : true);
    });
  }
  if (hasActiveRubricView) showDescriptorBar();
  else hideDescriptorBar();
}

function renderAssessForm(cid, assess) {
  const sections = getSections(cid);
  const isEdit = !!assess;
  const title = assess ? assess.title : '';
  const dateAssigned = assess ? (assess.dateAssigned || assess.date || '') : new Date().toISOString().slice(0,10);
  const dateDue = assess ? (assess.date || '') : new Date().toISOString().slice(0,10);
  const dueDate = assess ? (assess.dueDate || '') : '';
  const type = assess ? assess.type : 'summative';
  const selTags = assess ? (assess.tagIds||[]) : [];
  const evidence = assess ? assess.evidenceType : 'written';
  const description = assess ? (assess.description || '') : '';
  const moduleId = assess ? (assess.moduleId || '') : '';
  const collaboration = assess ? (assess.collaboration || 'individual') : 'individual';
  newCollaboration = collaboration;
  const modules = getModules(cid);

  let html = '';

  // Title
  html += `<div class="af-field">
    <label class="af-label">Assignment Title</label>
    <input class="af-input" id="af-title" type="text" value="${esc(title)}" placeholder="e.g. Persuasive Essay — Rights & Freedoms" oninput="this.style.border=''">
  </div>`;

  // Description
  html += `<div class="af-field">
    <label class="af-label">Description</label>
    <textarea class="af-textarea" id="af-desc" rows="1" placeholder="Describe the assignment, expectations, and criteria…">${esc(description)}</textarea>
  </div>`;

  // Rubric selector — right after Description for prominence
  const rubricsList = getRubrics(cid);
  const selRubricId = assess ? (assess.rubricId || '') : '';
  html += `<div class="af-field">
    <label class="af-label">Rubric</label>
    <div style="display:flex;gap:8px;align-items:center">
      <select class="af-rubric-select" id="af-rubric" onchange="onRubricSelect(this.value)" style="flex:1">
        <option value="">None</option>
        ${rubricsList.map(r => `<option value="${r.id}"${r.id===selRubricId?' selected':''}>${esc(r.name)} (${r.criteria.length} criteria)</option>`).join('')}
      </select>
      <button type="button" class="btn btn-ghost" data-action="newRubricFromForm" style="white-space:nowrap;font-size:0.78rem;padding:7px 12px">+ New Rubric</button>
    </div>
    ${selRubricId ? '<div class="af-rubric-info">Rubric tags are auto-selected below. You can add additional tags.</div>' : ''}
  </div>`;

  // Row 1: Today's date (read-only), Date Assigned, Due Date
  const today = new Date().toISOString().slice(0,10);
  const defaultDue = dueDate || (dateAssigned ? (() => { const d = new Date(dateAssigned + 'T12:00:00'); d.setDate(d.getDate()+7); return d.toISOString().slice(0,10); })() : (() => { const d = new Date(); d.setDate(d.getDate()+7); return d.toISOString().slice(0,10); })());
  const todayFormatted = new Date(today+'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  html += `<div class="af-row" style="align-items:end">
    <div class="af-field" style="flex:0 0 auto">
      <label class="af-label">Today's Date</label>
      <div style="font-family:var(--font-base);font-size:0.88rem;font-weight:500;color:var(--text);padding:8px 0;white-space:nowrap">${todayFormatted}</div>
    </div>
    <div class="af-field" style="flex:1;max-width:200px">
      <label class="af-label">Date Assigned</label>
      <input class="af-input" id="af-date-assigned" type="date" value="${dateAssigned}" onchange="autoSetDueDate()">
    </div>
    <div class="af-field" style="flex:1;max-width:200px">
      <label class="af-label">Due Date (optional)</label>
      <input class="af-input" id="af-due" type="date" value="${defaultDue}">
    </div>
  </div>`;

  // Row 2: Type, Evidence Type, Collaboration, Module, Scoring, Weight
  const scoreMode = assess ? (assess.scoreMode || 'proficiency') : 'proficiency';
  const maxPoints = assess ? (assess.maxPoints || 100) : 100;
  const weight = assess ? (assess.weight || 1) : 1;
  html += `<div class="af-row">
    <div class="af-field" style="flex:1">
      <label class="af-label">Type</label>
      <div class="af-type-toggle">
        <button class="af-type-btn${type==='summative'?' active':''}" id="af-type-sum" data-action="setType" data-type="summative">Summative</button>
        <button class="af-type-btn${type==='formative'?' active':''}" id="af-type-form" data-action="setType" data-type="formative">Formative</button>
      </div>
    </div>
    <div class="af-field" style="flex:1">
      <label class="af-label">Evidence Type</label>
      <select class="af-input" id="af-evidence">${['written','observation','audio','video','photo','conversation'].map(t => `<option value="${t}"${t===evidence?' selected':''}>${t[0].toUpperCase()+t.slice(1)}</option>`).join('')}</select>
    </div>
    <div class="af-field" style="flex:1.3;min-width:210px">
      <label class="af-label">Collaboration</label>
      <div class="af-type-toggle">
        <button class="af-type-btn af-collab-btn${collaboration==='individual'?' active':''}" data-collab="individual" data-action="setCollaboration" data-collab="individual">Individual</button>
        <button class="af-type-btn af-collab-btn${collaboration==='pair'?' active':''}" data-collab="pair" data-action="setCollaboration" data-collab="pair">Pair</button>
        <button class="af-type-btn af-collab-btn${collaboration==='group'?' active':''}" data-collab="group" data-action="setCollaboration" data-collab="group">Group</button>
      </div>
    </div>
    <div class="af-field" style="flex:1">
      <label class="af-label">Module</label>
      <select class="af-input" id="af-module">
        <option value="">No Module</option>
        ${modules.map(u => `<option value="${u.id}"${u.id===moduleId?' selected':''}>${esc(u.name)}</option>`).join('')}
      </select>
    </div>
  </div>
  <div id="collab-panel-mount"></div>`;

  html += `<div class="af-row" style="align-items:end">
    <div class="af-field" style="flex:0 0 auto">
      <label class="af-label">Scoring Mode</label>
      <input type="hidden" id="af-scoremode" value="${scoreMode}">
      <div class="af-type-toggle">
        <button type="button" class="af-type-btn af-scoremode-btn${scoreMode==='proficiency'?' active':''}" data-mode="proficiency" data-action="setScoreMode" data-mode="proficiency">Proficiency</button>
        <button type="button" class="af-type-btn af-scoremode-btn${scoreMode==='points'?' active':''}" data-mode="points" data-action="setScoreMode" data-mode="points">Points</button>
      </div>
    </div>
    <div class="af-field" id="af-maxpoints-wrap" style="flex:0 0 auto;${scoreMode==='points'?'':'display:none'}">
      <label class="af-label">Max Points</label>
      <div style="display:flex;gap:6px;align-items:center">
        <input class="af-input" id="af-maxpoints" type="number" min="1" max="9999" value="${maxPoints}" style="width:80px;text-align:center" oninput="this.style.border=''">
        <div id="af-maxpoints-wrap" style="display:flex;gap:4px">${[10,25,50,100].map(v => `<button type="button" class="af-chip${maxPoints===v?' active':''}" data-action="setMaxPoints" data-value="${v}" style="padding:4px 8px;font-size:0.72rem;border-radius:6px;border:1px solid var(--border);background:${maxPoints===v?'var(--primary)':'var(--bg-2)'};color:${maxPoints===v?'#fff':'var(--text-2)'};cursor:pointer">${v}</button>`).join('')}</div>
      </div>
    </div>
    <div class="af-field" style="flex:0 0 auto">
      <label class="af-label">Weight</label>
      <select class="af-input" id="af-weight" style="width:80px">
        ${[0.5,1,1.5,2,3].map(w => `<option value="${w}"${w===weight?' selected':''}>${w}x</option>`).join('')}
      </select>
    </div>
  </div>`;

  // Tags — vertical list per section
  html += `<div class="af-field">
    <label class="af-label">Learning Outcomes</label>
    <div class="af-tags-container">`;

  sections.forEach(sec => {
    const checkedCount = sec.tags.filter(t => selTags.includes(t.id)).length;
    const hasChecked = checkedCount > 0;
    html += `<div class="af-section-group${hasChecked ? ' af-section-open' : ''}">
      <div class="af-section-header" style="border-left-color:${sec.color}" data-action="toggleSectionOpen">
        <span class="af-section-chevron">▶</span>
        <span class="af-section-name" style="color:${sec.color}">${esc(sec.name)}</span>
        ${checkedCount > 0 ? `<span class="af-section-badge" style="background:${sec.color}">${checkedCount}</span>` : ''}
        <button class="af-select-all" data-action="toggleSectionTags" data-secid="${sec.id}" data-stop-prop="true">Select All</button>
      </div>
      <div class="af-section-tags">`;
    sec.tags.forEach(tag => {
      const checked = selTags.includes(tag.id);
      html += `<label class="af-tag-item${checked?' checked':''}" data-section="${sec.id}">
        <input type="checkbox" value="${tag.id}" class="af-tag-cb" data-section="${sec.id}"${checked?' checked':''} onchange="onTagChange(this,'${sec.id}')">
        <span class="af-tag-id" style="color:${sec.color}">${esc(tag.id)}</span>
        <span class="af-tag-name">${esc(tag.label)}</span>
      </label>`;
    });
    html += `</div></div>`;
  });

  html += `</div></div>`;

  // Core Competencies — toggleable chips
  const selCC = assess ? (assess.coreCompetencyIds || []) : [];
  html += `<div class="af-field">
    <label class="af-label">Core Competencies</label>
    <div class="af-cc-chips">`;
  CORE_COMPETENCIES.forEach(cc => {
    const sel = selCC.includes(cc.id);
    html += `<button type="button" class="af-cc-chip${sel?' active':''}" data-cc="${cc.id}"
      style="--cc-color:${cc.color}" data-action="toggleActive">
      <span class="af-cc-dot" style="background:${cc.color}"></span>${esc(cc.label)}
    </button>`;
  });
  html += `</div></div>`;

  // Actions
  html += `<div class="af-actions">
    <button class="btn btn-ghost" data-action="hideNewForm">Cancel</button>
    <button class="btn btn-primary" data-action="${isEdit ? 'saveEditAssess' : 'saveNewAssess'}" data-aid="${isEdit ? assess.id : ''}">${isEdit ? 'Save Changes' : 'Create Assessment'}</button>
  </div>`;

  return html;
}

function autoSetDueDate() {
  const assigned = document.getElementById('af-date-assigned')?.value;
  if (!assigned) return;
  const d = new Date(assigned + 'T12:00:00');
  d.setDate(d.getDate() + 7);
  const dueEl = document.getElementById('af-due');
  if (dueEl) dueEl.value = d.toISOString().slice(0,10);
}

let newType = 'summative';
let newCollaboration = 'individual';

function setType(t) {
  newType = t;
  const s = document.getElementById('af-type-sum');
  const f = document.getElementById('af-type-form');
  if (s) s.className = 'af-type-btn' + (t==='summative'?' active':'');
  if (f) f.className = 'af-type-btn' + (t==='formative'?' active':'');
}
function setScoreMode(mode) {
  document.querySelectorAll('.af-scoremode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('af-scoremode').value = mode;
  document.getElementById('af-maxpoints-wrap').style.display = mode === 'points' ? '' : 'none';
}

// ── Collaboration state ──
let collabExcluded = new Set();   // student IDs excluded from individual assignment
let collabPairs = [];             // [ [sid, sid], [sid, sid, sid], ... ]
let collabGroups = [];            // [ [sid, ...], [sid, ...], ... ]
let collabGroupCount = 4;         // default number of groups
let collabPairMode = 'random';    // 'random' | 'manual'
let collabGroupMode = 'random';   // 'random' | 'manual'
let _dragSid = null;              // currently dragged student
let _dragFromGroup = null;        // source group index

function setCollaboration(mode) {
  newCollaboration = mode;
  document.querySelectorAll('.af-collab-btn').forEach(b => {
    b.className = 'af-type-btn af-collab-btn' + (b.dataset.collab === mode ? ' active' : '');
  });
  renderCollabPanel();
}

function getCollabStudents() {
  return sortStudents(getStudents(activeCourse), 'lastName');
}

function renderCollabPanel() {
  const mount = document.getElementById('collab-panel-mount');
  if (!mount) return;
  const students = getCollabStudents();

  if (newCollaboration === 'individual') {
    // Individual: student checklist
    let html = `<div class="collab-panel">
      <div class="collab-panel-header">
        <span class="collab-panel-title">Assign to Students</span>
        <div class="collab-panel-actions">
          <button class="collab-panel-btn" data-action="collabCheckAll">Check All</button>
          <button class="collab-panel-btn" data-action="collabCheckNone">Check None</button>
        </div>
      </div>
      <div class="collab-student-grid">`;
    students.forEach(s => {
      const checked = !collabExcluded.has(s.id);
      html += `<label class="collab-student-item${checked ? '' : ' excluded'}">
        <input type="checkbox" ${checked ? 'checked' : ''} onchange="collabToggleStudent('${s.id}', this.checked)">
        <span>${esc(displayName(s))}</span>
      </label>`;
    });
    html += `</div>
      <div style="margin-top:8px;font-family:'SF Mono',monospace;font-size:0.6rem;color:var(--text-3)">
        ${students.length - collabExcluded.size} of ${students.length} students assigned
      </div>
    </div>`;
    mount.innerHTML = html;

  } else if (newCollaboration === 'pair') {
    // Pairs mode
    let html = `<div class="collab-panel">
      <div class="collab-panel-header">
        <span class="collab-panel-title">Pair Students</span>
        <div class="collab-panel-actions">
          <button class="collab-panel-btn${collabPairMode==='random'?' active':''}" data-action="collabRandomPairs">Random Pairs</button>
          <button class="collab-panel-btn${collabPairMode==='manual'?' active':''}" data-action="collabManualPairs">Manual</button>
        </div>
      </div>`;

    if (collabPairs.length === 0) {
      html += `<div style="text-align:center;padding:20px;color:var(--text-3);font-size:0.82rem">
        Click <strong>Random Pairs</strong> to auto-pair, or <strong>Manual</strong> to drag students into pairs.
      </div>`;
    } else {
      html += `<div class="collab-groups-container">`;
      collabPairs.forEach((pair, gi) => {
        html += `<div class="collab-group-card" data-group="${gi}"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="collabDrop(event, ${gi})">
          <div class="collab-group-header">
            <span>Pair ${gi + 1}</span>
            <span>${pair.length} student${pair.length !== 1 ? 's' : ''}</span>
          </div>`;
        pair.forEach(sid => {
          const st = students.find(s => s.id === sid);
          if (!st) return;
          html += `<div class="collab-group-member" draggable="true"
            ondragstart="collabDragStart(event,'${sid}',${gi})">
            <span class="member-avatar">${initials(st)}</span>
            <span>${esc(displayName(st))}</span>
          </div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
    mount.innerHTML = html;

  } else if (newCollaboration === 'group') {
    // Groups mode
    const total = students.length;
    const perGroup = Math.floor(total / collabGroupCount);
    const remainder = total % collabGroupCount;
    const sizeDesc = remainder > 0
      ? `${collabGroupCount - remainder} groups of ${perGroup}, ${remainder} of ${perGroup + 1}`
      : `${collabGroupCount} groups of ${perGroup}`;

    let html = `<div class="collab-panel">
      <div class="collab-panel-header">
        <span class="collab-panel-title">Group Students</span>
        <div class="collab-panel-actions">
          <button class="collab-panel-btn${collabGroupMode==='random'?' active':''}" data-action="collabRandomGroups">Randomize</button>
          <button class="collab-panel-btn${collabGroupMode==='manual'?' active':''}" data-action="collabManualGroups">Manual</button>
        </div>
      </div>
      <div class="collab-stepper">
        <span class="collab-stepper-label">Number of groups</span>
        <div class="collab-stepper-controls">
          <button class="collab-stepper-btn" data-action="collabSetGroupCount" data-delta="-1">−</button>
          <div class="collab-stepper-val">${collabGroupCount}</div>
          <button class="collab-stepper-btn" data-action="collabSetGroupCount" data-delta="1">+</button>
        </div>
        <span class="collab-stepper-info">${sizeDesc} · ${total} students</span>
      </div>`;

    if (collabGroups.length === 0) {
      html += `<div style="text-align:center;padding:20px;color:var(--text-3);font-size:0.82rem">
        Click <strong>Randomize</strong> to auto-assign groups, or <strong>Manual</strong> to drag students.
      </div>`;
    } else {
      html += `<div class="collab-groups-container">`;
      collabGroups.forEach((group, gi) => {
        html += `<div class="collab-group-card" data-group="${gi}"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="collabDrop(event, ${gi})">
          <div class="collab-group-header">
            <span>Group ${gi + 1}</span>
            <span>${group.length} student${group.length !== 1 ? 's' : ''}</span>
          </div>`;
        group.forEach(sid => {
          const st = students.find(s => s.id === sid);
          if (!st) return;
          html += `<div class="collab-group-member" draggable="true"
            ondragstart="collabDragStart(event,'${sid}',${gi})">
            <span class="member-avatar">${initials(st)}</span>
            <span>${esc(displayName(st))}</span>
          </div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
    mount.innerHTML = html;
  }
}

// ── Individual: toggle student ──
function collabToggleStudent(sid, checked) {
  if (checked) collabExcluded.delete(sid);
  else collabExcluded.add(sid);
  renderCollabPanel();
}
function collabCheckAll() { collabExcluded.clear(); renderCollabPanel(); }
function collabCheckNone() {
  getCollabStudents().forEach(s => collabExcluded.add(s.id));
  renderCollabPanel();
}

// ── Pairs: random ──
function collabRandomPairs() {
  const students = getCollabStudents();
  const shuffled = [...students].sort(() => Math.random() - 0.5);
  collabPairs = [];
  for (let i = 0; i < shuffled.length; i += 2) {
    if (i + 1 < shuffled.length) {
      collabPairs.push([shuffled[i].id, shuffled[i + 1].id]);
    } else {
      // Odd student out — add to last pair to make a group of 3
      if (collabPairs.length > 0) {
        collabPairs[collabPairs.length - 1].push(shuffled[i].id);
      } else {
        collabPairs.push([shuffled[i].id]);
      }
    }
  }
  collabPairMode = 'random';
  renderCollabPanel();
}

// ── Groups: random ──
function collabRandomGroups() {
  const students = getCollabStudents();
  const shuffled = [...students].sort(() => Math.random() - 0.5);
  collabGroups = Array.from({ length: collabGroupCount }, () => []);
  shuffled.forEach((s, i) => {
    collabGroups[i % collabGroupCount].push(s.id);
  });
  collabGroupMode = 'random';
  renderCollabPanel();
}

function collabSetGroupCount(delta) {
  const students = getCollabStudents();
  collabGroupCount = Math.max(2, Math.min(students.length, collabGroupCount + delta));
  if (collabGroups.length > 0) collabRandomGroups();
  else renderCollabPanel();
}

// ── Drag and drop ──
function collabDragStart(e, sid, fromGroup) {
  _dragSid = sid;
  _dragFromGroup = fromGroup;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', sid);
}

function collabDrop(e, toGroup) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (_dragSid == null || _dragFromGroup === toGroup) return;

  // Determine which array we're working with
  const arr = newCollaboration === 'pair' ? collabPairs : collabGroups;
  if (!arr[_dragFromGroup] || !arr[toGroup]) return;

  // Remove from source
  const idx = arr[_dragFromGroup].indexOf(_dragSid);
  if (idx >= 0) arr[_dragFromGroup].splice(idx, 1);

  // Add to target
  arr[toGroup].push(_dragSid);

  // Clean up empty groups
  if (newCollaboration === 'pair') {
    collabPairs = collabPairs.filter(g => g.length > 0);
  } else {
    collabGroups = collabGroups.filter(g => g.length > 0);
  }

  _dragSid = null;
  _dragFromGroup = null;
  renderCollabPanel();
}

// ── Load collaboration data from existing assessment ──
function loadCollabData(assess) {
  collabExcluded = new Set(assess?.excludedStudents || []);
  collabPairs = assess?.pairs ? JSON.parse(JSON.stringify(assess.pairs)) : [];
  collabGroups = assess?.groups ? JSON.parse(JSON.stringify(assess.groups)) : [];
  collabGroupCount = assess?.groupCount || 4;
  collabPairMode = collabPairs.length > 0 ? 'manual' : 'random';
  collabGroupMode = collabGroups.length > 0 ? 'manual' : 'random';
}

function showNewForm() {
  newType = 'summative';
  newCollaboration = 'individual';
  collabExcluded = new Set();
  collabPairs = [];
  collabGroups = [];
  collabGroupCount = 4;
  _showingNewForm = true;
  _editingAssessId = null;
  const form = document.getElementById('new-assess-form');
  if (form) {
    form.style.display = 'block';
    form.innerHTML = renderAssessForm(activeCourse, null);
    form.scrollIntoView({behavior:'smooth'});
    renderCollabPanel();
  }
}
function hideNewForm() {
  _showingNewForm = false;
  _editingAssessId = null;
  const form = document.getElementById('new-assess-form');
  if (form) form.style.display = 'none';
}

function toggleSectionTags(secId, btn) {
  const cbs = document.querySelectorAll(`.af-tag-cb[data-section="${secId}"]`);
  const allChecked = Array.from(cbs).every(cb => cb.checked);
  cbs.forEach(cb => { cb.checked = !allChecked; cb.parentElement.classList.toggle('checked', !allChecked); });
  updateSectionBadge(secId);
}

function onTagChange(cb, secId) {
  cb.parentElement.classList.toggle('checked', cb.checked);
  // Clear tag validation error when a tag is selected
  const tc = document.querySelector('.af-tags-container');
  if (tc) tc.style.border = '';
  updateSectionBadge(secId);
}

function updateSectionBadge(secId) {
  const cbs = document.querySelectorAll(`.af-tag-cb[data-section="${secId}"]`);
  const count = Array.from(cbs).filter(cb => cb.checked).length;
  const group = cbs[0]?.closest('.af-section-group');
  if (!group) return;
  const badge = group.querySelector('.af-section-badge');
  if (count > 0) {
    if (badge) { badge.textContent = count; }
    else {
      const header = group.querySelector('.af-section-header');
      const selectAll = header.querySelector('.af-select-all');
      const sec = getSections(activeCourse).find(s => s.id === secId);
      const b = document.createElement('span');
      b.className = 'af-section-badge';
      b.style.background = sec ? sec.color : 'var(--text-3)';
      b.textContent = count;
      header.insertBefore(b, selectAll);
    }
  } else {
    if (badge) badge.remove();
  }
}

function saveNewAssess() {
  const titleEl = document.getElementById('af-title');
  const title = (titleEl?.value||'').trim();
  if (!title) {
    if (titleEl) { titleEl.style.border = '2px solid var(--score-1)'; titleEl.placeholder = 'Title is required'; titleEl.focus(); }
    return;
  }
  const dateAssigned = document.getElementById('af-date-assigned')?.value || new Date().toISOString().slice(0,10);
  const date = dateAssigned;
  const description = (document.getElementById('af-desc')?.value||'').trim();
  const tagIds = Array.from(document.querySelectorAll('.af-tag-cb:checked')).map(cb => cb.value);
  if (tagIds.length === 0) {
    const tagsContainer = document.querySelector('.af-tags-container');
    if (tagsContainer) { tagsContainer.style.border = '2px solid var(--score-1)'; tagsContainer.scrollIntoView({behavior:'smooth'}); }
    return;
  }
  const evidence = document.getElementById('af-evidence')?.value;
  const moduleId = document.getElementById('af-module')?.value || '';
  const coreCompetencyIds = Array.from(document.querySelectorAll('.af-cc-chip.active')).map(el => el.dataset.cc);
  const assessments = getAssessments(activeCourse);
  const id = uid();
  const rubricId = document.getElementById('af-rubric')?.value || '';
  const dueDate = document.getElementById('af-due')?.value || '';
  const newAssess = { id, title, date, dateAssigned, type: newType, tagIds, evidenceType: evidence, description, notes:'', created: new Date().toISOString() };
  if (dueDate) newAssess.dueDate = dueDate;
  if (moduleId) newAssess.moduleId = moduleId;
  if (rubricId) newAssess.rubricId = rubricId;
  if (coreCompetencyIds.length > 0) newAssess.coreCompetencyIds = coreCompetencyIds;
  if (newCollaboration !== 'individual') newAssess.collaboration = newCollaboration;
  // Save collaboration details
  if (collabExcluded.size > 0) newAssess.excludedStudents = [...collabExcluded];
  if (newCollaboration === 'pair' && collabPairs.length > 0) newAssess.pairs = collabPairs;
  if (newCollaboration === 'group' && collabGroups.length > 0) {
    newAssess.groups = collabGroups;
    newAssess.groupCount = collabGroupCount;
  }
  // Scoring mode & weight
  const scoreMode = document.getElementById('af-scoremode')?.value || 'proficiency';
  if (scoreMode === 'points') {
    const mpEl = document.getElementById('af-maxpoints');
    const mp = parseInt(mpEl?.value);
    if (!mp || mp <= 0 || isNaN(mp)) {
      if (mpEl) { mpEl.style.border = '2px solid var(--score-1)'; mpEl.focus(); }
      return;
    }
    newAssess.scoreMode = 'points';
    newAssess.maxPoints = mp;
  }
  const assessWeight = parseFloat(document.getElementById('af-weight')?.value) || 1;
  if (assessWeight !== 1) newAssess.weight = assessWeight;
  assessments.push(newAssess);
  saveAssessments(activeCourse, assessments);
  openAssessIds.clear(); openAssessIds.add(id);
  _showingNewForm = false;
  _editingAssessId = null;
  render();
}

function saveEditAssess(aid) {

    if (titleEl) { titleEl.style.border = '2px solid var(--score-1)'; titleEl.placeholder = 'Title is required'; titleEl.focus(); }

  }

  const date = dateAssigned;
  const description = (document.getElementById('af-desc')?.value||'').trim();
  const tagIds = Array.from(document.querySelectorAll('.af-tag-cb:checked')).map(cb => cb.value);
  if (tagIds.length === 0) {
    const tagsContainer = document.querySelector('.af-tags-container');
    if (tagsContainer) { tagsContainer.style.border = '2px solid var(--score-1)'; tagsContainer.scrollIntoView({behavior:'smooth'}); }
    return;
  }
  const evidence = document.getElementById('af-evidence')?.value;
  const assessments = getAssessments(activeCourse);
  const idx = assessments.findIndex(a => a.id === aid);
  if (idx < 0) return;
  assessments[idx].title = title;
  assessments[idx].date = date;
  assessments[idx].dateAssigned = dateAssigned;
  assessments[idx].type = newType;
  assessments[idx].tagIds = tagIds;
  assessments[idx].evidenceType = evidence;
  assessments[idx].description = description;
  const dueDate = document.getElementById('af-due')?.value || '';
  assessments[idx].dueDate = dueDate || undefined;
  const moduleId = document.getElementById('af-module')?.value || '';
  assessments[idx].moduleId = moduleId || undefined;
  const rubricId = document.getElementById('af-rubric')?.value || '';
  assessments[idx].rubricId = rubricId || undefined;
  const coreCompetencyIds = Array.from(document.querySelectorAll('.af-cc-chip.active')).map(el => el.dataset.cc);
  assessments[idx].coreCompetencyIds = coreCompetencyIds.length > 0 ? coreCompetencyIds : undefined;
  assessments[idx].collaboration = newCollaboration !== 'individual' ? newCollaboration : undefined;
  // Save collaboration details
  assessments[idx].excludedStudents = collabExcluded.size > 0 ? [...collabExcluded] : undefined;
  assessments[idx].pairs = (newCollaboration === 'pair' && collabPairs.length > 0) ? collabPairs : undefined;
  assessments[idx].groups = (newCollaboration === 'group' && collabGroups.length > 0) ? collabGroups : undefined;
  assessments[idx].groupCount = (newCollaboration === 'group') ? collabGroupCount : undefined;
  assessments[idx].successCriteria = undefined;
  // Scoring mode & weight
  const scoreMode = document.getElementById('af-scoremode')?.value || 'proficiency';
  if (scoreMode === 'points') {
    const mpEl = document.getElementById('af-maxpoints');
    const mp = parseInt(mpEl?.value);
    if (!mp || mp <= 0 || isNaN(mp)) {
      if (mpEl) { mpEl.style.border = '2px solid var(--score-1)'; mpEl.focus(); }
      return;
    }
    assessments[idx].scoreMode = 'points';
    assessments[idx].maxPoints = mp;
  } else {
    assessments[idx].scoreMode = undefined;
    assessments[idx].maxPoints = undefined;
  }
  const assessWeight = parseFloat(document.getElementById('af-weight')?.value) || 1;
  assessments[idx].weight = assessWeight !== 1 ? assessWeight : undefined;
  saveAssessments(activeCourse, assessments);
  openAssessIds.add(aid);
  hideNewForm();
  render();
}

function dupeAssess(aid) {
  const cid = activeCourse;
  const assessments = getAssessments(cid);
  const orig = assessments.find(a => a.id === aid);
  if (!orig) return;
  const id = uid();
  const dupe = JSON.parse(JSON.stringify(orig));
  dupe.id = id;
  dupe.title = orig.title + ' (Copy)';
  dupe.created = new Date().toISOString();
  assessments.push(dupe);
  saveAssessments(cid, assessments);
  openAssessIds.add(id);

function deleteAssess(aid) {
  showConfirm('Delete Assessment', 'Delete this assessment and all its scores?', 'Delete', 'danger', () => {
    const cid = activeCourse;
    saveAssessments(cid, getAssessments(cid).filter(a => a.id !== aid));
    const scores = getScores(cid);
    for (const sid of Object.keys(scores)) { scores[sid] = (scores[sid]||[]).filter(s => s.assessmentId !== aid); }
    saveScores(cid, scores);
    // Clean up assignment statuses (excused/notSubmitted) for deleted assessment
    const statuses = getAssignmentStatuses(cid);
    let statusChanged = false;
    Object.keys(statuses).forEach(k => { if (k.endsWith(':' + aid)) { delete statuses[k]; statusChanged = true; } });
    if (statusChanged) saveAssignmentStatuses(cid, statuses);
    // Clean up assignment-level observations tied to deleted assessment
    const obs = getQuickObs(cid);
    let obsChanged = false;
    Object.keys(obs).forEach(sid => {
      const before = obs[sid].length;
      obs[sid] = obs[sid].filter(o => !(o.assignmentContext && o.assignmentContext.assessmentId === aid));
      if (obs[sid].length !== before) obsChanged = true;
    });
    if (obsChanged) saveQuickObs(cid, obs);
    openAssessIds.delete(aid); _collapsedIds.delete(aid);
    render();
    refreshSidebar();
  });
}

/* ── Points-mode grid: single score per student ─────────── */
function renderPointsGrid(cid, a, students, scores) {
  const max = a.maxPoints || 100;
  const statuses = getAssignmentStatuses(cid);
  let html = `<div class="score-grid pts-grid">
    <div class="score-grid-header">
      <div class="score-grid-header-name">Student</div>
      <div class="score-col-header" style="text-align:center"><span class="score-col-header-id">Score</span><span class="score-col-header-name">out of ${max}</span></div>
      <div class="score-col-header" style="text-align:center"><span class="score-col-header-id">%</span></div>
      <div class="score-row-action"></div>
    </div>`;
  students.forEach(st => {
    const raw = getPointsScore(cid, st.id, a.id);
    const pct = raw > 0 ? Math.round(raw / max * 100) : '';
    const stStatus = statuses[st.id + ':' + a.id] || null;
    html += `<div class="score-row${stStatus ? ' has-status' : ''}" data-status-student="${st.id}" data-status-assess="${a.id}">
      <span class="score-name">${esc(displayName(st))}${renderStatusToggles(a.id, st.id, stStatus)}</span>
      <div class="pts-input-cell">
        <input type="number" class="gb-pts-input" min="0" max="${max}" inputmode="numeric"
          value="${raw > 0 ? raw : ''}" data-sid="${st.id}" data-aid="${a.id}" data-max="${max}"
          ${stStatus ? 'disabled' : ''}
          oninput="livePointsUpdate(this)" onblur="commitPointsScore(this)"
          onkeydown="handlePointsKey(event,this)">
        <span class="gb-pts-max">/${max}</span>
      </div>
      <div class="pts-pct-cell">
        <span class="gb-pts-live-pct">${pct ? pct + '%' : ''}</span>
      </div>
      <div class="score-row-action"></div>
    </div>`;
  });
  html += `</div>`;
  return html;
}
function livePointsUpdate(inp) {
  const v = parseInt(inp.value); const max = parseInt(inp.dataset.max) || 100;
  const pctSpan = inp.closest('.score-row').querySelector('.gb-pts-live-pct');
  if (pctSpan) pctSpan.textContent = (!isNaN(v) && v >= 0) ? Math.round(Math.min(v, max) / max * 100) + '%' : '';
}
function commitPointsScore(inp) {
  const cid = activeCourse; const sid = inp.dataset.sid; const aid = inp.dataset.aid;
  const max = parseInt(inp.dataset.max) || 100;
  const val = parseInt(inp.value);
  const raw = isNaN(val) ? 0 : Math.max(0, Math.min(max, val));
  inp.value = raw > 0 ? raw : '';
  setPointsScore(cid, sid, aid, raw);
  const pctSpan = inp.closest('.score-row').querySelector('.gb-pts-live-pct');
  if (pctSpan) pctSpan.textContent = raw > 0 ? Math.round(raw / max * 100) + '%' : '';
}
function handlePointsKey(e, inp) {
  if (e.key === 'Enter') {
    e.preventDefault(); commitPointsScore(inp);
    const row = inp.closest('.score-row');
    const next = row.nextElementSibling;
    if (next) { const ni = next.querySelector('.gb-pts-input'); if (ni) { ni.focus(); ni.select(); } }
  } else if (e.key === 'Escape') {
    const raw = getPointsScore(activeCourse, inp.dataset.sid, inp.dataset.aid);
    inp.value = raw > 0 ? raw : ''; inp.blur();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    const next = inp.closest('.score-row').nextElementSibling;
    if (next) { const ni = next.querySelector('.gb-pts-input'); if (ni) { ni.focus(); ni.select(); } }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = inp.closest('.score-row').previousElementSibling;
    if (prev) { const pi = prev.querySelector('.gb-pts-input'); if (pi) { pi.focus(); pi.select(); } }
  }
}
function bulkFillPoints(aid) {
  const cid = activeCourse; const assess = getAssessments(cid).find(a => a.id === aid);
  const max = assess ? assess.maxPoints || 100 : 100;
  const bulkInp = document.getElementById('pts-bulk-' + aid);
  const val = parseInt(bulkInp.value);
  const raw = isNaN(val) ? 0 : Math.max(0, Math.min(max, val));
  if (raw <= 0) return;
  const students = getStudents(cid);
  const statuses = getAssignmentStatuses(cid);
  students.forEach(st => {
    if (statuses[st.id + ':' + aid]) return; // skip excused/notSubmitted
    setPointsScore(cid, st.id, aid, raw);
  });
  const pct = Math.round(raw / max * 100);
  document.querySelectorAll(`.pts-grid .score-row .gb-pts-input[data-aid="${aid}"]`).forEach(inp => {
    const sid = inp.dataset.sid;
    if (sid && statuses[sid + ':' + aid]) return; // skip excused/notSubmitted
    inp.value = raw;
    const ps = inp.closest('.score-row').querySelector('.gb-pts-live-pct');
    if (ps) ps.textContent = pct + '%';
  });
}
function clearPointsScores(aid) {
  const cid = activeCourse;
  const students = getStudents(cid);
  students.forEach(st => setPointsScore(cid, st.id, aid, 0));
  document.querySelectorAll(`.pts-grid .score-row .gb-pts-input[data-aid="${aid}"]`).forEach(inp => {
    inp.value = '';
    const ps = inp.closest('.score-row').querySelector('.gb-pts-live-pct');
    if (ps) ps.textContent = '';
  });
}

/* ── Feedback — inline assignment comments ──────────────── */
/* ── Comment popover system ──────────────────────────────────── */
let _commentPopoverState = null;

function openCommentPopover(cid, sid, aid) {
  const assess = getAssessments(cid).find(a => a.id === aid);
  const student = getStudents(cid).find(s => s.id === sid);
  if (!assess || !student) return;
  _commentPopoverState = { cid, sid, aid };
  renderCommentPopover();
}

function renderCommentPopover() {
  if (!_commentPopoverState) return;
  const { cid, sid, aid } = _commentPopoverState;
  const assess = getAssessments(cid).find(a => a.id === aid);
  const student = getStudents(cid).find(s => s.id === sid);
  if (!assess || !student) return;
  const obs = getAssignmentObs(cid, sid, aid);

  let entriesHtml = '';
  if (obs.length === 0) {
    entriesHtml = `<div class="comment-popover-empty">No comments yet</div>`;
  } else {
    entriesHtml = `<div class="comment-popover-entries">` + obs.map(o => {
      const d = new Date(o.created);
      const ds = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
      return `<div class="comment-entry">
        <span class="comment-entry-date">${ds}</span>
        <span class="comment-entry-text">${esc(o.text)}</span>
        <button class="comment-entry-del" data-action="deleteComment" data-obid="${o.id}" data-stop-prop="true" title="Delete">✕</button>
      </div>`;
    }).join('') + `</div>`;
  }

  let overlay = document.getElementById('comment-popover-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'comment-popover-overlay';
    overlay.className = 'comment-popover-overlay';
    overlay.onclick = function(e) { if (e.target === this) closeCommentPopover(); };
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `<div class="comment-popover">
    <div class="comment-popover-header">
      <div>
        <div class="comment-popover-title">${esc(displayName(student))}</div>
        <div class="comment-popover-subtitle">${esc(assess.title)}</div>
      </div>
      <button class="comment-popover-close" data-action="closeCommentPopover" aria-label="Close comments">✕</button>
    </div>
    <div class="comment-popover-body">${entriesHtml}</div>
    <div class="comment-popover-footer">
      <input class="comment-popover-input" id="comment-input" placeholder="Add a comment…" autofocus
        onkeydown="if(event.key==='Enter'){submitComment();event.preventDefault()}">
      <button class="comment-popover-submit" data-action="submitComment">Add</button>
    </div>
  </div>`;
  overlay.style.display = 'flex';
  setTimeout(() => document.getElementById('comment-input')?.focus(), 50);
}

function submitComment() {
  if (!_commentPopoverState) return;
  const { cid, sid, aid } = _commentPopoverState;
  const inp = document.getElementById('comment-input');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  const assess = getAssessments(cid).find(a => a.id === aid);
  if (!assess) return;
  addQuickOb(cid, sid, text, [], null, null, { assessmentId: aid, assessmentTitle: assess.title });
  renderCommentPopover();
  updateCommentBadge(sid, aid);
}

function deleteComment(obId) {
  if (!_commentPopoverState) return;
  const { cid, sid, aid } = _commentPopoverState;
  deleteQuickOb(cid, sid, obId);
  renderCommentPopover();
  updateCommentBadge(sid, aid);
}

function closeCommentPopover() {
  _commentPopoverState = null;
  const overlay = document.getElementById('comment-popover-overlay');
  if (overlay) overlay.style.display = 'none';
}

function updateCommentBadge(sid, aid) {
  // Update the comment button badge count without full re-render
  const cid = activeCourse;
  const count = getAssignmentObs(cid, sid, aid).length;
  // Find the button in the DOM
  document.querySelectorAll('.comment-btn').forEach(btn => {
    const onclick = btn.getAttribute('onclick') || '';
    if (onclick.includes(sid) && onclick.includes(aid)) {
      btn.innerHTML = count > 0 ? `Comment <span class="comment-count">${count}</span>` : 'Comment';
    }
  });
}

            <div class="col-fill-option" data-action="fillScoresAndClose" data-aid="${a.id}" data-sid="${st.id}" data-score="1" data-scope="row"><div class="col-fill-dot" style="background:var(--score-1)">1</div> Emerging</div>
            <div class="col-fill-option" data-action="fillScoresAndClose" data-aid="${a.id}" data-sid="${st.id}" data-score="0" data-scope="row"><div class="col-fill-dot" style="background:var(--surface-2);color:var(--text-3)">0</div> Clear</div>
