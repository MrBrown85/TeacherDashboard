  return html;
}

function renderRubricGradingView(cid, a, students, scores) {
  const rubric = getRubricById(cid, a.rubricId);
  if (!rubric) return '';
  const criteria = rubric.criteria || [];
  const rubricTagIds = new Set(criteria.flatMap(c => c.tagIds || []));
  const extraTagIds = (a.tagIds || []).filter(tid => !rubricTagIds.has(tid));
  const extraTagObjs = extraTagIds.map(tid => getTagById(cid, tid)).filter(Boolean);

  let html = `<div class="rsg-grid">`;

  // Header: simple 4-level title-buttons that also fill all
  html += `<div class="rsg-header">
    <div class="rsg-header-spacer">Student</div>
    <div class="rsg-header-inner">
      <div class="rsg-header-crit-spacer"></div>
      <div class="rsg-header-levels">
        <div class="rsg-header-level hl4" data-action="confirmFillRubricAll" data-aid="${a.id}" data-score="4" data-label="Extending" title="Fill all Extending">Extending</div>
        <div class="rsg-header-level hl3" data-action="confirmFillRubricAll" data-aid="${a.id}" data-score="3" data-label="Proficient" title="Fill all Proficient">Proficient</div>
        <div class="rsg-header-level hl2" data-action="confirmFillRubricAll" data-aid="${a.id}" data-score="2" data-label="Developing" title="Fill all Developing">Developing</div>
        <div class="rsg-header-level hl1" data-action="confirmFillRubricAll" data-aid="${a.id}" data-score="1" data-label="Emerging" title="Fill all Emerging">Emerging</div>
      </div>
    </div>
    <div class="rsg-header-action"></div>
  </div>`;

  // Student rows
  const statuses = getAssignmentStatuses(cid);
  students.forEach(st => {
    const studentScores = scores[st.id] || [];
    const stStatus = statuses[st.id + ':' + a.id] || null;
    html += `<div class="rsg-student${stStatus ? ' has-status' : ''}" data-status-student="${st.id}" data-status-assess="${a.id}">
      <div class="rsg-student-name">${esc(displayName(st))}${renderStatusToggles(a.id, st.id, stStatus)}</div>
      <div class="rsg-criteria">`;
    criteria.forEach(crit => {
      const tagScores = (crit.tagIds||[]).map(tid => {
        const entry = studentScores.find(s => s.assessmentId === a.id && s.tagId === tid);
        return entry ? entry.score : 0;
      });
      const nonZero = tagScores.filter(s => s > 0);
      const allSame = nonZero.length > 0 && nonZero.every(s => s === nonZero[0]);
      const displayScore = nonZero.length === 0 ? 0 : (allSame ? nonZero[0] : Math.min(...nonZero));
      const isMixed = nonZero.length > 0 && !allSame;
      html += `<div class="rsg-criterion-row" data-student="${st.id}" data-assess="${a.id}" data-criterion="${crit.id}">
        <div class="rsg-criterion-label" title="${esc(crit.name)}">${esc(crit.name)}</div>
        <div class="rsg-levels">
          <div class="rsg-level l4${displayScore===4?(isMixed?' active mixed':' active'):''}" data-action="selectRubricScore" data-level="4" data-aid="${a.id}" data-sid="${st.id}" data-critid="${crit.id}" onmouseenter="showCritTooltip(event,'${a.id}','${crit.id}',4)" onmouseleave="resetDescriptorBar()" role="button" tabindex="0">Extending</div>
          <div class="rsg-level l3${displayScore===3?(isMixed?' active mixed':' active'):''}" data-action="selectRubricScore" data-level="3" data-aid="${a.id}" data-sid="${st.id}" data-critid="${crit.id}" onmouseenter="showCritTooltip(event,'${a.id}','${crit.id}',3)" onmouseleave="resetDescriptorBar()" role="button" tabindex="0">Proficient</div>
          <div class="rsg-level l2${displayScore===2?(isMixed?' active mixed':' active'):''}" data-action="selectRubricScore" data-level="2" data-aid="${a.id}" data-sid="${st.id}" data-critid="${crit.id}" onmouseenter="showCritTooltip(event,'${a.id}','${crit.id}',2)" onmouseleave="resetDescriptorBar()" role="button" tabindex="0">Developing</div>
          <div class="rsg-level l1${displayScore===1?(isMixed?' active mixed':' active'):''}" data-action="selectRubricScore" data-level="1" data-aid="${a.id}" data-sid="${st.id}" data-critid="${crit.id}" onmouseenter="showCritTooltip(event,'${a.id}','${crit.id}',1)" onmouseleave="resetDescriptorBar()" role="button" tabindex="0">Emerging</div>
        </div>
      </div>`;
    });
    html += `</div>
      <div class="score-row-action">
        <div class="row-fill-btn" data-action="toggleScoreMenu" title="Fill row">▼
          <div class="col-fill-menu" data-stop-prop="true">
            <div class="col-fill-option" data-action="fillRubricScoresAndClose" data-aid="${a.id}" data-sid="${st.id}" data-score="4" data-scope="row"><div class="col-fill-dot" style="background:var(--score-4)">4</div> Extending</div>
            <div class="col-fill-option" data-action="fillRubricScoresAndClose" data-aid="${a.id}" data-sid="${st.id}" data-score="3" data-scope="row"><div class="col-fill-dot" style="background:var(--score-3)">3</div> Proficient</div>
            <div class="col-fill-option" data-action="fillRubricScoresAndClose" data-aid="${a.id}" data-sid="${st.id}" data-score="2" data-scope="row"><div class="col-fill-dot" style="background:var(--score-2)">2</div> Developing</div>
            <div class="col-fill-option" data-action="fillRubricScoresAndClose" data-aid="${a.id}" data-sid="${st.id}" data-score="1" data-scope="row"><div class="col-fill-dot" style="background:var(--score-1)">1</div> Emerging</div>
            <div class="col-fill-option" data-action="fillRubricScoresAndClose" data-aid="${a.id}" data-sid="${st.id}" data-score="0" data-scope="row"><div class="col-fill-dot" style="background:var(--surface-2);color:var(--text-3)">0</div> Clear</div>
          </div>
        </div>
      </div>
    </div>`;
  });
  html += `</div>`;


  // Extra tags not covered by rubric
  if (extraTagObjs.length > 0) {
    html += `<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
      <div style="font-family:'SF Mono', ui-monospace, 'Menlo', monospace;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-3);font-weight:600;margin-bottom:6px">Additional Tags (not in rubric)</div>`;
    html += renderTagGrid(cid, a, extraTagObjs, students, scores);
    html += `</div>`;
  }

  return html;
}

function selectTagLevel(el, value, aid, sid, tagId) {
  const wasActive = el.classList.contains('active');
  const next = wasActive ? 0 : value;
  setScore(activeCourse, sid, aid, tagId, next);
  const levelsContainer = el.parentElement;
  levelsContainer.querySelectorAll('.rsg-level').forEach(o => o.classList.remove('active'));
  if (!wasActive) el.classList.add('active');
  refreshSidebar();
}

function selectScore(el, value) {
  const group = el.parentElement;
  const cid = activeCourse;
  const sid = group.dataset.student;
  const aid = group.dataset.assess;
  const tagId = group.dataset.tag;
  const assess = getAssessments(cid).find(a => a.id === aid);
  const sc = getScores(cid);
  if (!sc[sid]) sc[sid] = [];

  const idx = sc[sid].findIndex(s => s.assessmentId === aid && s.tagId === tagId);
  const wasActive = el.classList.contains('active');
  const next = wasActive ? 0 : value;

  if (idx >= 0) { sc[sid][idx].score = next; }
  else { sc[sid].push({ id: uid(), assessmentId: aid, tagId, score: next, date: assess?assess.date:'', type: assess?assess.type:'summative', note:'', created: new Date().toISOString() }); }
  saveScores(cid, sc);

  // Update UI — clear all active in group, then set new
  group.querySelectorAll('.score-opt').forEach(o => o.classList.remove('active'));
  if (!wasActive) el.classList.add('active');
  refreshSidebar();
}

/* ── Bulk grading: fill column, row, or all ───────────────── */
function closeMenus() {
  document.querySelectorAll('.col-fill-menu').forEach(m => m.classList.remove('open'));
}
document.addEventListener('click', e => {
  if (!e.target.closest('.col-fill-menu') && !e.target.closest('.score-col-header') && !e.target.closest('.row-fill-btn')) {
    closeMenus();
  }
});

function positionMenu(trigger, menu) {
  const rect = trigger.getBoundingClientRect();
  const menuH = 180; // approximate height of 5 options
  const spaceBelow = window.innerHeight - rect.bottom;
  if (spaceBelow < menuH) {
    // Open upward
    menu.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
    menu.style.top = 'auto';
  } else {
    // Open downward
    menu.style.top = (rect.bottom + 4) + 'px';
    menu.style.bottom = 'auto';
  }
  // Horizontal: center on trigger, but keep on screen
  const menuW = 150;
  let left = rect.left + rect.width / 2 - menuW / 2;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  if (left < 8) left = 8;
  menu.style.left = left + 'px';
}

function toggleScoreMenu(trigger) {
  const menu = trigger.querySelector('.col-fill-menu');
  const wasOpen = menu.classList.contains('open');
  closeMenus();
  if (!wasOpen) { positionMenu(trigger, menu); menu.classList.add('open'); }
}

/* ── Student assignment status (Excused / Not Submitted) ──── */
function renderStatusToggles(aid, sid, currentStatus) {
  const cid = activeCourse;
  const commentCount = getAssignmentObs(cid, sid, aid).length;
  return `<div class="student-status-toggles">
    <button class="student-status-btn${currentStatus==='excused'?' active-excused':''}" tabindex="-1" data-action="toggleStudentStatus" data-aid="${aid}" data-sid="${sid}" data-status="excused" data-stop-prop="true" title="Excused — excluded from proficiency calculations">EXC</button>
    <button class="student-status-btn${currentStatus==='notSubmitted'?' active-ns':''}" tabindex="-1" data-action="toggleStudentStatus" data-aid="${aid}" data-sid="${sid}" data-status="notSubmitted" data-stop-prop="true" title="Not Submitted — counts as zero">NS</button>
    <button class="comment-btn" data-action="openCommentPopover" data-cid="${cid}" data-sid="${sid}" data-aid="${aid}" data-stop-prop="true" title="Comments">Comment${commentCount > 0 ? ` <span class="comment-count">${commentCount}</span>` : ''}</button>
  </div>`;
}

let _statusDebounce = {};
function toggleStudentStatus(aid, sid, status) {
  // Debounce: prevent double-click from toggling back off
  const debounceKey = sid + ':' + aid + ':' + status;
  if (_statusDebounce[debounceKey]) return;
  _statusDebounce[debounceKey] = true;
  setTimeout(() => { delete _statusDebounce[debounceKey]; }, 300);

  const cid = activeCourse;
  const current = getAssignmentStatus(cid, sid, aid);
  // Toggle: if already this status, clear it; otherwise set it
  const newStatus = current === status ? null : status;
  setAssignmentStatus(cid, sid, aid, newStatus);

  // If setting "notSubmitted", zero out all scores for this student+assessment (batched)
  if (newStatus === 'notSubmitted') {
    const assess = getAssessments(cid).find(a => a.id === aid);
    if (assess) {
      const sc = getScores(cid);
      if (!sc[sid]) sc[sid] = [];
      (assess.tagIds || []).forEach(tagId => {
        const idx = sc[sid].findIndex(s => s.assessmentId === aid && s.tagId === tagId);
        if (idx >= 0) sc[sid][idx].score = 0;
        else sc[sid].push({ id: uid(), assessmentId: aid, tagId, score: 0, date: assess.date || '', type: assess.type || 'summative', note: '', created: new Date().toISOString() });
      });
      saveScores(cid, sc); // single write instead of N writes
    }
  }

  // Update DOM: find the student row container
  const row = document.querySelector(`.score-row[data-status-student="${sid}"][data-status-assess="${aid}"]`) ||
              document.querySelector(`.rsg-student[data-status-student="${sid}"][data-status-assess="${aid}"]`);
  if (row) {
    // Update button states
    row.querySelectorAll('.student-status-btn').forEach(btn => {
      btn.classList.remove('active-excused', 'active-ns');
    });
    if (newStatus === 'excused') {
      row.querySelector('.student-status-btn:first-child').classList.add('active-excused');
    } else if (newStatus === 'notSubmitted') {
      row.querySelector('.student-status-btn:nth-child(2)').classList.add('active-ns');
    }
    // Toggle dimmed state
    if (newStatus) row.classList.add('has-status');
    else row.classList.remove('has-status');

    // Disable/enable points inputs when status changes
    const ptsInput = row.querySelector('.gb-pts-input');
    if (ptsInput) ptsInput.disabled = !!newStatus;

    // If not submitted was just set, update score UI to show zeros
    if (newStatus === 'notSubmitted') {
      row.querySelectorAll('.score-opt, .rsg-level').forEach(el => el.classList.remove('active', 'mixed'));
      if (ptsInput) { ptsInput.value = ''; const ps = row.querySelector('.gb-pts-live-pct'); if (ps) ps.textContent = ''; }
    }
  }
  refreshSidebar();
}

function setScore(cid, sid, aid, tagId, value) {
  const sc = getScores(cid);
  if (!sc[sid]) sc[sid] = [];
  const assess = getAssessments(cid).find(a => a.id === aid);
  const idx = sc[sid].findIndex(s => s.assessmentId === aid && s.tagId === tagId);
  if (idx >= 0) { sc[sid][idx].score = value; }
  else { sc[sid].push({ id: uid(), assessmentId: aid, tagId, score: value, date: assess?assess.date:'', type: assess?assess.type:'summative', note:'', created: new Date().toISOString() }); }
  saveScores(cid, sc);
}

function updateGroupUI(group, value) {
  group.querySelectorAll('.score-opt').forEach(o => o.classList.remove('active'));
  if (value > 0) {
    const opt = group.querySelector('.s' + value);
    if (opt) opt.classList.add('active');
  }
}

function fillScores(aid, tagId, value, scope) {
  const cid = activeCourse;
  const prevScores = JSON.parse(JSON.stringify(getScores(cid)));
  const students = getStudents(cid);
  const assess = getAssessments(cid).find(a => a.id === aid);
  let selector, toastMsg;
  const statuses = getAssignmentStatuses(cid);
  if (scope === 'col') {
    students.forEach(st => {
      if (statuses[st.id + ':' + aid]) return; // skip excused/notSubmitted
      setScore(cid, st.id, aid, tagId, value);
    });
    selector = `.score-group[data-assess="${aid}"][data-tag="${tagId}"]`;
    toastMsg = 'Column filled';
  } else if (scope === 'row') {
    if (!assess) return;
    const sid = tagId; // tagId param holds studentId for row scope
    if (!statuses[sid + ':' + aid]) {
      (assess.tagIds || []).forEach(tid => setScore(cid, sid, aid, tid, value));
    }
    selector = `.score-group[data-assess="${aid}"][data-student="${sid}"]`;
    toastMsg = 'Row filled';
  } else { // 'all'
    if (!assess) return;
    students.forEach(st => {
      if (statuses[st.id + ':' + aid]) return; // skip excused/notSubmitted
      (assess.tagIds || []).forEach(tid => setScore(cid, st.id, aid, tid, value));
    });
    selector = `.score-group[data-assess="${aid}"]`;
    toastMsg = 'All scores filled';
  }
  document.querySelectorAll(selector).forEach(g => updateGroupUI(g, value));
  refreshSidebar();
  showUndoToast(toastMsg, () => { saveScores(cid, prevScores); render(); refreshSidebar(); });
}

function randomFill(aid) {
  const cid = activeCourse;
  const prevScores = JSON.parse(JSON.stringify(getScores(cid)));
  const students = getStudents(cid);
  const assess = getAssessments(cid).find(a => a.id === aid);
  if (!assess) return;
  const sc = getScores(cid);
  const statuses = getAssignmentStatuses(cid);
  students.forEach(st => {
    if (statuses[st.id + ':' + aid]) return; // skip excused/notSubmitted
    (assess.tagIds || []).forEach(tagId => {
      if (!sc[st.id]) sc[st.id] = [];
      const idx = sc[st.id].findIndex(s => s.assessmentId === aid && s.tagId === tagId);
      if (idx >= 0 && sc[st.id][idx].score > 0) return; // skip already scored
      const val = Math.floor(Math.random() * 4) + 1;
      setScore(cid, st.id, aid, tagId, val);
    });
  });
  document.querySelectorAll(`.score-group[data-assess="${aid}"]`).forEach(g => {
    const sid = g.dataset.student;
    const tagId = g.dataset.tag;
    const scores = getScores(cid);
    const entry = (scores[sid]||[]).find(s => s.assessmentId === aid && s.tagId === tagId);
    if (entry) updateGroupUI(g, entry.score);
  });
  refreshSidebar();
  showUndoToast('Random scores filled', () => { saveScores(cid, prevScores); render(); refreshSidebar(); });
}

/* ── Rubric Grading Functions ─────────────────────────────── */
function getRubricCriterion(aid, critId) {
  const assess = getAssessments(activeCourse).find(a => a.id === aid);
  if (!assess || !assess.rubricId) return null;
  const rubric = getRubricById(activeCourse, assess.rubricId);
  if (!rubric) return null;
  return rubric.criteria.find(c => c.id === critId);
}

function selectRubricScore(el, value, aid, sid, critId) {
  const crit = getRubricCriterion(aid, critId);
  if (!crit) return;
  const levelsContainer = el.parentElement;
  const wasActive = el.classList.contains('active');
  const next = wasActive ? 0 : value;
  // Set score for ALL tags in this criterion
  (crit.tagIds || []).forEach(tagId => setScore(activeCourse, sid, aid, tagId, next));
  // Update UI — clear all levels, set new
  levelsContainer.querySelectorAll('.rsg-level').forEach(o => { o.classList.remove('active','mixed'); });
  if (!wasActive) el.classList.add('active');
  refreshSidebar();
}

/* toggleRubricColMenu/toggleRubricRowMenu consolidated into toggleScoreMenu above */

function updateRubricRowUI(row, value) {
  row.querySelectorAll('.rsg-level').forEach(l => l.classList.remove('active','mixed'));
  if (value > 0) {
    const lvl = row.querySelector('.l' + value);
    if (lvl) lvl.classList.add('active');
  }
}

function fillRubricScores(aid, critId, value, scope) {
  const cid = activeCourse;
  const prevScores = JSON.parse(JSON.stringify(getScores(cid)));
  const students = getStudents(cid);
  const assess = getAssessments(cid).find(a => a.id === aid);
  const statuses = getAssignmentStatuses(cid);
  let selector, toastMsg;
  if (scope === 'col') {
    const crit = getRubricCriterion(aid, critId);
    if (!crit) return;
    students.forEach(st => {
      if (statuses[st.id + ':' + aid]) return; // skip excused/notSubmitted
      (crit.tagIds || []).forEach(tagId => setScore(cid, st.id, aid, tagId, value));
    });
    selector = `.rsg-criterion-row[data-assess="${aid}"][data-criterion="${critId}"]`;
    toastMsg = 'Criterion filled';
  } else if (scope === 'row') {
    if (!assess || !assess.rubricId) return;
    const rubric = getRubricById(cid, assess.rubricId);
    if (!rubric) return;
    const sid = critId; // critId param holds studentId for row scope
    if (!statuses[sid + ':' + aid]) {
      rubric.criteria.forEach(crit => {
        (crit.tagIds || []).forEach(tagId => setScore(cid, sid, aid, tagId, value));
      });
    }
    selector = `.rsg-criterion-row[data-assess="${aid}"][data-student="${sid}"]`;
    toastMsg = 'Row filled';
  } else { // 'all'
    if (!assess || !assess.rubricId) return;
    const rubric = getRubricById(cid, assess.rubricId);
    if (!rubric) return;
    students.forEach(st => {
      if (statuses[st.id + ':' + aid]) return; // skip excused/notSubmitted
      rubric.criteria.forEach(crit => {
        (crit.tagIds || []).forEach(tagId => setScore(cid, st.id, aid, tagId, value));
      });
    });
    selector = `.rsg-criterion-row[data-assess="${aid}"]`;
    toastMsg = 'All rubric scores filled';
  }
  document.querySelectorAll(selector).forEach(row => updateRubricRowUI(row, value));
  refreshSidebar();
  showUndoToast(toastMsg, () => { saveScores(cid, prevScores); render(); refreshSidebar(); });
}

function confirmFillRubricAll(aid, value, label) {
  showConfirm('Fill All Scores', 'Set all students to "' + label + '" for every criterion?', 'Fill All', 'primary', () => {
    fillRubricScores(aid, null, value, 'all');
  });
}

function randomFillRubric(aid) {
  const cid = activeCourse;
  const prevScores = JSON.parse(JSON.stringify(getScores(cid)));
  const students = getStudents(cid);
  const assess = getAssessments(cid).find(a => a.id === aid);
  if (!assess || !assess.rubricId) return;
  const rubric = getRubricById(cid, assess.rubricId);
  if (!rubric) return;
  const sc = getScores(cid);
  const statuses = getAssignmentStatuses(cid);
  students.forEach(st => {
    if (statuses[st.id + ':' + aid]) return; // skip excused/notSubmitted
    rubric.criteria.forEach(crit => {
      // Check if already scored (check first tag)
      const firstTag = (crit.tagIds||[])[0];
      if (!firstTag) return;
      if (!sc[st.id]) sc[st.id] = [];
      const existing = sc[st.id].find(s => s.assessmentId === aid && s.tagId === firstTag);
      if (existing && existing.score > 0) return;
      const val = Math.floor(Math.random() * 4) + 1;
      (crit.tagIds || []).forEach(tagId => setScore(cid, st.id, aid, tagId, val));
    });
  });
  render();
  showUndoToast('Random rubric scores filled', () => { saveScores(cid, prevScores); render(); refreshSidebar(); });
}

/* Persistent descriptor bar — always visible when rubric grading is active */
// descriptor bar managed via DOM id 'rsg-descriptor-bar'
function _ensureDescriptorBar() {
  let bar = document.getElementById('rsg-descriptor-bar');
  if (!bar) {
    bar = document.createElement('div');
    bar.className = 'rsg-descriptor-bar';
    bar.id = 'rsg-descriptor-bar';
    bar.innerHTML = `<div class="rsg-descriptor-left">
      <span class="rsg-descriptor-label"></span>
      <span class="rsg-descriptor-tags"></span>
    </div>
    <span class="rsg-descriptor-text"></span>`;
    document.body.appendChild(bar);
    _resetDescriptorBarContent(bar);
  }
  return bar;
}

function _resetDescriptorBarContent(bar) {
  bar.querySelector('.rsg-descriptor-label').innerHTML = '';
  bar.querySelector('.rsg-descriptor-tags').innerHTML = '';
  bar.querySelector('.rsg-descriptor-text').innerHTML = '<span class="rsg-descriptor-idle">Hover a rubric level to see its descriptor</span>';
}

function showDescriptorBar() {
  const bar = _ensureDescriptorBar();
  bar.style.display = 'flex';
}

function hideDescriptorBar() {
  const bar = document.getElementById('rsg-descriptor-bar');
  if (bar) bar.style.display = 'none';
}

function resetDescriptorBar() {
  const bar = document.getElementById('rsg-descriptor-bar');
  if (bar) _resetDescriptorBarContent(bar);
}

function showCritTooltip(event, aid, critId, level) {
  const crit = getRubricCriterion(aid, critId);
  if (!crit || !crit.levels || !crit.levels[level]) return;
  const levelNames = { 4:'Extending', 3:'Proficient', 2:'Developing', 1:'Emerging' };
  const levelColors = { 4:'var(--score-4)', 3:'var(--score-3)', 2:'var(--score-2)', 1:'var(--score-1)' };
  const bar = _ensureDescriptorBar();
  bar.querySelector('.rsg-descriptor-label').innerHTML = esc(crit.name) + ' <span style="color:' + (levelColors[level]||'#fff') + '">— ' + (levelNames[level] || level) + '</span>';
  // Build tag chips
  const tagsHtml = (crit.tagIds || []).map(tid => {
    const tag = getTagById(activeCourse, tid);
    const sec = getSectionForTag(activeCourse, tid);
    const color = sec ? sec.color : '#888';
    return `<span class="rsg-descriptor-tag" style="border-color:${color};color:${color}">${esc(tid)}${tag ? ' · ' + esc(tag.label) : ''}</span>`;
  }).join('');
  bar.querySelector('.rsg-descriptor-tags').innerHTML = tagsHtml;
  bar.querySelector('.rsg-descriptor-text').textContent = crit.levels[level];
}

/* ── Rubric Select in Assessment Form ─────────────────────── */
function onRubricSelect(rubricId) {
  if (!rubricId) return;
  const rubric = getRubricById(activeCourse, rubricId);
  if (!rubric) return;
  // Uncheck previously auto-selected tags
  _rubricAutoTags.forEach(tagId => {
    const cb = document.querySelector(`.af-tag-cb[value="${tagId}"]`);
    if (cb && cb.checked) {
      cb.checked = false;
      cb.parentElement.classList.remove('checked');
      const secId = cb.dataset.section;
      if (secId) updateSectionBadge(secId);
    }
  });
  _rubricAutoTags = [];
  // Auto-check all tags referenced by the rubric's criteria
  const rubricTagIds = new Set(rubric.criteria.flatMap(c => c.tagIds || []));
  document.querySelectorAll('.af-tag-cb').forEach(cb => {
    if (rubricTagIds.has(cb.value) && !cb.checked) {
      cb.checked = true;
      cb.parentElement.classList.add('checked');
      _rubricAutoTags.push(cb.value);
      const secId = cb.dataset.section;
      if (secId) updateSectionBadge(secId);
      // Open the section
      const group = cb.closest('.af-section-group');
      if (group && !group.classList.contains('af-section-open')) group.classList.add('af-section-open');
    }
  });
}

function renderCriterionBlock(ci, crit, allCriteria, sections) {
  // Tags used by OTHER criteria
  const otherUsed = {};
  allCriteria.forEach((c, i) => { if (i !== ci) (c.tagIds||[]).forEach(t => { otherUsed[t] = c.name; }); });
  const selectedTagIds = new Set(crit.tagIds || []);

  // Default open section: first section, or stored preference
  const openSecId = _critTagSection[ci] || (sections[0] ? sections[0].id : '');
  const openSec = sections.find(s => s.id === openSecId) || sections[0];

  const isCollapsed = ci !== _expandedCriterion;
  // Build tag chips for header
  let headerChips = '';
  (crit.tagIds||[]).forEach(tid => {
    const sec = getSectionForTag(activeCourse, tid);
    const color = sec ? sec.color : 'var(--text-3)';
    headerChips += `<span class="rubric-header-chip" style="background:${color}20;color:${color};border:1px solid ${color}30">${esc(tid)}</span>`;
  });
  let html = `<div class="rubric-criterion${isCollapsed?' collapsed':''}" data-crit-idx="${ci}">
    <div class="rubric-criterion-header" data-action="toggleCriterionExpand" data-index="${ci}">
      <span class="rubric-criterion-num">${ci+1}</span>
      <input class="rubric-criterion-name" value="${esc(crit.name)}" onblur="updateCritName(${ci},this.value)" onkeydown="if(event.key==='Enter')this.blur()" data-stop-prop="true" onfocus="event.stopPropagation()" placeholder="Criterion name">
      <div class="rubric-header-chips">${headerChips}</div>
      <span class="rubric-criterion-chevron">▼</span>
      <button class="rubric-criterion-delete" data-action="removeCriterion" data-index="${ci}" data-stop-prop="true" title="Remove criterion" aria-label="Remove criterion">✕</button>
    </div>
    <div class="rubric-criterion-body">
      <!-- Selected tags summary -->
      <div class="rubric-selected-tags" id="re-sel-${ci}">
        <span class="rubric-selected-tags-label">Tags:</span>`;
  if (selectedTagIds.size === 0) {
    html += `<span class="rubric-no-tags">Click tags below to add them</span>`;
  } else {
    (crit.tagIds||[]).forEach(tid => {
      const tag = getTagById(activeCourse, tid);
      const sec = getSectionForTag(activeCourse, tid);
      if (tag) html += `<span class="rubric-selected-chip" style="border-left:3px solid ${sec?sec.color:'var(--text-3)'}" data-action="toggleCritTag" data-index="${ci}" data-tagid="${tid}" title="Click to remove"><strong>${esc(tid)}</strong> <span class="chip-label">${esc(tag.label)}</span></span>`;
    });
  }
  html += `</div>
      <!-- Tag picker: section nav + tag list -->
      <div class="rubric-tag-picker">
        <div class="rubric-tag-sections">`;
  sections.forEach(sec => {
    const countInCrit = sec.tags.filter(t => selectedTagIds.has(t.id)).length;
    html += `<button class="rubric-tag-sec-btn${sec.id===openSecId?' active':''}" data-action="switchCritSection" data-index="${ci}" data-secid="${sec.id}">
      <span class="rubric-tag-sec-dot" style="background:${sec.color}"></span>
      ${esc(sec.shortName||sec.name)}
      ${countInCrit > 0 ? `<span class="rubric-tag-sec-count" style="color:${sec.color};font-weight:700">${countInCrit}</span>` : ''}
    </button>`;
  });
  html += `</div>
        <div class="rubric-tag-list" id="re-tags-${ci}">`;
  if (openSec) {
    openSec.tags.forEach(tag => {
      const inThis = selectedTagIds.has(tag.id);
      const inOtherName = otherUsed[tag.id];
      const disabled = !!inOtherName;
      html += `<div class="rubric-tag-item${inThis?' selected':''}${disabled?' disabled':''}" data-action="${disabled ? '' : 'toggleCritTag'}" data-index="${ci}" data-tagid="${tag.id}">
        <input type="checkbox" class="rubric-tag-cb" ${inThis?'checked':''} ${disabled?'disabled':''}><span class="rubric-tag-id" style="color:${openSec.color}">${esc(tag.id)}</span>
        <span class="rubric-tag-label">${esc(tag.label)}</span>
        ${disabled ? `<span class="rubric-tag-used-by">in ${esc(inOtherName)}</span>` : ''}
      </div>`;
    });
  }
  html += `</div>
      </div>
    </div>
    <!-- Level descriptors: 2x2 grid -->
    <div class="rubric-levels">
      <div class="rubric-level-card"><div class="rubric-level-header"><span class="rubric-level-dot" style="background:var(--score-4)"></span> <span style="color:var(--score-4)">4 — Extending</span></div><textarea class="rubric-level-text" data-crit="${ci}" data-level="4" onblur="updateCritLevel(${ci},4,this.value)" placeholder="What does extending look like?">${esc(crit.levels?.[4]||'')}</textarea></div>

function toggleCriterionExpand(idx) {
  _expandedCriterion = (_expandedCriterion === idx) ? -1 : idx;
  // Toggle classes without full re-render to preserve input state
  document.querySelectorAll('.rubric-criterion').forEach((el, i) => {
    if (i === _expandedCriterion) el.classList.remove('collapsed');
    else el.classList.add('collapsed');
  });
}
function updateCritName(idx, name) {
  if (!_editingRubric) return;
  _editingRubric.criteria[idx].name = name.trim() || 'Unnamed';
  _rubricDirty = true;
}
function updateCritLevel(idx, level, text) {
  if (!_editingRubric) return;
  if (!_editingRubric.criteria[idx].levels) _editingRubric.criteria[idx].levels = {};
  _editingRubric.criteria[idx].levels[level] = text.trim();
  _rubricDirty = true;
}
function toggleCritTag(critIdx, tagId) {
  if (!_editingRubric) return;
  _rubricDirty = true;
  const crit = _editingRubric.criteria[critIdx];
  if (!crit.tagIds) crit.tagIds = [];
  const i = crit.tagIds.indexOf(tagId);
  if (i >= 0) crit.tagIds.splice(i, 1);
  else crit.tagIds.push(tagId);
  // Update just this criterion's DOM — no full re-render
  _refreshCriterionDOM(critIdx);
}
function switchCritSection(critIdx, secId) {
  _critTagSection[critIdx] = secId;
  // Rebuild just the tag list + section buttons for this criterion
  _refreshCriterionDOM(critIdx);
}
function _refreshCriterionDOM(ci) {
  if (!_editingRubric) return;
  const crit = _editingRubric.criteria[ci];
  const sections = getSections(activeCourse);
  const critBlock = document.querySelector(`.rubric-criterion[data-crit-idx="${ci}"]`);
  if (!critBlock) return;

  // Rebuild selected tags summary
  const selMount = critBlock.querySelector('.rubric-selected-tags');
  if (selMount) {
    let sh = '<span class="rubric-selected-tags-label">Tags:</span>';
    if ((crit.tagIds||[]).length === 0) {
      sh += '<span class="rubric-no-tags">Click tags below to add them</span>';
    } else {
      (crit.tagIds||[]).forEach(tid => {
        const tag = getTagById(activeCourse, tid);
        const sec = getSectionForTag(activeCourse, tid);
        if (tag) sh += `<span class="rubric-selected-chip" style="border-left:3px solid ${sec?sec.color:'var(--text-3)'}" data-action="toggleCritTag" data-index="${ci}" data-tagid="${tid}" title="Click to remove"><strong>${esc(tid)}</strong> <span class="chip-label">${esc(tag.label)}</span></span>`;
      });
    }
    selMount.innerHTML = sh;
  }

  // Rebuild header chips
  const chipsMount = critBlock.querySelector('.rubric-header-chips');
  if (chipsMount) {
    let ch = '';
    (crit.tagIds||[]).forEach(tid => {
      const sec = getSectionForTag(activeCourse, tid);
      const color = sec ? sec.color : 'var(--text-3)';
      ch += `<span class="rubric-header-chip" style="background:${color}20;color:${color};border:1px solid ${color}30">${esc(tid)}</span>`;
    });
    chipsMount.innerHTML = ch;
  }

  // Rebuild section nav (to update counts)
  const secNav = critBlock.querySelector('.rubric-tag-sections');
  const openSecId = _critTagSection[ci] || (sections[0] ? sections[0].id : '');
  const selectedTagIds = new Set(crit.tagIds || []);
  if (secNav) {
    let nh = '';
    sections.forEach(sec => {
      const countInCrit = sec.tags.filter(t => selectedTagIds.has(t.id)).length;
      nh += `<button class="rubric-tag-sec-btn${sec.id===openSecId?' active':''}" data-action="switchCritSection" data-index="${ci}" data-secid="${sec.id}">
        <span class="rubric-tag-sec-dot" style="background:${sec.color}"></span>
        ${esc(sec.shortName||sec.name)}
        ${countInCrit > 0 ? `<span class="rubric-tag-sec-count" style="color:${sec.color};font-weight:700">${countInCrit}</span>` : ''}
      </button>`;
    });
    secNav.innerHTML = nh;
  }

  // Rebuild tag list for the open section
  const tagListMount = critBlock.querySelector('.rubric-tag-list');
  const openSec = sections.find(s => s.id === openSecId);
  const otherUsed = {};
  _editingRubric.criteria.forEach((c, i) => { if (i !== ci) (c.tagIds||[]).forEach(t => { otherUsed[t] = c.name; }); });
  if (tagListMount && openSec) {
    let th = '';
    openSec.tags.forEach(tag => {
      const inThis = selectedTagIds.has(tag.id);
      const inOtherName = otherUsed[tag.id];
      const disabled = !!inOtherName;
      th += `<div class="rubric-tag-item${inThis?' selected':''}${disabled?' disabled':''}" data-action="${disabled ? '' : 'toggleCritTag'}" data-index="${ci}" data-tagid="${tag.id}">
        <input type="checkbox" class="rubric-tag-cb" ${inThis?'checked':''} ${disabled?'disabled':''}><span class="rubric-tag-id" style="color:${openSec.color}">${esc(tag.id)}</span>
        <span class="rubric-tag-label">${esc(tag.label)}</span>
        ${disabled ? `<span class="rubric-tag-used-by">in ${esc(inOtherName)}</span>` : ''}
      </div>`;
    });
    tagListMount.innerHTML = th;
  }

  // Also refresh other criteria's tag lists (to update disabled state)
  _editingRubric.criteria.forEach((otherCrit, oi) => {
    if (oi === ci) return;
    const otherBlock = document.querySelector(`.rubric-criterion[data-crit-idx="${oi}"]`);
    if (!otherBlock) return;
    const otherTagList = otherBlock.querySelector('.rubric-tag-list');
    const otherOpenSecId = _critTagSection[oi] || (sections[0] ? sections[0].id : '');
    const otherOpenSec = sections.find(s => s.id === otherOpenSecId);
    const otherSelected = new Set(otherCrit.tagIds || []);
    const otherOtherUsed = {};
    _editingRubric.criteria.forEach((c, i) => { if (i !== oi) (c.tagIds||[]).forEach(t => { otherOtherUsed[t] = c.name; }); });
    if (otherTagList && otherOpenSec) {
      let th = '';
      otherOpenSec.tags.forEach(tag => {
        const inThis = otherSelected.has(tag.id);
        const inOtherName = otherOtherUsed[tag.id];
        const disabled = !!inOtherName;
        th += `<div class="rubric-tag-item${inThis?' selected':''}${disabled?' disabled':''}" data-action="${disabled ? '' : 'toggleCritTag'}" data-index="${oi}" data-tagid="${tag.id}">
          <input type="checkbox" class="rubric-tag-cb" ${inThis?'checked':''} ${disabled?'disabled':''}><span class="rubric-tag-id" style="color:${otherOpenSec.color}">${esc(tag.id)}</span>
          <span class="rubric-tag-label">${esc(tag.label)}</span>
          ${disabled ? `<span class="rubric-tag-used-by">in ${esc(inOtherName)}</span>` : ''}
        </div>`;
      });
      otherTagList.innerHTML = th;
    }
  });
}
function addCriterion() {
  if (!_editingRubric) return;
  _rubricDirty = true;
  const num = _editingRubric.criteria.length + 1;
  const newCrit = { id: uid(), name: 'Criterion ' + num, tagIds: [], levels: { 4:'', 3:'', 2:'', 1:'' } };
  _editingRubric.criteria.push(newCrit);
  const ci = _editingRubric.criteria.length - 1;
  _expandedCriterion = ci; // expand the new one
  const sections = getSections(activeCourse);
  const mount = document.getElementById('re-criteria');
  if (mount) {
    // Collapse all existing
    mount.querySelectorAll('.rubric-criterion').forEach(el => el.classList.add('collapsed'));
    mount.insertAdjacentHTML('beforeend', renderCriterionBlock(ci, newCrit, _editingRubric.criteria, sections));
    // Scroll to new criterion
    const newBlock = mount.querySelector(`.rubric-criterion[data-crit-idx="${ci}"]`);
    if (newBlock) newBlock.scrollIntoView({ behavior:'smooth', block:'center' });
    const nameInput = newBlock?.querySelector('.rubric-criterion-name');
    if (nameInput) { nameInput.focus(); nameInput.select(); }
  }
}
function removeCriterion(idx) {
  if (!_editingRubric) return;
  if (_editingRubric.criteria.length <= 1) { alert('A rubric needs at least one criterion.'); return; }
  _rubricDirty = true;
  _editingRubric.criteria.splice(idx, 1);
  if (idx < _expandedCriterion) _expandedCriterion--;
  else if (idx === _expandedCriterion) _expandedCriterion = -1;
  // Re-render all criteria (numbering changes)
  const mount = document.getElementById('re-criteria');
  if (mount) {
    const sections = getSections(activeCourse);
    let h = '';
    _editingRubric.criteria.forEach((c, ci) => {
      h += renderCriterionBlock(ci, c, _editingRubric.criteria, sections);
    });
    mount.innerHTML = h;
  }
}
function cancelRubricEdit() {
  if (_rubricDirty && !confirm('Discard unsaved rubric changes?')) return;
  _editingRubric = null;
  _rubricDirty = false;
  const modal = document.getElementById('rubric-modal');
  if (modal) modal.remove();
}
function saveRubricEdit() {
  if (!_editingRubric) return;
  // Capture name from input
  const nameInput = document.getElementById('re-name');
  const rubricName = (nameInput?.value || '').trim();
  if (!rubricName) {
    if (nameInput) { nameInput.style.border = '2px solid var(--score-1)'; nameInput.placeholder = 'Rubric name is required'; nameInput.oninput = function() { this.style.border = ''; }; nameInput.focus(); }
    return;
  }
  _editingRubric.name = rubricName;
  // Validate: at least 1 criterion
  if (!_editingRubric.criteria || _editingRubric.criteria.length === 0) {
    alert('Add at least one criterion to the rubric.');
    return;
  }
  // Validate: each criterion needs at least 1 tag
  for (const crit of _editingRubric.criteria) {
    if (!crit.tagIds || crit.tagIds.length === 0) {
      alert(`Criterion "${crit.name}" needs at least one tag.`);
      return;
    }
  }
  const cid = activeCourse;
  const rubrics = getRubrics(cid);
  const isNew = _editingRubric._isNew;
  delete _editingRubric._isNew;
  if (isNew) {
    rubrics.push(_editingRubric);
  } else {
    const idx = rubrics.findIndex(r => r.id === _editingRubric.id);
    if (idx >= 0) rubrics[idx] = _editingRubric;
    else rubrics.push(_editingRubric);
  }
  const savedId = _editingRubric.id;
  const wasNew = isNew;
  saveRubrics(cid, rubrics);
  _editingRubric = null;
  _rubricDirty = false;
  const modal = document.getElementById('rubric-modal');
  if (modal) modal.remove();
  render();
  // If the assessment form is open, refresh the rubric dropdown and auto-select new rubric
  setTimeout(() => {
    const dd = document.getElementById('af-rubric');
    if (!dd) return;
    const freshRubrics = getRubrics(cid);
    dd.innerHTML = '<option value="">None</option>' + freshRubrics.map(r =>
      `<option value="${r.id}">${esc(r.name)} (${r.criteria.length} criteria)</option>`
    ).join('');
    if (wasNew) { dd.value = savedId; onRubricSelect(savedId); }
  }, 100);
}

  html += `<table style="width:100%;border-collapse:collapse;font-size:0.8rem">

    </tr></thead><tbody>`;
  for (let i = 0; i < b.length; i++) {
    const prof = b[i].proficiency;
    const label = (labels && labels[prof-1]) || defaultLabels[prof-1];
    const isBottom = i === b.length - 1;
    html += `<tr style="border-bottom:1px solid rgba(0,0,0,0.04)">
      <td style="padding:6px 8px;font-weight:600;color:var(--text-2)">${prof}</td>
      <td style="padding:6px 8px"><input class="af-input gs-label" data-prof="${prof}" value="${esc(label)}" onchange="saveGradingScale()" style="font-size:0.8rem;padding:4px 8px"></td>
      <td style="padding:6px 8px">${isBottom ? '<span style="color:var(--text-3)">0</span>' : `<input class="af-input gs-min" data-idx="${i}" type="number" min="1" max="99" value="${b[i].min}" onchange="saveGradingScale()" style="font-size:0.8rem;padding:4px 8px;width:60px;text-align:center">`}</td>
    </tr>`;
  }
  html += `</tbody></table>`;
  html += `<button class="btn btn-ghost" data-action="resetGradingScale" style="font-size:0.72rem;margin-top:6px;padding:4px 10px">Reset to Defaults</button>`;
  return html;
}

function saveGradingScale() {
  const cc = getCourseConfig(activeCourse);
  const minInputs = document.querySelectorAll('.gs-min');
  const labelInputs = document.querySelectorAll('.gs-label');
  const boundaries = [];
  const labels = [null,null,null,null];
  labelInputs.forEach(inp => {
    const prof = parseInt(inp.dataset.prof);
    labels[prof-1] = inp.value.trim() || null;
  });
  // Build boundaries from inputs (levels 4,3,2 have editable min; level 1 is always 0)
  const defaultB = DEFAULT_GRADING_SCALE.boundaries;
  defaultB.forEach((db, i) => {
    const inp = document.querySelector(`.gs-min[data-idx="${i}"]`);
    boundaries.push({ min: inp ? Math.max(0, Math.min(99, parseInt(inp.value)||0)) : 0, proficiency: db.proficiency });
  });
  cc.gradingScale = { boundaries, labels };
  saveCourseConfig(activeCourse, cc);
}

function resetGradingScale() {
  const cc = getCourseConfig(activeCourse);
  delete cc.gradingScale;
  saveCourseConfig(activeCourse, cc);
  render();
}

function updateCategoryWeights(summPct) {

/* ── Drag and Drop — reorder modules ────────────────────── */
function onModuleDragStart(event, moduleId) {
  _dragModuleId = moduleId;
  _dragAssessId = null;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('application/module-id', moduleId);
  setTimeout(() => {
    const el = document.querySelector(`.mod-folder[data-module-id="${moduleId}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function onModuleDragEnd(event) {
  _dragModuleId = null;
  document.querySelectorAll('.mod-folder.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.mod-drop-zone.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function onModuleDropZoneOver(event) {
  if (!_dragModuleId) return;
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  event.currentTarget.classList.add('drag-over');
}

function onModuleDropZoneLeave(event) {
  event.currentTarget.classList.remove('drag-over');
}

function onModuleDropZoneDrop(event, targetIndex) {
  event.preventDefault();
  event.currentTarget.classList.remove('drag-over');
  const moduleId = _dragModuleId || event.dataTransfer.getData('application/module-id');
  if (!moduleId) return;
  const cid = activeCourse;
  const modules = getModules(cid);
  const fromIndex = modules.findIndex(u => u.id === moduleId);
  if (fromIndex < 0) return;
  // Remove from old position
  const [moved] = modules.splice(fromIndex, 1);
  // Adjust target index if source was before target
  const insertAt = fromIndex < targetIndex ? targetIndex - 1 : targetIndex;
  modules.splice(insertAt, 0, moved);
  saveModules(cid, modules);
  _dragModuleId = null;
  render();
}

/* ── Drag and Drop — move assessments between modules ─────── */
function onAssessDragStart(event, assessId) {
  event.stopPropagation(); // prevent parent folder's draggable from hijacking
  _dragAssessId = assessId;
  _dragModuleId = null;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', assessId);
  // Slight delay to apply dragging style after browser paints the drag image
  setTimeout(() => {
    const el = document.getElementById('ac-' + assessId);
    if (el) el.classList.add('dragging');
  }, 0);
}

function onAssessDragEnd(event) {
  _dragAssessId = null;
  _clearMergeState();
  document.querySelectorAll('.assess-card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.mod-folder.drag-over').forEach(el => el.classList.remove('drag-over'));
  document.querySelectorAll('.assess-card.merge-target').forEach(el => el.classList.remove('merge-target'));
}

function onFolderDragOver(event, moduleId) {
  // Only highlight for assessment drags, not module reorder
  if (_dragModuleId) return;
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  const folder = event.currentTarget;
  if (!folder.classList.contains('drag-over')) folder.classList.add('drag-over');
}

function onFolderDragLeave(event) {
  const folder = event.currentTarget;
  if (!folder.contains(event.relatedTarget)) {
    folder.classList.remove('drag-over');
  }
}

function onFolderDrop(event, targetModuleId) {
  // Only handle assessment drops, not module reorder
  if (_dragModuleId) return;
  event.preventDefault();
  const assessId = event.dataTransfer.getData('text/plain') || _dragAssessId;
  if (!assessId) return;
  const cid = activeCourse;
  const assessments = getAssessments(cid);
  const a = assessments.find(x => x.id === assessId);
  if (!a) return;
  // Update the module
  if (targetModuleId === '__none__') {
    delete a.moduleId;
  } else {
    a.moduleId = targetModuleId;
  }
  saveAssessments(cid, assessments);
  // Clean up drag states and re-render
  _dragAssessId = null;
  render();
}

/* ── Drag-to-merge: create module from two uncategorized cards ── */

function onAssessCardDragOver(event, targetId) {
  if (!_dragAssessId || _dragModuleId) return;
  if (_dragAssessId === targetId) return;
  // Both must be uncategorized
  const cid = activeCourse;
  const assessments = getAssessments(cid);
  const draggedA = assessments.find(x => x.id === _dragAssessId);
  const targetA = assessments.find(x => x.id === targetId);
  if (!draggedA || draggedA.moduleId || !targetA || targetA.moduleId) return;

  event.preventDefault();
  event.stopPropagation();
  event.dataTransfer.dropEffect = 'move';

  if (_mergeTargetId === targetId) return;

  _clearMergeState();
  _mergeTargetId = targetId;
  _mergeHoverTimer = setTimeout(() => {
    _mergeAnimating = true;
    const el = document.getElementById('ac-' + targetId);
    if (el) el.classList.add('merge-target');
  }, 300);
}

function onAssessCardDragLeave(event, targetId) {
  const el = document.getElementById('ac-' + targetId);
  if (el && el.contains(event.relatedTarget)) return;
  if (_mergeTargetId === targetId) _clearMergeState();
}

function onAssessCardDrop(event, targetId) {
  if (!_mergeAnimating || _mergeTargetId !== targetId) return;
  if (!_dragAssessId || _dragAssessId === targetId) return;
  event.preventDefault();
  event.stopPropagation();
  mergeToNewModule(_dragAssessId, targetId);
  _clearMergeState();
  _dragAssessId = null;
}

function _clearMergeState() {
  if (_mergeHoverTimer) { clearTimeout(_mergeHoverTimer); _mergeHoverTimer = null; }
  if (_mergeTargetId) {
    const el = document.getElementById('ac-' + _mergeTargetId);
    if (el) el.classList.remove('merge-target');
  }
  _mergeTargetId = null;
  _mergeAnimating = false;
}

function mergeToNewModule(draggedId, targetId) {
  const cid = activeCourse;
  const modules = getModules(cid);
  const idx = modules.length;
  const color = MODULE_COLORS[idx % MODULE_COLORS.length];
  const newModule = { id: uid(), name: 'Module ' + (idx + 1), color, sortOrder: idx, created: new Date().toISOString() };
  modules.push(newModule);
  saveModules(cid, modules);
  const assessments = getAssessments(cid);
  [draggedId, targetId].forEach(aid => {
    const a = assessments.find(x => x.id === aid);
    if (a) a.moduleId = newModule.id;
  });
  saveAssessments(cid, assessments);
  collapsedModules[newModule.id] = false;
  render();
  setTimeout(() => {
    const input = document.querySelector(`.mod-folder[data-module-id="${newModule.id}"] .mod-folder-name-input`);
    if (input) { input.focus(); input.select(); }
  }, 50);
}

function deleteSection(secId, scoreCount) {

    ? 'This section has ' + scoreCount + ' score(s) across its tags. Deleting it will hide those scores. Continue?'
    : 'Delete this section and all its tags?';

function addTag(secId) {
  const cid = activeCourse;
  const map = ensureCustomLearningMap(cid);
  const sec = map.sections.find(s => s.id === secId);
  if (!sec) return;
  // Generate tag ID: section prefix + next number
  const prefix = sec.id;
  const existingNums = sec.tags.map(t => { const m = t.id.match(/\d+$/); return m ? parseInt(m[0]) : 0; });
  const nextNum = (existingNums.length > 0 ? Math.max(...existingNums) : 0) + 1;
  const newId = prefix + nextNum;
  sec.tags.push({ id: newId, label: 'New Tag', text: '' });
  saveLearningMap(cid, map);
  render();
  // Open the section and focus the new tag
  setTimeout(() => {
    const secRow = document.querySelector(`.lo-section-row[data-section="${secId}"]`);
    if (secRow && !secRow.classList.contains('open')) secRow.classList.add('open');
    const newTagInput = document.querySelector(`.lo-tag-row[data-tag="${newId}"] .lo-tag-label-input`);

  }, 50);
}

    scores: getScores(cid),

    observations: getQuickObs(cid),
    termRatings: getTermRatings(cid),
    customTags: getCustomTags(cid),
    reportConfig: getReportConfig(cid)
  };
  const blob = new Blob([JSON.stringify(data,null,2)], { type:'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `gradebook-${cid}-${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function importData(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { try { const data = JSON.parse(e.target.result); if (!data || typeof data !== 'object' || Array.isArray(data)) { alert('Invalid file: expected a gradebook export object.'); return; } const cid = data.course||activeCourse;
  if(data.students)saveStudents(cid,data.students);if(data.assessments)saveAssessments(cid,data.assessments);if(data.scores)saveScores(cid,data.scores);if(data.overrides)saveOverrides(cid,data.overrides);if(data.notes)saveNotes(cid,data.notes);if(data.config)saveCourseConfig(cid,data.config);
  if(data.learningMap && data.learningMap._customized) saveLearningMap(cid, data.learningMap);
  if(data.modules) saveModules(cid, data.modules);
  if(data.units) saveModules(cid, data.units); // legacy import support
  if(data.rubrics) saveRubrics(cid, data.rubrics);
  if(data.statuses) saveAssignmentStatuses(cid, data.statuses);
  if(data.flags) saveFlags(cid, data.flags);
  if(data.goals) saveGoals(cid, data.goals);
  if(data.reflections) saveReflections(cid, data.reflections);
  if(data.observations) saveQuickObs(cid, data.observations);
  if(data.termRatings) saveTermRatings(cid, data.termRatings);
  if(data.customTags) saveCustomTags(cid, data.customTags);
  if(data.reportConfig) saveReportConfig(cid, data.reportConfig);
  activeCourse=cid;setActiveCourse(cid);location.reload();} catch(err){alert('Invalid JSON: '+err.message);} }; reader.readAsText(file);
}
function clearData() {
  if (!activeCourse || !COURSES[activeCourse]) return;
  showConfirm('Clear All Data', 'Delete ALL data for ' + COURSES[activeCourse].name + '?', 'Delete All', 'danger', () => {
    deleteCourseData(activeCourse);
    location.reload();
  });
}

function resetDemoData() {
  showConfirm('Reset Demo Data', 'Reset ALL data to demo defaults? This cannot be undone.', 'Reset', 'danger', () => {
    // Delete all course data
    Object.keys(COURSES).forEach(cid => deleteCourseData(cid));
    // Clear the COURSES object
    Object.keys(COURSES).forEach(cid => delete COURSES[cid]);
    // Also clear Supabase teacher_config if connected
    if (typeof _useSupabase !== 'undefined' && _useSupabase && typeof getSupabase === 'function') {
      const sb = getSupabase();
      if (sb && typeof _teacherId !== 'undefined' && _teacherId) {

/* ── CSV Export ─────────────────────────────────────────────── */
function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function exportScoresCSV() {
  const cid = activeCourse;
  const students = sortStudents(getStudents(cid), 'lastName');
  const assessments = getAssessments(cid);
  const scores = getScores(cid);
  const statuses = getAssignmentStatuses(cid);

  let csv = 'Student,Assessment,Date,Type,Tag,Tag Label,Score,Status\n';
  students.forEach(st => {
    assessments.forEach(a => {
      const stStatus = statuses[st.id + ':' + a.id] || '';
      (a.tagIds || []).forEach(tid => {
        const tag = getTagById(cid, tid);
        const entry = (scores[st.id] || []).find(s => s.assessmentId === a.id && s.tagId === tid);
        const score = entry ? entry.score : 0;
        csv += `"${(displayName(st)).replace(/"/g,'""')}","${a.title.replace(/"/g,'""')}","${a.date}","${a.type}","${tid}","${tag ? tag.label.replace(/"/g,'""') : ''}","${score}","${stStatus}"\n`;
      });
    });
  });

  downloadCSV(csv, `scores-${cid}-${new Date().toISOString().slice(0,10)}.csv`);
}

function exportSummaryCSV() {
  const cid = activeCourse;
  const students = sortStudents(getStudents(cid), 'lastName');
  const sections = getSections(cid);

  let csv = 'Student,Overall';
  sections.forEach(sec => { csv += ',"' + sec.name.replace(/"/g,'""') + '"'; });
  csv += '\n';

  students.forEach(st => {
    const overall = getOverallProficiency(cid, st.id);
    csv += `"${(displayName(st)).replace(/"/g,'""')}","${overall > 0 ? overall.toFixed(1) : ''}"`;
    sections.forEach(sec => {
      const sp = getSectionProficiency(cid, st.id, sec.id);
      csv += `,"${sp > 0 ? sp.toFixed(1) : ''}"`;
    });
    csv += '\n';
  });

  downloadCSV(csv, `summary-${cid}-${new Date().toISOString().slice(0,10)}.csv`);
}

/* ── Keyboard Navigation for Score Grids ──────────────────── */
let _kbFocusEl = null;

function kbFocusCell(el) {
  if (_kbFocusEl) _kbFocusEl.classList.remove('kb-focus');
  _kbFocusEl = el;
  if (el) { el.classList.add('kb-focus'); el.scrollIntoView({ block:'nearest' }); }
}

function navigateKb(direction) {
  if (!_kbFocusEl) return;

  // Tag grid navigation (.score-group)
  if (_kbFocusEl.classList.contains('score-group')) {
    const grid = _kbFocusEl.closest('.score-grid');
    if (!grid) return;
    const allGroups = Array.from(grid.querySelectorAll('.score-group'));
    if (allGroups.length === 0) return;
    const rows = Array.from(grid.querySelectorAll('.score-row'));
    const curRow = _kbFocusEl.closest('.score-row');
    const rowIdx = rows.indexOf(curRow);
    const groupsInRow = Array.from(curRow.querySelectorAll('.score-group'));
    const colIdx = groupsInRow.indexOf(_kbFocusEl);
    let newRow = rowIdx, newCol = colIdx;
    if (direction === 'up') newRow = Math.max(0, rowIdx - 1);
    else if (direction === 'down') newRow = Math.min(rows.length - 1, rowIdx + 1);
    else if (direction === 'left') newCol = Math.max(0, colIdx - 1);
    else if (direction === 'right') newCol = Math.min(groupsInRow.length - 1, colIdx + 1);
    const targetRow = rows[newRow];
    const targetGroups = Array.from(targetRow.querySelectorAll('.score-group'));
    const target = targetGroups[Math.min(newCol, targetGroups.length - 1)];
    if (target) kbFocusCell(target);
    return;
  }

  // Rubric speedgrader navigation (.rsg-criterion-row)
  if (_kbFocusEl.classList.contains('rsg-criterion-row')) {
    const grid = _kbFocusEl.closest('.rsg-grid');
    if (!grid) return;
    const allCritRows = Array.from(grid.querySelectorAll('.rsg-criterion-row'));
    const curIdx = allCritRows.indexOf(_kbFocusEl);
    if (curIdx < 0) return;
    let newIdx = curIdx;
    if (direction === 'up' || direction === 'left') newIdx = Math.max(0, curIdx - 1);
    else if (direction === 'down' || direction === 'right') newIdx = Math.min(allCritRows.length - 1, curIdx + 1);
    if (allCritRows[newIdx]) kbFocusCell(allCritRows[newIdx]);
    return;
  }
}

// Click delegation: focus score cells
document.addEventListener('click', function(e) {
  const group = e.target.closest('.score-group');
  if (group) { kbFocusCell(group); return; }
  const critRow = e.target.closest('.rsg-criterion-row');
  if (critRow) { kbFocusCell(critRow); return; }
  // Click outside score cells: unfocus (but not if clicking col-fill-menu)
  if (_kbFocusEl && !e.target.closest('.col-fill-menu') && !e.target.closest('.row-fill-btn') && !e.target.closest('.bulk-bar')) {
    kbFocusCell(null);
  }
});

// Keydown handler for score cells
document.addEventListener('keydown', function(e) {
  if (!_kbFocusEl) return;
  if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;

  const key = e.key;

  // Number keys 1-4: set score
  if (['1','2','3','4'].includes(key)) {
    e.preventDefault();
    const val = parseInt(key);
    if (_kbFocusEl.classList.contains('score-group')) {
      const opt = _kbFocusEl.querySelector('.s' + val);
      if (opt) opt.click();
    }
    if (_kbFocusEl.classList.contains('rsg-criterion-row')) {
      const lvl = _kbFocusEl.querySelector('.l' + val);
      if (lvl) lvl.click();
    }
    navigateKb('down');
    return;
  }

  // 0 or Backspace/Delete: clear score
  if (key === '0' || key === 'Backspace' || key === 'Delete') {
    e.preventDefault();
    if (_kbFocusEl.classList.contains('score-group')) {
      const active = _kbFocusEl.querySelector('.score-opt.active');
      if (active) active.click();
    }
    if (_kbFocusEl.classList.contains('rsg-criterion-row')) {
      const active = _kbFocusEl.querySelector('.rsg-level.active');
      if (active) active.click();
    }
    return;
  }

  // Arrow keys: navigate
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(key)) {
    e.preventDefault();
    navigateKb(key.replace('Arrow','').toLowerCase());
    return;
  }

  // Escape: unfocus
  if (key === 'Escape') {
    kbFocusCell(null);
    return;
  }
});
