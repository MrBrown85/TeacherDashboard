<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Learning profile builder and communicator for BC teachers. Track student proficiency, manage curriculum, and generate reports."
    />
    <title>FullVision</title>
    <link rel="manifest" href="../manifest.json" />
    <meta name="theme-color" content="#007AFF" />
    <link rel="stylesheet" href="../teacher/styles.css?v=3" />
    <link rel="stylesheet" href="../teacher/dashboard.css" />
    <link rel="stylesheet" href="../teacher/assignments.css" />
    <link rel="stylesheet" href="../teacher/student.css" />
    <link rel="stylesheet" href="../teacher/gradebook.css" />
    <link rel="stylesheet" href="../teacher/observations.css" />
    <link rel="stylesheet" href="../teacher/reports.css" />
    <!-- login.css omitted: only needed on login.html, its body{} rules conflict with SPA layout -->
    <script src="../shared/sentry-init.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <div id="gb-tooltip" class="u-hidden"></div>
    <div id="dock-mount"></div>
    <div class="page-layout" id="page-layout">
      <div id="sidebar-mount"></div>
      <div class="u-flex-col-fill">
        <div id="page-toolbar-mount"></div>
        <main class="page-main" id="main"></main>
      </div>
    </div>

    <!-- curriculum_data.js (971 KB) is lazy-loaded by loadCurriculumIndex() in gb-data.js -->
    <script>
      // Auto-detect mobile viewport and redirect to mobile experience.
      // Keep localhost on desktop so responsive/debug workflows can inspect the SPA.
      if (
        window.innerWidth <= 768 &&
        localStorage.getItem('td-mobile-pref') !== 'desktop' &&
        location.hostname !== 'localhost'
      ) {
        window.location.replace('/teacher-mobile/');
      }
      window.__ENV = {
        SUPABASE_URL: '__SUPABASE_URL__',
        SUPABASE_KEY: '__SUPABASE_KEY__',
      };
    </script>
    <script src="../vendor/supabase.min.js"></script>
    <script>
      if (typeof supabase === 'undefined') {
        document.write(
          '<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"><\/script>',
        );
      }
    </script>
    <script src="../shared/supabase.js"></script>
    <script src="../shared/constants.js"></script>
    <script src="../shared/data.js"></script>
    <script src="../shared/offline-queue.js"></script>
    <script src="../shared/demo-seed.js"></script>
    <script src="../shared/calc.js"></script>
    <script src="../teacher/ui.js"></script>
    <!-- seed-data.js (113KB) lazy-loaded by loadSeedIfNeeded() — only fetched for new accounts -->
    <!-- Submodules (loaded before their parent page modules) -->
    <script src="../teacher/report-blocks.js"></script>
    <script src="../teacher/report-questionnaire.js"></script>
    <script src="../teacher/report-builder-ui.js"></script>
    <script src="../teacher/report-preview.js"></script>
    <script src="../teacher/dash-class-manager.js"></script>
    <script src="../teacher/dash-overview.js"></script>
    <script src="../teacher/dash-student-cards.js"></script>
    <script src="../teacher/assign-collab.js"></script>
    <script src="../teacher/student-notes.js"></script>
    <script src="../teacher/student-overrides.js"></script>
    <!-- Page modules -->
    <script src="../teacher/page-dashboard.js"></script>
    <script src="../teacher/page-assignments.js"></script>
    <script src="../teacher/page-student.js"></script>
    <script src="../teacher/page-gradebook.js"></script>
    <script src="../teacher/page-observations.js"></script>
    <script src="../teacher/page-reports.js"></script>
    <script src="../teacher/router.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      }
    </script>
  </body>
</html>
