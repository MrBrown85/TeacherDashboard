name: E2E real-Supabase smoke

# Runs the full-class smoke spec against the live gradebook-prod project on
# PRs that touch the persistence layer. The smoke spec is the regression
# that catches "my class disappeared" — exactly the data-loss bug that
# motivated this whole test architecture.
#
# Required secrets (configure at https://github.com/MrBrown85/FullVision/settings/secrets/actions):
#   - SUPABASE_URL          — gradebook-prod URL
#   - SUPABASE_KEY          — anon publishable key
#   - TEST_USER_EMAIL       — disposable test account email
#   - TEST_USER_PASSWORD    — password for that account
#
# When the secrets aren't configured the job fails fast — no silent skip.
# This is intentional: a "missing secret" failure is what tells the user to
# wire them up the first time.

on:
  pull_request:
    paths:
      - 'shared/data.js'
      - 'shared/supabase.js'
      - 'shared/offline-queue.js'
      - 'e2e-real/**'
      - 'playwright.real.config.js'
      - 'package.json'
      - '.github/workflows/e2e-real-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets are present
        run: |
          missing=0
          for var in SUPABASE_URL SUPABASE_KEY TEST_USER_EMAIL TEST_USER_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is not set. Configure at repo Settings → Secrets and variables → Actions."
              missing=1
            fi
          done
          exit $missing

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke spec
        run: npm run test:e2e:real:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
