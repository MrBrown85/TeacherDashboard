<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Individual student proficiency dashboard with assessment history and learning outcomes.">
<title>Student Dashboard — Gradebook</title>
<link rel="stylesheet" href="gb-styles.css?v=3">
<link rel="stylesheet" href="student.css">
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>
<div id="dock-mount"></div>
<div class="page-layout" id="page-layout">
  <div id="sidebar-mount"></div>
  <main class="page-main" id="main"></main>
</div>

<script src="vendor/supabase.min.js"></script>
<script src="gb-supabase.js"></script>
<script src="gb-constants.js"></script>
<script src="gb-data.js"></script>
<script src="gb-calc.js"></script>
<script src="gb-ui.js"></script>
<script src="gb-seed-data.js"></script>
<script>
requireAuth();
/* ── State ─────────────────────────────────────────────────── */
var studentId = getParam('id');
var activeCourse = getParam('course') || getActiveCourse();
setActiveCourse(activeCourse);
let activeSectionFilters = new Set(); // section IDs currently filtering the grades table

async function switchCourse(cid) {
  setActiveCourse(cid);
  await initData(cid);
  window.location.href = 'index.html';
}

function switchStudent(sid) {
  studentId = sid;
  activeSectionFilters.clear();
  history.replaceState(null, '', `student.html?id=${sid}&course=${activeCourse}`);
  document.getElementById('sidebar-mount').innerHTML = renderSidebar(activeCourse, sid, 'switchStudent');
  render();
}

function toggleGradesView() {
  const wrap = document.getElementById('grades-table-wrap');
  const text = document.getElementById('grades-toggle-text');
  const arrow = document.getElementById('grades-toggle-arrow');
  if (!wrap) return;
  const isCollapsed = wrap.classList.toggle('collapsed');
  if (text) text.textContent = isCollapsed ? 'Show All Assignments' : 'Show Less';
  if (arrow) arrow.textContent = isCollapsed ? '▼' : '▲';
}

function toggleSectionFilter(secId) {
  if (activeSectionFilters.has(secId)) {
    activeSectionFilters.delete(secId);
  } else {
    activeSectionFilters.add(secId);
  }
  render();
}

/* ── Boot ──────────────────────────────────────────────────── */
(async function() {
  seedIfNeeded();
  await initAllCourses();
  activeCourse = getParam('course') || getActiveCourse();
  setActiveCourse(activeCourse);
  await initData(activeCourse);
  migrateAllStudents();
  document.getElementById('dock-mount').innerHTML = renderDock('student');
  document.getElementById('sidebar-mount').innerHTML = renderSidebar(activeCourse, studentId, 'switchStudent');
  initSidebarToggle();
  render();
})();

/* ── Main render ──────────────────────────────────────────── */
function render() {
  const cid = activeCourse;
  const course = COURSES[cid];
  const students = getStudents(cid);
  const student = students.find(s => s.id === studentId);
  if (!student) { document.getElementById('main').innerHTML = '<p>Student not found.</p>'; return; }

  const sections = getSections(cid);
  const allTags = getAllTags(cid);
  const assessments = getAssessments(cid);
  const overall = getOverallProficiency(cid, studentId);
  const overallRounded = Math.round(overall);
  const profColor = PROF_COLORS[overallRounded] || PROF_COLORS[0];

  // Completion stats
  const coveredTags = allTags.filter(t => {
    const sc = getTagScores(cid, studentId, t.id);
    return sc.some(s => s.type === 'summative' && s.score > 0);
  }).length;
  const scoredAssessments = new Set();
  const allScores = getScores(cid)[studentId] || [];
  allScores.forEach(s => { if (s.score > 0) scoredAssessments.add(s.assessmentId); });
  const completionPct = getCompletionPct(cid, studentId);

  const statuses = getAssignmentStatuses(cid);

  // ── Toolbar ──
  let html = `<div class="student-toolbar">
    <a class="tb-back-btn" href="index.html?course=${cid}">&larr; Dashboard</a>
    <button class="tb-edit-btn" data-action="openEditStudent">Edit Student</button>
  </div>`;

  html += '<div class="student-scroll"><div style="padding:16px 20px">';

  // ── Header: shared student header ──
  html += renderStudentHeader(cid, studentId, {
    buttonLabel: 'Term Questionnaire',
    buttonHref: `reports.html?course=${cid}&tab=questionnaire&student=${studentId}`
  });

  const obs = getStudentQuickObs(cid, studentId);
  const att = student.attendance || [];

  // ── Stats bar: completion on left, section breakdowns fill rest ──
  html += `<div class="student-stats-bar">`;
  html += `<div class="completion-card">
    ${completionRing(completionPct, profColor)}
    <div class="completion-stats">
      <div class="completion-stat"><strong>${scoredAssessments.size}/${assessments.length}</strong> assessed</div>
      <div class="completion-stat"><strong>${coveredTags}/${allTags.length}</strong> tags covered</div>
    </div>
  </div>`;
  sections.forEach(sec => {
    const sp = getSectionProficiency(cid, studentId, sec.id);
    const isActive = activeSectionFilters.has(sec.id);
    const isDimmed = activeSectionFilters.size > 0 && !isActive;
    html += `<div class="section-mini-card${isActive ? ' active-filter' : ''}${isDimmed ? ' dimmed' : ''}" data-action="toggleSectionFilter" data-secid="${sec.id}">
      <div class="section-mini-stripe" style="background:${sec.color}"></div>
      <div class="section-mini-val" style="color:${sp > 0 ? sec.color : 'var(--text-3)'}">${sp > 0 ? sp.toFixed(1) : '—'}</div>
      <div class="section-mini-label">${esc(sec.name)}</div>
    </div>`;
  });
  html += `</div>`; // end stats-bar

  // ── Assessment Grades Table ──
  let sortedAssessments = [...assessments].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  // Filter by selected sections
  if (activeSectionFilters.size > 0) {
    const filterTagIds = new Set();
    sections.forEach(sec => {
      if (activeSectionFilters.has(sec.id)) {
        sec.tags.forEach(t => filterTagIds.add(t.id));
      }
    });
    sortedAssessments = sortedAssessments.filter(a =>
      (a.tagIds || []).some(tid => filterTagIds.has(tid))
    );
  }

  html += `<div class="grades-section">
    <div class="grades-header">
      <div class="insight-title" style="margin-bottom:0">Assessment Grades${activeSectionFilters.size > 0 ? ` <span style="font-family:var(--font-base);font-size:0.72rem;font-weight:500;color:var(--text-3);text-transform:none;letter-spacing:0">(filtered — <a href="#" data-action="clearSectionFilters" style="color:var(--active);text-decoration:none">show all</a>)</span>` : ''}</div>
      <div class="grades-legend">
        <span class="grades-legend-item"><span class="grades-legend-dot" style="background:${PROF_COLORS[4]}"></span>Ext</span>
        <span class="grades-legend-item"><span class="grades-legend-dot" style="background:${PROF_COLORS[3]}"></span>Pro</span>
        <span class="grades-legend-item"><span class="grades-legend-dot" style="background:${PROF_COLORS[2]}"></span>Dev</span>
        <span class="grades-legend-item"><span class="grades-legend-dot" style="background:${PROF_COLORS[1]}"></span>Emg</span>
        <span class="grades-legend-item"><span class="grades-legend-dot" style="background:var(--surface-2);border:1px solid var(--border)"></span>—</span>
      </div>
    </div>
    <div class="grades-table-wrap${sortedAssessments.length > 8 ? ' collapsed' : ''}" id="grades-table-wrap">
    <table class="grades-table">
      <thead><tr>
        <th class="gt-col-status"></th>
        <th class="gt-col-title">Assignment</th>
        <th class="gt-col-date">Date</th>
        <th class="gt-col-type">Type</th>`;

  const allAssessTagIds = [];
  sortedAssessments.forEach(a => { (a.tagIds||[]).forEach(tid => { if (!allAssessTagIds.includes(tid)) allAssessTagIds.push(tid); }); });
  const tagColGroups = [];
  sections.forEach(sec => {
    const secTags = sec.tags.filter(t => allAssessTagIds.includes(t.id));
    if (secTags.length > 0) tagColGroups.push({ sec, tags: secTags });
  });

  tagColGroups.forEach(g => {
    g.tags.forEach(tag => {
      html += `<th class="gt-col-score" style="color:${g.sec.color}" title="${esc(tag.text || tag.label)}">${esc(tag.id)}</th>`;
    });
  });
  html += `<th class="gt-col-avg">Avg</th></tr></thead><tbody>`;

  sortedAssessments.forEach(assess => {
    const assessScores = allScores.filter(s => s.assessmentId === assess.id);
    const scoredCount = assessScores.filter(s => s.score > 0).length;
    const totalTags = (assess.tagIds || []).length;
    const allScored = totalTags > 0 && scoredCount >= totalTags;
    const noneScored = scoredCount === 0;
    const isLate = assess.dueDate && new Date(assess.dueDate) < new Date() && noneScored;

    const statusColor = isLate ? 'var(--priority)' : noneScored ? 'var(--text-3)' : allScored ? 'var(--score-3)' : '#e65100';
    const statusIcon = isLate ? '⚠' : noneScored ? '○' : allScored ? '●' : '◐';
    const statusTitle = isLate ? 'Past due — not scored' : noneScored ? 'Not scored' : allScored ? 'Complete' : scoredCount + '/' + totalTags + ' scored';

    const scoredEntries = assessScores.filter(s => s.score > 0);
    const rowAvg = scoredEntries.length > 0 ? scoredEntries.reduce((sum,s) => sum + s.score, 0) / scoredEntries.length : 0;
    const rowAvgR = Math.round(rowAvg);

    const mod = assess.moduleId ? getModuleById(cid, assess.moduleId) : null;

    const assessStatus = statuses[studentId + ':' + assess.id];
    html += `<tr class="gt-row${noneScored ? ' gt-row-empty' : ''}${assessStatus ? ' gt-row-status' : ''}">
      <td class="gt-cell-status" title="${statusTitle}"><span style="color:${statusColor}">${statusIcon}</span></td>
      <td class="gt-cell-title">
        <a class="gt-title-text" href="settings.html?course=${cid}&open=${assess.id}&student=${studentId}" title="Open in Assignments">${esc(assess.title)}</a>
        ${mod ? `<span class="gt-module-dot" style="background:${mod.color}" title="${esc(mod.name)}"></span>` : ''}
        ${assessStatus === 'notSubmitted' ? '<span class="gt-status-tag gt-tag-ns">NS</span>' : assessStatus === 'excused' ? '<span class="gt-status-tag gt-tag-exc">EXC</span>' : ''}
      </td>
      <td class="gt-cell-date">${formatDate(assess.date)}</td>
      <td class="gt-cell-type"><span class="type-badge ${assess.type==='summative'?'type-badge-s':'type-badge-f'}">${assess.type==='summative'?'S':'F'}</span></td>`;

    tagColGroups.forEach(g => {
      g.tags.forEach(tag => {
        const included = (assess.tagIds||[]).includes(tag.id);
        if (!included) {
          html += `<td class="gt-cell-score gt-cell-na"></td>`;
        } else {
          const entry = assessScores.find(s => s.tagId === tag.id);
          const score = entry ? entry.score : 0;
          if (score > 0) {
            html += `<td class="gt-cell-score"><span class="gt-score-pip" style="background:${PROF_COLORS[score]}">${score}</span></td>`;
          } else {
            html += `<td class="gt-cell-score"><span class="gt-score-empty">—</span></td>`;
          }
        }
      });
    });

    html += `<td class="gt-cell-avg">${rowAvg > 0 ? `<span style="color:${PROF_COLORS[rowAvgR]};font-weight:700">${rowAvg.toFixed(1)}</span>` : '<span style="color:var(--text-3)">—</span>'}</td>`;
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;
  if (sortedAssessments.length > 8) {
    html += `<div style="text-align:center"><button class="grades-toggle-btn" data-action="toggleGradesView">
      <span id="grades-toggle-text">Show All ${sortedAssessments.length} Assignments</span>
      <span id="grades-toggle-arrow">▼</span>
    </button></div>`;
  }

  if (scoredAssessments.size === 0) {
    html += `<div class="empty-state">
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-title">No scores yet</div>
      <div class="empty-state-text">Grade assignments in the Assignments tab to see results here.</div>
    </div>`;
  }

  html += `</div>`;

  // ── Section cards grid ──
  const goals = getGoals(cid);
  const reflections = getReflections(cid);
  const studentGoals = goals[studentId] || {};
  const studentReflections = reflections[studentId] || {};

  html += `<div class="dash-grid">`;
  sections.forEach(sec => {
    const sp = getSectionProficiency(cid, studentId, sec.id);
    const spRounded = Math.round(sp);
    const subj = getSubjects(cid).find(su => su.id === sec.subject);
    const growthData = getSectionGrowthData(cid, studentId, sec.id);
    const override = getSectionOverride(cid, studentId, sec.id);
    const rawProf = getSectionProficiencyRaw(cid, studentId, sec.id);

    html += `<div class="dash-section">
      <div class="dash-section-stripe" style="background:${sec.color}"></div>
      <div class="dash-section-header">
        <div>
          <div class="dash-section-title">${esc(sec.name)}</div>
          ${subj ? `<div class="dash-section-subject">${esc(subj.name)}</div>` : ''}
          ${override ? `<div class="override-label">Overridden</div>` : ''}
        </div>
        ${profLabelBadge(sp)}
        <button class="override-btn${override ? ' active' : ''}" data-action="toggleOverridePanel" data-secid="${sec.id}" data-stop-prop="true" title="${override ? 'Edit override' : 'Override proficiency'}">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z"/></svg>
        </button>
      </div>
      <div class="override-panel" id="override-panel-${sec.id}" style="display:none"></div>`;

    // Growth sparkline
    if (growthData.length > 0) {
      html += `<div style="margin-bottom:8px;">
        <span style="font-family:'SF Mono', ui-monospace, 'Menlo', monospace;font-size:0.5rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);margin-right:6px;">Growth</span>
        ${renderGrowthSparkline(growthData)}
      </div>`;
    }

    sec.tags.forEach(tag => {
      const tp = getTagProficiency(cid, studentId, tag.id);
      const tagScores = getTagScores(cid, studentId, tag.id).filter(s => s.type === 'summative');
      const evidenceCount = tagScores.length;
      html += `<div class="dash-tag-row" data-action="toggleTag">
        ${profLabelBadge(tp)}
        <span class="dash-tag-label">${esc(tag.label)}</span>
        <span class="dash-tag-bar">${profBar(tp, 4, sec.color)}</span>
        <span class="dash-tag-evidence">${evidenceCount}</span>
        <span class="dash-tag-chevron">&#9654;</span>
      </div>
      <div class="tag-detail">`;

      // Show all assessments that included this tag
      tagScores.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      if (tagScores.length === 0) {
        html += `<div style="font-size:0.75rem;color:var(--text-3);padding:4px 0;">No evidence yet</div>`;
      } else {
        tagScores.forEach(sc => {
          const assess = assessments.find(a => a.id === sc.assessmentId);
          const sLabel = PROF_LABELS[sc.score] || '—';
          const sColor = PROF_COLORS[sc.score] || PROF_COLORS[0];
          html += `<div class="tag-assess-row">
            <span class="tag-assess-prof" style="color:${sColor}">${sLabel}</span>
            ${assess ? `<a class="tag-assess-title" href="settings.html?course=${cid}&open=${assess.id}&student=${studentId}" style="color:inherit;text-decoration:none" title="Open in Assignments">${esc(assess.title)}</a>` : `<span class="tag-assess-title">Unknown</span>`}
            <span class="tag-assess-date">${formatDate(sc.date)}</span>
          </div>`;
        });
      }
      html += `</div>`;
    });

    // Goal section
    const goalText = studentGoals[sec.id] || '';
    html += `<div class="section-goal" id="goal-${sec.id}">
      <div class="section-goal-label">
        Goal
        <button class="edit-btn-inline" data-action="editGoal" data-secid="${sec.id}">✎ Edit</button>
      </div>
      <div class="section-goal-text" id="goal-text-${sec.id}">${goalText ? esc(goalText) : ''}</div>
      <div class="inline-edit-area" id="goal-edit-${sec.id}" style="display:none">
        <textarea id="goal-input-${sec.id}" placeholder="Set a learning goal for this section…">${esc(goalText)}</textarea>
        <div class="inline-edit-actions">
          <button class="btn btn-primary" data-action="saveGoalField" data-secid="${sec.id}">Save</button>
          <button class="btn" data-action="cancelGoalEdit" data-secid="${sec.id}">Cancel</button>
        </div>
      </div>
    </div>`;

    // Reflection section
    const refl = studentReflections[sec.id] || {};
    const confLabel = refl.confidence ? (CONFIDENCE_LABELS[refl.confidence] || '') : '';
    const confColor = refl.confidence ? (CONFIDENCE_COLORS[refl.confidence] || '#bbb') : '';
    html += `<div class="section-reflection" id="refl-${sec.id}">
      <div class="section-reflection-label">
        Self-Reflection
        ${confLabel ? `<span class="confidence-badge" style="background:${confColor}">${confLabel}</span>` : ''}
        <button class="edit-btn-inline" data-action="editReflection" data-secid="${sec.id}">✎ Edit</button>
      </div>
      <div class="section-reflection-text" id="refl-text-${sec.id}">${refl.text ? esc(refl.text) : ''}</div>
      ${refl.date ? `<div style="font-family:'SF Mono', ui-monospace, 'Menlo', monospace;font-size:0.5rem;color:var(--text-3);margin-top:2px;">${formatDate(refl.date)}</div>` : ''}
      <div class="inline-edit-area" id="refl-edit-${sec.id}" style="display:none">
        <select id="refl-conf-${sec.id}">
          <option value="">Confidence level…</option>
          <option value="1"${refl.confidence===1?' selected':''}>Beginning</option>
          <option value="2"${refl.confidence===2?' selected':''}>Growing</option>
          <option value="3"${refl.confidence===3?' selected':''}>Confident</option>
          <option value="4"${refl.confidence===4?' selected':''}>Leading</option>
        </select>
        <textarea id="refl-input-${sec.id}" placeholder="Student's own words about their learning…">${esc(refl.text || '')}</textarea>
        <div class="inline-edit-actions">
          <button class="btn btn-primary" data-action="saveReflField" data-secid="${sec.id}">Save</button>
          <button class="btn" data-action="cancelReflEdit" data-secid="${sec.id}">Cancel</button>
        </div>
      </div>
    </div>`;

    html += `</div>`;
  });
  html += `</div>`; // end dash-grid

  // ── Insights grid ──
  html += `<div class="insights-grid">`;

  // 1. Growth Profile
  html += `<div class="insight-card">
    <div class="insight-title">Growth Profile</div>`;

  // A. Section proficiency bars
  const gpSections = getSections(cid);
  gpSections.forEach(sec => {
    const prof = getSectionProficiency(cid, studentId, sec.id);
    const trend = getSectionTrend(cid, studentId, sec.id);
    const pct = prof > 0 ? (prof / 4) * 100 : 0;
    const color = prof > 0 ? PROF_COLORS[Math.round(prof)] : 'var(--text-3)';
    const trendIcon = trend === 'up' ? '↑' : trend === 'down' ? '↓' : '';
    const trendColor = trend === 'up' ? 'var(--score-3)' : trend === 'down' ? 'var(--priority)' : '';
    const shortLabel = sec.name.length > 14 ? sec.name.slice(0, 13) + '…' : sec.name;
    html += `<div class="gp-section-row">
      <span class="gp-section-label" title="${esc(sec.name)}">${esc(shortLabel)}</span>
      <div class="gp-section-bar-track">
        <div class="gp-section-bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <span class="gp-section-val" style="color:${color}">${prof > 0 ? prof.toFixed(1) : '—'}</span>
      <span class="gp-section-trend" style="color:${trendColor}">${trendIcon}</span>
    </div>`;
  });

  // B. Observation profile
  html += `<div class="gp-divider"></div>`;
  const gpObs = getStudentQuickObs(cid, studentId);
  const obsDims = {};
  gpObs.forEach(o => (o.dims || []).forEach(d => obsDims[d] = (obsDims[d] || 0) + 1));
  const gpAllDims = [
    {key:'engagement', label:'Engage'},
    {key:'collaboration', label:'Collab'},
    {key:'selfRegulation', label:'Self-Reg'},
    {key:'resilience', label:'Grit'},
    {key:'curiosity', label:'Curiosity'},
    {key:'respect', label:'Respect'}
  ];
  html += `<div class="gp-dims">`;
  gpAllDims.forEach(d => {
    const count = obsDims[d.key] || 0;
    html += `<span class="gp-dim-pip ${count > 0 ? 'active' : 'inactive'}">${d.label}${count > 0 ? ' ' + count : ''}</span>`;
  });
  html += `</div>`;

  // Sentiment summary
  const gpStrengths = gpObs.filter(o => o.sentiment === 'strength').length;
  const gpGrowth = gpObs.filter(o => o.sentiment === 'growth').length;
  const gpConcerns = gpObs.filter(o => o.sentiment === 'concern').length;
  if (gpObs.length > 0) {
    let parts = [`${gpObs.length} observation${gpObs.length !== 1 ? 's' : ''}`];
    if (gpStrengths) parts.push(`${gpStrengths} strength${gpStrengths !== 1 ? 's' : ''}`);
    if (gpGrowth) parts.push(`${gpGrowth} growth`);
    if (gpConcerns) parts.push(`${gpConcerns} concern${gpConcerns !== 1 ? 's' : ''}`);
    html += `<div class="gp-obs-stat">${parts.join(' · ')}</div>`;
  } else {
    html += `<div class="gp-obs-stat">No observations yet</div>`;
  }

  // C. Evidence coverage footer
  html += `<div class="gp-divider"></div>`;
  const gpCompPct = getCompletionPct(cid, studentId);
  const gpAllTags = getAllTags(cid);
  const gpCoveredTags = gpAllTags.filter(t => {
    const sc = getTagScores(cid, studentId, t.id);
    return sc.some(s => s.type === 'summative' && s.score > 0);
  }).length;
  html += `<div class="gp-coverage-row">
    <div class="gp-coverage-bar"><div class="gp-coverage-fill" style="width:${gpCompPct}%"></div></div>
    <span class="gp-coverage-label">${gpCoveredTags}/${gpAllTags.length} tags · ${gpCompPct}%</span>
  </div>`;

  html += `</div>`;

  // 2. Needs Attention
  html += `<div class="insight-card">
    <div class="insight-title">Needs Attention</div>`;

  const attentionItems = [];
  // Missing scores (assessments with 0 scores for this student)
  sortedAssessments.forEach(assess => {
    const assessScores = allScores.filter(s => s.assessmentId === assess.id && s.score > 0);
    const totalTags = (assess.tagIds || []).length;
    if (totalTags === 0) return;
    if (assessScores.length === 0) {
      attentionItems.push({ type:'missing', assess, detail:'No scores entered' });
    } else if (assessScores.length < totalTags) {
      attentionItems.push({ type:'partial', assess, detail:`${assessScores.length}/${totalTags} tags scored` });
    }
  });
  // Low scores (assessments where average < 2)
  sortedAssessments.forEach(assess => {
    const assessScores = allScores.filter(s => s.assessmentId === assess.id && s.score > 0);
    if (assessScores.length === 0) return;
    const avg = assessScores.reduce((sum,s) => sum + s.score, 0) / assessScores.length;
    if (avg < 2 && assess.type === 'summative') {
      attentionItems.push({ type:'low', assess, detail:`Avg ${avg.toFixed(1)} — needs support` });
    }
  });

  if (attentionItems.length === 0) {
    html += `<div class="attention-empty">✓ All caught up — no issues flagged.</div>`;
  } else {
    attentionItems.slice(0, 6).forEach(item => {
      const icon = item.type === 'missing' ? '○' : item.type === 'partial' ? '◐' : '▼';
      const iconBg = item.type === 'missing' ? 'var(--surface-2)' : item.type === 'partial' ? '#fff3e0' : '#fce4ec';
      const iconColor = item.type === 'missing' ? 'var(--text-3)' : item.type === 'partial' ? '#e65100' : '#c62828';
      html += `<div class="attention-item">
        <div class="attention-icon" style="background:${iconBg};color:${iconColor}">${icon}</div>
        <div class="attention-info">
          <div class="attention-title">${esc(item.assess.title)}</div>
          <div class="attention-detail">${item.detail} · ${formatDate(item.assess.date)}</div>
        </div>
      </div>`;
    });
  }
  html += `</div>`;

  // 2b. Assignment Feedback (from quick obs with assignmentContext)
  const assignFeedback = getStudentAssignmentFeedback(cid, studentId);
  if (assignFeedback.length > 0) {
    html += `<div class="insight-card"><div class="insight-title">Assignment Feedback</div><div class="notes-list">`;
    assignFeedback.slice(0, 5).forEach(fb => {
      const d = new Date(fb.created);
      const ds = d.toLocaleDateString('en-CA', { month:'short', day:'numeric' });
      html += `<div class="note-inline">
        <div class="note-inline-left"><span class="note-inline-date">${ds}</span></div>
        <div class="note-inline-body">
          <span class="note-assign-badge">${esc(fb.assignmentContext.assessmentTitle)}${fb.assignmentContext.proficiencyLevel ? ' · ' + fb.assignmentContext.proficiencyLevel : ''}</span>
          <div class="note-inline-text">${esc(fb.text)}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // 3. Notes & Observations (unified from quick obs)
  html += `<div class="insight-card notes-panel">
    <div class="insight-title">Notes & Observations</div>
    <input type="text" class="note-search-input" id="note-search" placeholder="Search…" oninput="filterNotes(this.value)" aria-label="Search notes">
    <div class="notes-scroll"><div class="notes-list" id="notes-list"></div></div>
    <div class="note-add-row">
      <input class="note-add-input" id="note-input" placeholder="Add a note\u2026" onkeydown="if(event.key==='Enter'){addNote();event.preventDefault()}" aria-label="Add a note">
      <button class="note-add-btn" data-action="addNote">Add</button>
    </div>
  </div>`;

  html += `</div>`; // end insights-grid

  // ── Focus areas callout ──
  const focusAreas = getFocusAreas(cid, studentId, 3);
  if (focusAreas.length > 0) {
    html += `<div class="focus-callout">
      <div class="focus-callout-title">Focus Areas</div>`;
    focusAreas.forEach(fa => {
      html += `<div class="focus-callout-item">
        ${profLabelBadge(fa.prof)}
        <span><strong>${esc(fa.tag.label)}</strong> — ${esc(fa.tag.text)}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // ── Core Competencies profile ──
  const ccTally = {};
  CORE_COMPETENCIES.forEach(cc => { ccTally[cc.id] = 0; });
  assessments.forEach(assess => {
    if (!(assess.coreCompetencyIds && assess.coreCompetencyIds.length > 0)) return;
    const hasScore = allScores.some(s => s.assessmentId === assess.id && s.score > 0);
    if (!hasScore) return;
    assess.coreCompetencyIds.forEach(ccId => { if (ccTally[ccId] !== undefined) ccTally[ccId]++; });
  });
  const maxCC = Math.max(1, ...Object.values(ccTally));
  const anyCC = Object.values(ccTally).some(v => v > 0);

  if (anyCC) {
    html += `<div class="cc-profile">
      <div class="cc-profile-title">Core Competencies</div>
      <div class="cc-profile-grid">`;
    const groups = {};
    CORE_COMPETENCIES.forEach(cc => {
      if (!groups[cc.group]) groups[cc.group] = [];
      groups[cc.group].push(cc);
    });
    Object.entries(groups).forEach(([group, ccs]) => {
      html += `<div class="cc-group">
        <div class="cc-group-label" style="color:${ccs[0].color}">${esc(group)}</div>`;
      ccs.forEach(cc => {
        const count = ccTally[cc.id];
        const pct = Math.round((count / maxCC) * 100);
        html += `<div class="cc-bar-row">
          <span class="cc-bar-label">${esc(cc.label)}</span>
          <div class="cc-bar-track">
            <div class="cc-bar-fill" style="width:${count > 0 ? Math.max(pct, 6) : 0}%;background:${cc.color}"></div>
          </div>
          <span class="cc-bar-count" style="color:${count > 0 ? cc.color : 'var(--text-3)'}">${count}</span>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  html += '</div></div>'; // close padding wrapper + scroll wrapper
  document.getElementById('main').innerHTML = html;
  renderNotes();
}

/* ── Tag detail toggle ────────────────────────────────────── */
function toggleTag(row) {
  row.classList.toggle('open');
}

/* ── Override UI ──────────────────────────────────────────── */
let _overrideSelectedLevel = 0;

function toggleOverridePanel(secId) {
  const panel = document.getElementById('override-panel-' + secId);
  if (!panel) return;
  // Close any other open panels
  document.querySelectorAll('.override-panel').forEach(p => {
    if (p.id !== 'override-panel-' + secId) p.style.display = 'none';
  });
  if (panel.style.display !== 'none') {
    panel.style.display = 'none';
    return;
  }
  const cid = activeCourse;
  const sid = studentId;
  const override = getSectionOverride(cid, sid, secId);
  const rawProf = getSectionProficiencyRaw(cid, sid, secId);
  const rawRounded = Math.round(rawProf);
  _overrideSelectedLevel = override ? override.level : 0;

  let html = `<div class="override-panel-header">
    <span class="override-panel-title">Override Proficiency</span>
    <button class="override-panel-close" data-action="closeOverridePanel" data-secid="${secId}">&times;</button>
  </div>
  <div class="override-calculated">Calculated: <strong>${rawProf > 0 ? rawProf.toFixed(1) : '—'} ${rawProf > 0 ? PROF_LABELS[rawRounded] : ''}</strong></div>
  <div class="override-levels">
    <button class="override-level-btn${_overrideSelectedLevel === 4 ? ' selected' : ''}" data-level="4" data-action="selectOverrideLevel" data-value="4">4 Extending</button>
    <button class="override-level-btn${_overrideSelectedLevel === 3 ? ' selected' : ''}" data-level="3" data-action="selectOverrideLevel" data-value="3">3 Proficient</button>
    <button class="override-level-btn${_overrideSelectedLevel === 2 ? ' selected' : ''}" data-level="2" data-action="selectOverrideLevel" data-value="2">2 Developing</button>
    <button class="override-level-btn${_overrideSelectedLevel === 1 ? ' selected' : ''}" data-level="1" data-action="selectOverrideLevel" data-value="1">1 Emerging</button>
  </div>
  <label class="override-reason-label">Reason (required)</label>
  <textarea class="override-reason" id="override-reason-${secId}" placeholder="Professional judgment — what evidence supports this override?">${override ? esc(override.reason) : ''}</textarea>
  <div class="override-actions">
    ${override ? `<button class="btn btn-ghost" style="color:var(--score-1)" data-action="clearOverride" data-secid="${secId}">Clear Override</button>` : ''}
    <button class="btn btn-ghost" data-action="closeOverridePanel" data-secid="${secId}">Cancel</button>
    <button class="btn btn-primary" data-action="saveOverride" data-secid="${secId}">Save Override</button>
  </div>`;
  panel.innerHTML = html;
  panel.style.display = '';
}

function selectOverrideLevel(level) {
  _overrideSelectedLevel = (_overrideSelectedLevel === level) ? 0 : level;
  document.querySelectorAll('.override-level-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.level) === _overrideSelectedLevel);
  });
}

function saveOverride(secId) {
  const reason = (document.getElementById('override-reason-' + secId)?.value || '').trim();
  if (_overrideSelectedLevel === 0) { alert('Select a proficiency level.'); return; }
  if (!reason) {
    const el = document.getElementById('override-reason-' + secId);
    if (el) { el.style.border = '2px solid var(--score-1)'; el.focus(); el.placeholder = 'Reason is required'; }
    return;
  }
  setSectionOverride(activeCourse, studentId, secId, _overrideSelectedLevel, reason);
  render();
}

function clearOverride(secId) {
  setSectionOverride(activeCourse, studentId, secId, 0, '');
  render();
}

function closeOverridePanel(secId) {
  const panel = document.getElementById('override-panel-' + secId);
  if (panel) panel.style.display = 'none';
}

/* ── Notes & Observations — unified via quick obs ─────────── */
function renderNotes() {
  const cid = activeCourse;
  // Single source of truth: quick observations
  const obs = getStudentQuickObs(cid, studentId); // sorted newest-first
  const container = document.getElementById('notes-list');
  if (!container) return;

  if (obs.length === 0) {
    container.innerHTML = `<div class="notes-empty">
      <div class="notes-empty-icon">📝</div>
      No notes or observations yet.<br>Add one below or capture from the <a href="observations.html" style="color:var(--active);text-decoration:none">Observations</a> page.
    </div>`;
    return;
  }

  container.innerHTML = obs.map(n => {
    const d = new Date(n.created);
    const shortDate = d.toLocaleDateString('en-CA', { month:'short', day:'numeric' });
    const hasDims = n.dims && n.dims.length > 0;
    const sent = n.sentiment && OBS_SENTIMENTS ? OBS_SENTIMENTS[n.sentiment] : null;
    const ctx = n.context && OBS_CONTEXTS ? OBS_CONTEXTS[n.context] : null;
    return `<div class="note-inline" data-text="${esc(n.text.toLowerCase())}"${sent ? ` style="border-left:3px solid ${sent.border};background:${sent.tint}"` : ''}>
      <div class="note-inline-left">
        ${sent ? `<span style="font-size:0.72rem;display:block;text-align:center;margin-bottom:2px">${sent.icon}</span>` : ''}
        <span class="note-inline-date">${shortDate}</span>
      </div>
      <div class="note-inline-body">
        ${n.assignmentContext ? `<span class="note-assign-badge">${esc(n.assignmentContext.assessmentTitle)}${n.assignmentContext.proficiencyLevel ? ' · ' + n.assignmentContext.proficiencyLevel : ''}</span>` : ''}
        <div class="note-inline-text">${esc(n.text)}</div>
        <div class="note-inline-dims">
          ${hasDims ? n.dims.map(dim =>
            `<span class="note-dim-tag"><span class="note-dim-tag-icon">${OBS_ICONS[dim]||''}</span>${OBS_SHORT[dim]||dim}</span>`
          ).join('') : ''}
          ${ctx ? `<span class="note-dim-tag" style="background:rgba(0,0,0,0.04);color:var(--text-3)">${ctx.icon} ${ctx.label}</span>` : ''}
        </div>
      </div>
      <button class="note-inline-del" data-action="deleteNote" data-noteid="${n.id}" title="Delete" aria-label="Delete note">&times;</button>
    </div>`;
  }).join('');
}

function filterNotes(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.note-inline').forEach(note => {
    const text = note.getAttribute('data-text') || note.textContent.toLowerCase();
    note.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
}

function addNote() {
  const input = document.getElementById('note-input');
  const text = (input.value || '').trim();
  if (!text) return;
  // Write to quick obs — single source of truth
  addQuickOb(activeCourse, studentId, text, []);
  input.value = '';
  input.focus();
  renderNotes();
}

/* ── Goal editing ─────────────────────────────────────────── */
function editGoal(secId) {
  document.getElementById('goal-edit-' + secId).style.display = '';
  document.getElementById('goal-text-' + secId).style.display = 'none';
  document.getElementById('goal-input-' + secId).focus();
}
function cancelGoalEdit(secId) {
  document.getElementById('goal-edit-' + secId).style.display = 'none';
  document.getElementById('goal-text-' + secId).style.display = '';
}
function saveGoalField(secId) {
  const text = (document.getElementById('goal-input-' + secId).value || '').trim();
  const cid = activeCourse;
  const goals = getGoals(cid);
  if (!goals[studentId]) goals[studentId] = {};
  goals[studentId][secId] = text;
  saveGoals(cid, goals);
  render();
}

/* ── Reflection editing ──────────────────────────────────── */
function editReflection(secId) {
  document.getElementById('refl-edit-' + secId).style.display = '';
  document.getElementById('refl-text-' + secId).style.display = 'none';
}
function cancelReflEdit(secId) {
  document.getElementById('refl-edit-' + secId).style.display = 'none';
  document.getElementById('refl-text-' + secId).style.display = '';
}
function saveReflField(secId) {
  const text = (document.getElementById('refl-input-' + secId).value || '').trim();
  const conf = parseInt(document.getElementById('refl-conf-' + secId).value) || 0;
  const cid = activeCourse;
  const reflections = getReflections(cid);
  if (!reflections[studentId]) reflections[studentId] = {};
  reflections[studentId][secId] = { confidence: conf, text, date: new Date().toISOString() };
  saveReflections(cid, reflections);
  render();
}

function deleteNote(noteId) {
  deleteQuickOb(activeCourse, studentId, noteId);
  renderNotes();
}

/* ── Edit Student Modal ──────────────────────────────────── */
function openEditStudent() {
  const cid = activeCourse;
  const students = getStudents(cid);
  const st = students.find(s => s.id === studentId);
  if (!st) return;

  const overlay = document.createElement('div');
  overlay.className = 'edit-modal-overlay';
  overlay.id = 'edit-modal-overlay';
  overlay.setAttribute('role', 'dialog');
  overlay.setAttribute('aria-modal', 'true');
  overlay.setAttribute('aria-labelledby', 'edit-modal-heading');
  overlay.onclick = function(e) { if (e.target === overlay) closeEditStudent(); };

  overlay.innerHTML = `<div class="edit-modal">
    <h2 class="edit-modal-title" id="edit-modal-heading">Edit Student</h2>
    <div class="edit-modal-form">
      <div class="cm-field">
        <label class="cm-label" for="edit-first">First Name *</label>
        <input class="cm-input" id="edit-first" value="${esc(st.firstName || '')}" aria-required="true" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field">
        <label class="cm-label" for="edit-last">Last Name</label>
        <input class="cm-input" id="edit-last" value="${esc(st.lastName || '')}" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field">
        <label class="cm-label" for="edit-pref">Preferred Name</label>
        <input class="cm-input" id="edit-pref" value="${esc(st.preferred || '')}" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field">
        <label class="cm-label" for="edit-pro">Pronouns</label>
        ${pronounsSelect('edit-pro', st.pronouns || '')}
      </div>
      <div class="cm-field">
        <label class="cm-label" for="edit-num">Student Number</label>
        <input class="cm-input" id="edit-num" value="${esc(st.studentNumber || '')}" placeholder="e.g. STU-101" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field">
        <label class="cm-label" for="edit-email">Email</label>
        <input class="cm-input" id="edit-email" type="email" value="${esc(st.email || '')}" placeholder="student@school.edu" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field">
        <label class="cm-label" for="edit-dob">Date of Birth</label>
        <input class="cm-input" id="edit-dob" type="date" value="${st.dateOfBirth || ''}" style="font-size:0.82rem;padding:6px 10px">
      </div>
      <div class="cm-field" style="grid-column:1/-1">
        <label class="cm-label">Designations</label>
        <div class="desig-check-grid">
          ${Object.entries(BC_DESIGNATIONS).map(function(e) {
            var checked = (st.designations || []).indexOf(e[0]) >= 0 ? ' checked' : '';
            return '<label class="desig-check-item" title="'+esc(e[1].desc || '')+'"><input type="checkbox" class="desig-check" value="'+e[0]+'"'+checked+'><span class="desig-check-code">'+e[0]+'</span><span class="desig-check-name">'+esc(e[1].name)+'</span></label>';
          }).join('')}
        </div>
      </div>
    </div>
    <div class="edit-modal-actions">
      <button class="btn-ghost" data-action="closeEditStudent">Cancel</button>
      <button class="btn-primary" data-action="saveEditStudent">Update</button>
    </div>
  </div>`;

  document.body.appendChild(overlay);
  document.getElementById('edit-first').focus();
  // Close on Escape
  overlay._escHandler = function(e) { if (e.key === 'Escape') closeEditStudent(); };
  document.addEventListener('keydown', overlay._escHandler);
}

function closeEditStudent() {
  const overlay = document.getElementById('edit-modal-overlay');
  if (overlay) {
    if (overlay._escHandler) document.removeEventListener('keydown', overlay._escHandler);
    overlay.remove();
  }
}

function saveEditStudent() {
  const cid = activeCourse;
  const firstEl = document.getElementById('edit-first');
  const firstName = (firstEl.value || '').trim();
  if (!firstName) {
    firstEl.style.border = '2px solid var(--score-1)';
    firstEl.placeholder = 'First name is required';
    firstEl.oninput = function() { this.style.border = ''; };
    firstEl.focus();
    return;
  }
  const lastName = (document.getElementById('edit-last').value || '').trim();
  const preferred = (document.getElementById('edit-pref').value || '').trim();
  const pronouns = (document.getElementById('edit-pro').value || '').trim();
  const studentNumber = (document.getElementById('edit-num').value || '').trim();
  const email = (document.getElementById('edit-email').value || '').trim();
  const dateOfBirth = (document.getElementById('edit-dob').value || '').trim();
  const designations = Array.from(document.querySelectorAll('.desig-check:checked')).map(function(cb) { return cb.value; });

  const students = getStudents(cid);
  const st = students.find(s => s.id === studentId);
  if (!st) return;

  st.firstName = firstName;
  st.lastName = lastName;
  st.preferred = preferred;
  st.pronouns = pronouns;
  st.studentNumber = studentNumber;
  st.email = email;
  st.dateOfBirth = dateOfBirth;
  st.designations = designations;
  delete st.designation;
  st.sortName = ((lastName || '') + ' ' + firstName).trim();

  saveStudents(cid, students);
  closeEditStudent();
  render();
}

/* ── Delegated click handler ──────────────────────────────── */
document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;
  if (el.dataset.stopProp === 'true') e.stopPropagation();
  var handlers = {
    'openEditStudent':     function() { openEditStudent(); },
    'toggleSectionFilter': function() { toggleSectionFilter(el.dataset.secid); },
    'clearSectionFilters': function() { e.preventDefault(); activeSectionFilters.clear(); render(); },
    'toggleGradesView':    function() { toggleGradesView(); },
    'toggleOverridePanel': function() { toggleOverridePanel(el.dataset.secid); },
    'toggleTag':           function() { toggleTag(el); },
    'editGoal':            function() { editGoal(el.dataset.secid); },
    'saveGoalField':       function() { saveGoalField(el.dataset.secid); },
    'cancelGoalEdit':      function() { cancelGoalEdit(el.dataset.secid); },
    'editReflection':      function() { editReflection(el.dataset.secid); },
    'saveReflField':       function() { saveReflField(el.dataset.secid); },
    'cancelReflEdit':      function() { cancelReflEdit(el.dataset.secid); },
    'addNote':             function() { addNote(); },
    'closeOverridePanel':  function() { closeOverridePanel(el.dataset.secid); },
    'selectOverrideLevel': function() { selectOverrideLevel(parseInt(el.dataset.value)); },
    'clearOverride':       function() { clearOverride(el.dataset.secid); },
    'saveOverride':        function() { saveOverride(el.dataset.secid); },
    'deleteNote':          function() { deleteNote(el.dataset.noteid); },
    'closeEditStudent':    function() { closeEditStudent(); },
    'saveEditStudent':     function() { saveEditStudent(); }
  };
  if (handlers[action]) {
    e.preventDefault();
    handlers[action]();
  }
});
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
