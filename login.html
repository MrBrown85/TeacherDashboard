<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sign in to FullVision — a learning profile builder and communicator for BC teachers.">
<title>Sign In — FullVision</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007AFF">
<link rel="stylesheet" href="teacher/styles.css?v=3">
<link rel="stylesheet" href="login.css">
</head>
<body>

<main class="auth-card">
  <h1 class="auth-title">FullVision</h1>
  <p class="auth-subtitle">Learning Profile Builder and Communicator</p>

  <!-- Tab toggle -->
  <div class="auth-tabs" role="tablist" aria-label="Authentication">
    <button class="auth-tab active" id="tab-signin" data-action="switch-tab" data-tab="signin" role="tab" aria-selected="true" aria-controls="form-signin">Sign In</button>
    <button class="auth-tab" id="tab-signup" data-action="switch-tab" data-tab="signup" role="tab" aria-selected="false" aria-controls="form-signup">Sign Up</button>
  </div>

  <!-- Error / success messages -->
  <div class="auth-error" id="auth-error" role="alert" aria-live="assertive"></div>
  <div class="auth-success" id="auth-success" role="status" aria-live="polite"></div>

  <!-- Sign In form -->
  <form class="auth-form" id="form-signin" onsubmit="handleSignIn(event)" role="tabpanel" aria-labelledby="tab-signin">
    <div class="auth-field">
      <label class="auth-label" for="si-email">Email</label>
      <input class="auth-input" id="si-email" type="email" placeholder="you@school.ca" required autocomplete="email">
    </div>
    <div class="auth-field">
      <label class="auth-label" for="si-password">Password</label>
      <input class="auth-input" id="si-password" type="password" placeholder="Password" required autocomplete="current-password">
    </div>
    <button class="auth-submit" type="submit" id="si-submit">Sign In</button>
    <div class="auth-forgot"><a href="#" data-action="forgot-password">Forgot password?</a></div>
  </form>

  <!-- Sign Up form -->
  <form class="auth-form" id="form-signup" hidden onsubmit="handleSignUp(event)" role="tabpanel" aria-labelledby="tab-signup">
    <div class="auth-field">
      <label class="auth-label" for="su-name">Display Name</label>
      <input class="auth-input" id="su-name" type="text" placeholder="Ms. Brown" required autocomplete="name">
    </div>
    <div class="auth-field">
      <label class="auth-label" for="su-email">Email</label>
      <input class="auth-input" id="su-email" type="email" placeholder="you@school.ca" required autocomplete="email">
    </div>
    <div class="auth-field">
      <label class="auth-label" for="su-password">Password</label>
      <input class="auth-input" id="su-password" type="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
    </div>
    <div class="auth-field">
      <label class="auth-label" for="su-confirm">Confirm Password</label>
      <input class="auth-input" id="su-confirm" type="password" placeholder="Confirm password" required minlength="6" autocomplete="new-password">
    </div>
    <button class="auth-submit" type="submit" id="su-submit">Create Account</button>
  </form>
</main>

<script>
window.__ENV = {
  SUPABASE_URL: '__SUPABASE_URL__',
  SUPABASE_KEY: '__SUPABASE_KEY__'
};
</script>
<script src="vendor/supabase.min.js"></script>
<script src="shared/supabase.js"></script>
<script>
/* ── Portal routing ─────────────────────────────────────────────────────────
 * After a successful sign-in, route the user to their interface based on the
 * 'portal' field stored in user_metadata when the account was created.
 *
 * How portals are assigned:
 *   - Teacher accounts: user_metadata.portal = 'teacher' (or absent — defaults to teacher)
 *   - Teacher mobile:   same teacher account, device detection overrides destination
 *   - Student accounts: user_metadata.portal = 'student'  ← set by teacher/admin at invite time
 *   - Parent accounts:  user_metadata.portal = 'parent'   ← set by teacher/admin at invite time
 *
 * To add a new portal: create the directory, add its entry in the switch below,
 * and set the corresponding portal value when creating accounts.
 * ─────────────────────────────────────────────────────────────────────────── */
function portalRedirect(user) {
  const portal = (user && user.user_metadata && user.user_metadata.portal) || 'teacher';
  // Teachers also respect mobile device preference (students/parents get dedicated mobile UI later)
  const preferMobile = portal === 'teacher' && window.innerWidth <= 768 && localStorage.getItem('td-mobile-pref') !== 'desktop';

  switch (portal) {
    case 'student':
      return window.location.href = '/student/';
    case 'parent':
      return window.location.href = '/parent/';
    case 'teacher':
    default:
      return window.location.href = preferMobile ? '/teacher-mobile/' : '/teacher/app.html';
  }
}

/* ── Redirect if already logged in ─────────────────────────── */
(async function() {
  try {
    const sb = getSupabase();
    if (sb) {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        portalRedirect(session.user);
        return;
      }
    }
  } catch(e) { /* not logged in, stay on page */ }
})();

/* ── Tab switching ─────────────────────────────────────────── */
function switchTab(tab) {
  const isSignIn = tab === 'signin';
  document.getElementById('tab-signin').classList.toggle('active', isSignIn);
  document.getElementById('tab-signup').classList.toggle('active', !isSignIn);
  document.getElementById('tab-signin').setAttribute('aria-selected', isSignIn);
  document.getElementById('tab-signup').setAttribute('aria-selected', !isSignIn);
  document.getElementById('form-signin').hidden = !isSignIn;
  document.getElementById('form-signup').hidden = isSignIn;
  hideMessages();
}

function hideMessages() {
  document.getElementById('auth-error').classList.remove('visible');
  document.getElementById('auth-success').classList.remove('visible');
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('visible');
  document.getElementById('auth-success').classList.remove('visible');
}

function showSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.textContent = msg;
  el.classList.add('visible');
  document.getElementById('auth-error').classList.remove('visible');
}

/* ── Sign In ───────────────────────────────────────────────── */
async function handleSignIn(e) {
  e.preventDefault();
  hideMessages();
  const btn = document.getElementById('si-submit');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    const email = document.getElementById('si-email').value.trim();
    const password = document.getElementById('si-password').value;
    const { user } = await signIn(email, password);
    portalRedirect(user);
  } catch(err) {
    showError(err.message || 'Sign in failed. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

/* ── Sign Up ───────────────────────────────────────────────── */
async function handleSignUp(e) {
  e.preventDefault();
  hideMessages();
  const password = document.getElementById('su-password').value;
  const confirm = document.getElementById('su-confirm').value;
  if (password !== confirm) {
    showError('Passwords do not match.');
    return;
  }
  const btn = document.getElementById('su-submit');
  btn.disabled = true;
  btn.textContent = 'Creating account...';
  try {
    const name = document.getElementById('su-name').value.trim();
    const email = document.getElementById('su-email').value.trim();
    await signUp(email, password, name);
    showSuccess('Check your email for a confirmation link.');
    btn.textContent = 'Account Created';
    setTimeout(function() { btn.disabled = false; btn.textContent = 'Create Account'; }, 4000);
  } catch(err) {
    showError(err.message || 'Sign up failed. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

/* ── Delegated click handler ───────────────────────────────── */
document.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  switch (btn.dataset.action) {
    case 'switch-tab':
      switchTab(btn.dataset.tab);
      break;
    case 'forgot-password':
      e.preventDefault();
      handleForgot();
      break;
  }
});

/* ── Forgot password ───────────────────────────────────────── */
async function handleForgot() {
  hideMessages();
  const email = document.getElementById('si-email').value.trim();
  if (!email) {
    showError('Enter your email address first, then click "Forgot password?"');
    return;
  }
  try {
    const sb = getSupabase();
    const { error } = await sb.auth.resetPasswordForEmail(email);
    if (error) throw error;
    showSuccess('Password reset email sent. Check your inbox.');
  } catch(err) {
    showError(err.message || 'Could not send reset email.');
  }
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
