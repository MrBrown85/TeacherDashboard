<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Observations</title>
<link rel="stylesheet" href="gb-styles.css?v=3">
<link rel="stylesheet" href="observations.css">
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>
<div id="dock-mount"></div>
<div class="page-layout" id="page-layout">
  <div id="sidebar-mount"></div>
  <main class="page-main" id="main"></main>
</div>

<script src="vendor/supabase.min.js"></script>
<script src="gb-supabase.js"></script>
<script src="gb-constants.js"></script>
<script src="gb-data.js"></script>
<script src="gb-calc.js"></script>
<script src="gb-ui.js"></script>
<script src="gb-seed-data.js"></script>
<script>
requireAuth();
/* ── State ──────────────────────────────────────────────────── */
var activeCourse = getActiveCourse();
let selectedStudents = [];         // capture bar: multi-student
let filterStudents = [];           // filter strip: multi-student filter
let filterTags = [];               // filter strip: multi-tag filter (dims + cc + custom)
let searchQuery = '';
let activeTags = [];               // capture bar: tags for new observation
let activeSentiment = null;        // capture bar: 'strength'|'growth'|'concern'|null
let activeContext = null;          // capture bar: 'whole-class'|'small-group'|'independent'|'presentation'|'discussion'|null
let filterSentiment = null;        // filter strip: sentiment filter
let _openPopover = null;           // track which popover is open: null | 'students' | 'tags' | 'filterStudents' | 'filterTags'
let _filterStripOpen = false;
let _searchDebounce = null;

const SEARCH_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
const TAG_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`;

const DIM_COLORS = { engagement:'#3b82f6', collaboration:'#22c55e', selfRegulation:'#f59e0b', resilience:'#ef4444', curiosity:'#9333ea', respect:'#059669' };
const CC_COLOR = '#e67700';
const CUSTOM_COLOR = '#8b5cf6';
function tagColor(t) { return t.startsWith('cc:') ? CC_COLOR : t.startsWith('tag:') ? CUSTOM_COLOR : DIM_COLORS[t] || '#999'; }

/* All available tag items for menus */
function buildTagMenuItems() {
  const items = [];
  items.push({ type:'section', label:'Learner Profile' });
  OBS_DIMS.forEach(d => items.push({ key:d, label:OBS_LABELS[d], color:DIM_COLORS[d]||'#999' }));
  items.push({ type:'section', label:'Core Competencies' });
  CORE_COMPETENCIES.forEach(cc => items.push({ key:'cc:'+cc.id, label:cc.label, color:CC_COLOR }));
  const custom = getCustomTags(activeCourse);
  if (custom.length > 0) {
    items.push({ type:'section', label:'Custom Tags' });
    custom.forEach(t => items.push({ key:'tag:'+t, label:t, color:CUSTOM_COLOR }));
  }
  return items;
}

/* ── Cached data ────────────────────────────────────────────── */
let _students = [];
let _studentsById = {};
function refreshStudentCache() {
  _students = sortStudents(getStudents(activeCourse), 'lastName');
  _studentsById = {};
  _students.forEach(s => _studentsById[s.id] = s);
}

/* ── Boot ───────────────────────────────────────────────────── */
(async function() {
  seedIfNeeded();
  await initAllCourses();
  activeCourse = getActiveCourse();
  await initData(activeCourse);
  migrateAllStudents();
  document.getElementById('dock-mount').innerHTML = renderDock('observations');
  document.getElementById('sidebar-mount').innerHTML = renderSidebar(activeCourse);
  initSidebarToggle();
  refreshStudentCache();
  render();
  overrideSidebarLinks();
})();

async function switchCourse(cid) {
  activeCourse = cid; setActiveCourse(cid);
  await initData(cid);
  document.getElementById('sidebar-mount').innerHTML = renderSidebar(cid);
  refreshStudentCache();
  selectedStudents = []; filterStudents = []; filterTags = []; searchQuery = ''; activeTags = [];
  render();
  overrideSidebarLinks();
}

function overrideSidebarLinks() {
  requestAnimationFrame(() => {
    document.querySelectorAll('#gb-roster-list .student-row').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const sid = new URLSearchParams((a.getAttribute('href')||'').split('?')[1]||'').get('id');
        if (sid) {
          selectedStudents = [sid]; filterStudents = [sid];
          if (!_filterStripOpen) _filterStripOpen = true;
          render();
          document.querySelectorAll('.student-row').forEach(r => r.classList.remove('selected'));
          a.classList.add('selected');
        }
      });
    });
  });
}

function activeFilterCount() { return filterStudents.length + filterTags.length + (filterSentiment ? 1 : 0); }

/* ══════════════════════════════════════════════════════════════
   RENDER — full page build (only on boot, course switch, submit)
   ══════════════════════════════════════════════════════════════ */
function render() {
  let btnLabel = 'Select students\u2026';
  if (selectedStudents.length === 1) { const s = _studentsById[selectedStudents[0]]; btnLabel = s ? displayName(s) : btnLabel; }
  else if (selectedStudents.length > 1) btnLabel = selectedStudents.length + ' students';
  const hasSel = selectedStudents.length > 0;

  let h = '';

  // ── Capture bar ──
  h += `<div class="obs-capture" id="obs-capture">
    <div class="obs-capture-row">
      <div class="obs-capture-student">
        <button class="obs-capture-student-btn${hasSel ? ' has-selection' : ''}" data-action="openPopover" data-popover="students" id="student-btn" aria-label="Select student" aria-expanded="false" aria-haspopup="listbox">
          ${esc(btnLabel)} <span class="obs-btn-arrow" aria-hidden="true"></span>
        </button>
        ${renderStudentPopover('student-dropdown', selectedStudents, 'toggleCaptureStudent', 'filterCaptureStudents')}
      </div>
      <div class="obs-tag-trigger-wrap">
        <button class="obs-tag-trigger${(activeTags.length > 0 || activeSentiment || activeContext) ? ' has-tags' : ''}" data-action="openPopover" data-popover="tags" id="tag-btn" aria-label="Select tags" aria-expanded="false" aria-haspopup="true">
          <span class="tag-icon">${TAG_SVG}</span>Tags${(activeTags.length + (activeSentiment?1:0) + (activeContext?1:0)) > 0 ? ` <span class="obs-badge">${activeTags.length + (activeSentiment?1:0) + (activeContext?1:0)}</span>` : ''}
        </button>
        ${renderTagPopoverWithEnrichments('tag-dropdown', activeTags, 'toggleCaptureTag')}
      </div>
      <textarea class="obs-capture-input" id="capture-input" rows="2"
        placeholder="What did you notice?" autocomplete="off" aria-label="Observation note"
        onkeydown="if(event.metaKey&&event.key==='Enter'){event.preventDefault();submitOb()}"></textarea>
      <button class="obs-capture-add" id="capture-add-btn" data-action="submitOb" ${!hasSel ? 'disabled' : ''} aria-label="Add observation">+ Add</button>
    </div>
    ${renderCaptureSecondary()}
  </div>`;

  // ── Toolbar ──
  const afc = activeFilterCount();
  const allObs = getAllQuickObs(activeCourse);
  const filtered = applyFilters(allObs);

  h += `<div class="obs-toolbar" id="obs-toolbar">
    <button class="obs-filter-trigger${afc > 0 ? ' has-filters' : ''}" data-action="toggleFilterStrip" id="filter-trigger-btn" aria-expanded="${_filterStripOpen}" aria-label="Toggle filters${afc > 0 ? ', '+afc+' active' : ''}">
      <span class="filter-icon" aria-hidden="true">☰</span> Filters${afc > 0 ? ` <span class="obs-badge">${afc}</span>` : ''}
    </button>
    <div class="obs-search-wrap">
      <span class="obs-search-icon">${SEARCH_SVG}</span>
      <input class="obs-search-input" type="text" placeholder="Search\u2026" id="obs-search-input" value="${esc(searchQuery)}" aria-label="Search observations">
    </div>
    <span class="obs-toolbar-count" id="obs-count">${filtered.length}${filtered.length !== allObs.length ? ' of ' + allObs.length : ''} observations</span>
  </div>`;

  // ── Filter strip ──
  h += `<div class="obs-filter-strip${_filterStripOpen ? ' open' : ''}" id="obs-filter-strip">
    <span class="obs-filter-strip-label">Student</span>
    <div class="obs-strip-popover-wrap">
      <button class="obs-strip-trigger${filterStudents.length > 0 ? ' active' : ''}" data-action="openPopover" data-popover="filterStudents" id="filter-student-btn">
        ${filterStudents.length === 0 ? 'All Students' : filterStudents.length === 1 ? esc(_studentsById[filterStudents[0]] ? displayName(_studentsById[filterStudents[0]]) : '1 student') : filterStudents.length + ' students'}
        <span class="obs-btn-arrow"></span>
      </button>
      ${renderStudentPopover('filter-student-dropdown', filterStudents, 'toggleFilterStudent', 'filterFilterStudents')}
    </div>
    <div class="obs-filter-strip-divider"></div>
    <span class="obs-filter-strip-label">Tags</span>
    <div class="obs-strip-popover-wrap">
      <button class="obs-strip-trigger${filterTags.length > 0 ? ' active' : ''}" data-action="openPopover" data-popover="filterTags" id="filter-tag-btn">
        ${filterTags.length === 0 ? 'All Tags' : filterTags.length + ' tag' + (filterTags.length > 1 ? 's' : '')}
        <span class="obs-btn-arrow"></span>
      </button>
      ${renderTagPopover('filter-tag-dropdown', filterTags, 'toggleFilterTag')}
    </div>
    <div class="obs-filter-strip-divider"></div>
    <span class="obs-filter-strip-label">Sentiment</span>
    <div style="display:flex;gap:4px">
      ${Object.entries(OBS_SENTIMENTS).map(([key, s]) => `<button class="obs-sentiment-pill${filterSentiment === key ? ' active' : ''}" style="${filterSentiment === key ? 'background:' + s.tint + ';border-color:' + s.border + ';color:' + s.border : ''}" data-action="setFilterSentiment" data-sentiment="${key}">${s.icon} ${s.label}</button>`).join('')}
    </div>
    ${afc > 0 ? renderFilterPills() : ''}
    ${afc > 0 ? '<button class="obs-filter-clear" data-action="clearAllFilters">Clear all</button>' : ''}
  </div>`;

  // ── Feed ──
  h += `<div class="obs-feed" id="obs-feed">${renderFeedHtml(filtered)}</div>`;

  document.getElementById('main').innerHTML = h;
  wireSearch();
  updateAddBtn();
}

/* ── Reusable popover builders ─────────────────────────────── */
function renderStudentPopover(id, selectedArr, toggleFn, filterFn) {
  let h = `<div class="obs-popover" id="${id}" style="width:240px;max-height:340px" data-filter-fn="${filterFn}">
    <input class="obs-popover-search" type="text" placeholder="Search\u2026" oninput="${filterFn}(this.value)" autocomplete="off">
    <div class="obs-popover-list">`;
  _students.forEach(s => {
    const isSel = selectedArr.includes(s.id);
    h += `<div class="obs-popover-item${isSel ? ' selected' : ''}" data-sid="${s.id}" data-action="popoverToggle" data-toggle-fn="${toggleFn}" data-value="${s.id}">
      <span class="obs-popover-check">${isSel ? '✓' : ''}</span>${esc(displayName(s))}</div>`;
  });
  h += `</div></div>`;
  return h;
}

function renderTagPopoverWithEnrichments(id, selectedArr, toggleFn) {
  const items = buildTagMenuItems();
  let h = `<div class="obs-popover" id="${id}" style="width:280px">
    <input class="obs-popover-search" type="text" placeholder="Search tags\u2026" oninput="filterTagPopover('${id}',this.value)" autocomplete="off">
    <div class="obs-popover-list">`;

  // Sentiment section
  h += `<div class="obs-popover-section" data-section>Type</div>`;
  Object.entries(OBS_SENTIMENTS).forEach(([key, s]) => {
    const active = activeSentiment === key;
    h += `<div class="obs-popover-item${active ? ' selected' : ''}" data-tag="${key}" data-action="toggleSentiment" data-value="${key}">
      <span class="obs-popover-check">${active ? '✓' : ''}</span>
      <span style="font-size:var(--text-sm)">${s.icon}</span>${s.label}</div>`;
  });

  // Context section
  h += `<div class="obs-popover-section" data-section>Context</div>`;
  Object.entries(OBS_CONTEXTS).forEach(([key, c]) => {
    const active = activeContext === key;
    h += `<div class="obs-popover-item${active ? ' selected' : ''}" data-tag="${key}" data-action="toggleContext" data-value="${key}">
      <span class="obs-popover-check">${active ? '✓' : ''}</span>
      <span style="font-size:var(--text-sm)">${c.icon}</span>${c.label}</div>`;
  });

  // Learning standard tags
  items.forEach(item => {
    if (item.type === 'section') {
      h += `<div class="obs-popover-section" data-section>${esc(item.label)}</div>`;
    } else {
      const isSel = selectedArr.includes(item.key);
      h += `<div class="obs-popover-item${isSel ? ' selected' : ''}" data-tag="${esc(item.key)}" data-action="popoverToggle" data-toggle-fn="${toggleFn}" data-value="${esc(item.key)}">
        <span class="obs-popover-check">${isSel ? '✓' : ''}</span>
        <span class="obs-tag-dot" style="background:${item.color}"></span>${esc(item.label)}</div>`;
    }
  });
  h += `</div>`;
  h += `<div class="obs-popover-add-row">
    <input class="obs-popover-add-input" id="custom-tag-input" type="text" placeholder="New custom tag\u2026"
      onkeydown="if(event.key==='Enter'){event.preventDefault();addNewCustomTag()}">
    <button class="obs-popover-add-btn" data-action="addNewCustomTag">+ Add</button>
  </div>`;
  h += `</div>`;
  return h;
}

function renderTagPopover(id, selectedArr, toggleFn) {
  const items = buildTagMenuItems();
  let h = `<div class="obs-popover right-align" id="${id}" style="width:260px">
    <input class="obs-popover-search" type="text" placeholder="Search tags\u2026" oninput="filterTagPopover('${id}',this.value)" autocomplete="off">
    <div class="obs-popover-list">`;
  items.forEach(item => {
    if (item.type === 'section') {
      h += `<div class="obs-popover-section" data-section>${esc(item.label)}</div>`;
    } else {
      const isSel = selectedArr.includes(item.key);
      h += `<div class="obs-popover-item${isSel ? ' selected' : ''}" data-tag="${esc(item.key)}" data-action="popoverToggle" data-toggle-fn="${toggleFn}" data-value="${esc(item.key)}">
        <span class="obs-popover-check">${isSel ? '✓' : ''}</span>
        <span class="obs-tag-dot" style="background:${item.color}"></span>${esc(item.label)}</div>`;
    }
  });
  h += `</div>`;
  h += `</div>`;
  return h;
}

function renderCaptureSecondary() {
  const hasTokens = selectedStudents.length > 1 || activeTags.length > 0;
  let h = '<div class="obs-capture-secondary">';

  // Student tokens + tag pills (existing)
  if (hasTokens) {
    h += '<div class="obs-capture-tokens">';
    if (selectedStudents.length > 1) {
      selectedStudents.forEach(sid => {
        const s = _studentsById[sid]; if (!s) return;
        h += `<span class="obs-token">${esc(displayNameFirst(s))}<span class="obs-token-x" data-action="removeCaptureStudent" data-sid="${sid}">&times;</span></span>`;
      });
    }
    activeTags.forEach(t => {
      const info = resolveTag(t);
      h += `<span class="obs-tag-pill"><span class="pill-dot" style="background:${tagColor(t)}"></span>${esc(info.label)}<span class="obs-tag-pill-x" data-action="removeCaptureTag" data-value="${esc(t)}">&times;</span></span>`;
    });
    h += '</div>';
  }

  h += '</div>';
  return h;
}

function renderFilterPills() {
  let h = '<div class="obs-filter-pills" id="filter-pills">';
  filterStudents.forEach(sid => {
    const s = _studentsById[sid]; if (!s) return;
    h += `<span class="obs-filter-pill" data-action="removeFilterStudent" data-sid="${sid}">
      ${esc(displayNameFirst(s))}<span class="obs-filter-pill-x">&times;</span></span>`;
  });
  filterTags.forEach(t => {
    const info = resolveTag(t);
    h += `<span class="obs-filter-pill" data-action="removeFilterTag" data-value="${esc(t)}">
      <span class="pill-dot" style="background:${tagColor(t)}"></span>${esc(info.label)}<span class="obs-filter-pill-x">&times;</span></span>`;
  });
  h += '</div>';
  return h;
}

/* ══════════════════════════════════════════════════════════════
   PARTIAL UPDATES — no full re-render for filter changes
   ══════════════════════════════════════════════════════════════ */
function refreshFeedAndCount() {
  const allObs = getAllQuickObs(activeCourse);
  const filtered = applyFilters(allObs);
  const feedEl = document.getElementById('obs-feed');
  if (feedEl) feedEl.innerHTML = renderFeedHtml(filtered);
  const countEl = document.getElementById('obs-count');
  if (countEl) countEl.textContent = filtered.length + (filtered.length !== allObs.length ? ' of ' + allObs.length : '') + ' observations';
  // Update toolbar badge
  const afc = activeFilterCount();
  const trigBtn = document.getElementById('filter-trigger-btn');
  if (trigBtn) {
    trigBtn.classList.toggle('has-filters', afc > 0);
    trigBtn.innerHTML = `<span class="filter-icon">☰</span> Filters${afc > 0 ? ` <span class="obs-badge">${afc}</span>` : ''}`;
  }
}

function refreshFilterStrip() {
  const afc = activeFilterCount();
  // Update student button
  const sb = document.getElementById('filter-student-btn');
  if (sb) {
    sb.classList.toggle('active', filterStudents.length > 0);
    sb.innerHTML = (filterStudents.length === 0 ? 'All Students' : filterStudents.length === 1 ?
      esc(_studentsById[filterStudents[0]] ? displayName(_studentsById[filterStudents[0]]) : '1 student') :
      filterStudents.length + ' students') + ' <span class="obs-btn-arrow"></span>';
  }
  // Update tag button
  const tb = document.getElementById('filter-tag-btn');
  if (tb) {
    tb.classList.toggle('active', filterTags.length > 0);
    tb.innerHTML = (filterTags.length === 0 ? 'All Tags' : filterTags.length + ' tag' + (filterTags.length > 1 ? 's' : '')) + ' <span class="obs-btn-arrow"></span>';
  }
  // Update pills + clear
  const strip = document.getElementById('obs-filter-strip');
  if (strip) {
    const oldPills = document.getElementById('filter-pills');
    const oldClear = strip.querySelector('.obs-filter-clear');
    if (oldPills) oldPills.remove();
    if (oldClear) oldClear.remove();
    if (afc > 0) {
      strip.insertAdjacentHTML('beforeend', renderFilterPills());
      strip.insertAdjacentHTML('beforeend', '<button class="obs-filter-clear" data-action="clearAllFilters">Clear all</button>');
    }
  }
}

/* ── Apply filters ──────────────────────────────────────────── */
function applyFilters(allObs) {
  let f = allObs;
  if (filterStudents.length > 0) f = f.filter(o => filterStudents.includes(o.studentId));
  if (filterTags.length > 0) f = f.filter(o => filterTags.some(t => (o.dims||[]).includes(t)));
  if (filterSentiment) f = f.filter(o => o.sentiment === filterSentiment);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    f = f.filter(o => {
      const sn = _studentsById[o.studentId] ? displayName(_studentsById[o.studentId]) : '';
      return o.text.toLowerCase().includes(q) || sn.toLowerCase().includes(q);
    });
  }
  return f;
}

/* ── Feed HTML ──────────────────────────────────────────────── */
function renderFeedHtml(filtered) {
  if (filtered.length === 0) {
    const n = getAllQuickObs(activeCourse).length;
    return `<div class="obs-empty"><div class="obs-empty-icon">👁</div>
      <div class="obs-empty-title">${n === 0 ? 'No observations yet' : 'No matching observations'}</div>
      <div class="obs-empty-sub">${n === 0 ? 'Select a student and capture what you notice' : 'Try adjusting your filters'}</div></div>`;
  }
  const groups = {};
  filtered.forEach(ob => { const d = ob.date || ob.created.slice(0,10); (groups[d] = groups[d]||[]).push(ob); });
  const today = getTodayStr();
  const yd = (() => { const d = new Date(); d.setDate(d.getDate()-1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();
  let out = '';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(ds => {
    let lbl = ds === today ? 'Today' : ds === yd ? 'Yesterday' : new Date(ds+'T12:00:00').toLocaleDateString('en-CA',{weekday:'long',month:'short',day:'numeric'});
    out += `<div class="obs-feed-date-group"><div class="obs-feed-date-label">${lbl}</div>`;
    groups[ds].forEach(ob => {
      const s = _studentsById[ob.studentId];
      const sn = s ? displayName(s) : ob.studentId;
      const tm = new Date(ob.created).toLocaleTimeString('en-CA',{hour:'numeric',minute:'2-digit'});
      const ft = (ob.dims&&ob.dims[0]) || null;
      const sent = ob.sentiment && OBS_SENTIMENTS[ob.sentiment];
      const bc = sent ? sent.border : (ft ? tagColor(ft) : 'var(--border)');
      out += `<div class="obs-card" style="border-left-color:${bc}${sent ? ';background:' + sent.tint : ''}">
        <div class="obs-card-header"><span>${sent ? `<span class="obs-card-sentiment">${sent.icon}</span>` : ''}<span class="obs-card-student">${esc(sn)}</span><span class="obs-card-time">${tm}</span>${ob.context && OBS_CONTEXTS[ob.context] ? `<span class="obs-card-context">${OBS_CONTEXTS[ob.context].icon} ${OBS_CONTEXTS[ob.context].label}</span>` : ''}</span>
        <button class="obs-card-delete" data-action="deleteOb" data-sid="${ob.studentId}" data-obid="${ob.id}" data-stop-prop="true" title="Delete">🗑</button></div>
        <div class="obs-card-text">${esc(ob.text)}</div>`;
      if (ob.dims && ob.dims.length > 0) {
        out += '<div class="obs-card-dims">';
        ob.dims.forEach(t => { const info = resolveTag(t); out += `<span class="obs-card-dim"><span class="dim-dot" style="background:${tagColor(t)}"></span>${esc(info.label)}</span>`; });
        out += '</div>';
      }
      out += '</div>';
    });
    out += '</div>';
  });
  return out;
}

/* ══════════════════════════════════════════════════════════════
   POPOVER MANAGEMENT — single open at a time, no re-render
   ══════════════════════════════════════════════════════════════ */
const POPOVER_IDS = { students:'student-dropdown', tags:'tag-dropdown', filterStudents:'filter-student-dropdown', filterTags:'filter-tag-dropdown' };
function openPopover(name) {
  if (_openPopover === name) { closeAllPopovers(); return; }
  closeAllPopovers();
  _openPopover = name;
  const el = document.getElementById(POPOVER_IDS[name]);
  if (el) { el.classList.add('open'); const s = el.querySelector('.obs-popover-search'); if (s) { s.value = ''; s.focus(); } }
}
function closeAllPopovers() {
  _openPopover = null;
  Object.values(POPOVER_IDS).forEach(id => { const el = document.getElementById(id); if (el) el.classList.remove('open'); });
}

/* ── Capture bar: students ─────────────────────────────────── */
function toggleCaptureStudent(sid) {
  const idx = selectedStudents.indexOf(sid);
  if (idx >= 0) selectedStudents.splice(idx,1); else selectedStudents.push(sid);
  syncPopoverChecks('student-dropdown', selectedStudents, 'data-sid');
  updateCaptureStudentBtn();
  updateCaptureSecondary();
  updateAddBtn();
}
function removeCaptureStudent(sid) { selectedStudents = selectedStudents.filter(s=>s!==sid); updateCaptureStudentBtn(); updateCaptureSecondary(); updateAddBtn(); }
function updateCaptureStudentBtn() {
  const btn = document.getElementById('student-btn'); if (!btn) return;
  let label = 'Select students\u2026';
  if (selectedStudents.length === 1) { const s = _studentsById[selectedStudents[0]]; label = s ? displayName(s) : label; }
  else if (selectedStudents.length > 1) label = selectedStudents.length + ' students';
  btn.innerHTML = esc(label) + ' <span class="obs-btn-arrow"></span>';
  btn.classList.toggle('has-selection', selectedStudents.length > 0);
}
function filterCaptureStudents(q) { filterPopoverItems('student-dropdown', q); }

/* ── Capture bar: tags ─────────────────────────────────────── */
function toggleCaptureTag(key) {
  const idx = activeTags.indexOf(key);
  if (idx >= 0) activeTags.splice(idx,1); else activeTags.push(key);
  syncPopoverChecks('tag-dropdown', activeTags, 'data-tag');
  const btn = document.getElementById('tag-btn');
  const totalCount = activeTags.length + (activeSentiment ? 1 : 0) + (activeContext ? 1 : 0);
  if (btn) { btn.classList.toggle('has-tags', totalCount > 0); btn.innerHTML = `<span class="tag-icon">${TAG_SVG}</span>Tags${totalCount > 0 ? ` <span class="obs-badge">${totalCount}</span>` : ''}`; }
  updateCaptureSecondary();
}
function removeCaptureTag(key) { activeTags = activeTags.filter(t=>t!==key); updateCaptureSecondary();
  const btn = document.getElementById('tag-btn');
  const totalCount = activeTags.length + (activeSentiment ? 1 : 0) + (activeContext ? 1 : 0);
  if (btn) { btn.classList.toggle('has-tags', totalCount > 0); btn.innerHTML = `<span class="tag-icon">${TAG_SVG}</span>Tags${totalCount > 0 ? ` <span class="obs-badge">${totalCount}</span>` : ''}`; }
}
function updateCaptureSecondary() {
  const cap = document.getElementById('obs-capture'); if (!cap) return;
  let sec = cap.querySelector('.obs-capture-secondary');
  const html = renderCaptureSecondary();
  if (sec) sec.outerHTML = html;
  else cap.querySelector('.obs-capture-row').insertAdjacentHTML('afterend', html);
}

/* ── Filter strip: students ────────────────────────────────── */
function toggleFilterStudent(sid) {
  const idx = filterStudents.indexOf(sid);
  if (idx >= 0) filterStudents.splice(idx,1); else filterStudents.push(sid);
  syncPopoverChecks('filter-student-dropdown', filterStudents, 'data-sid');
  refreshFilterStrip();
  refreshFeedAndCount();
}
function removeFilterStudent(sid) { filterStudents = filterStudents.filter(s=>s!==sid); refreshFilterStrip(); refreshFeedAndCount(); }
function filterFilterStudents(q) { filterPopoverItems('filter-student-dropdown', q); }

/* ── Filter strip: tags ────────────────────────────────────── */
function toggleFilterTag(key) {
  const idx = filterTags.indexOf(key);
  if (idx >= 0) filterTags.splice(idx,1); else filterTags.push(key);
  syncPopoverChecks('filter-tag-dropdown', filterTags, 'data-tag');
  refreshFilterStrip();
  refreshFeedAndCount();
}
function removeFilterTag(key) { filterTags = filterTags.filter(t=>t!==key); refreshFilterStrip(); refreshFeedAndCount(); }

/* ── Shared popover helpers ────────────────────────────────── */
function syncPopoverChecks(popoverId, selectedArr, attrName) {
  document.querySelectorAll(`#${popoverId} .obs-popover-item`).forEach(el => {
    const val = el.getAttribute(attrName);
    const isSel = selectedArr.includes(val);
    el.classList.toggle('selected', isSel);
    const chk = el.querySelector('.obs-popover-check');
    if (chk) chk.textContent = isSel ? '✓' : '';
  });
}
function filterPopoverItems(popoverId, q) {
  const lower = q.toLowerCase();
  document.querySelectorAll(`#${popoverId} .obs-popover-item`).forEach(el => {
    el.style.display = (!lower || el.textContent.toLowerCase().includes(lower)) ? '' : 'none';
  });
  // Also hide section headers if all items below hidden
  document.querySelectorAll(`#${popoverId} .obs-popover-section`).forEach(sec => {
    let next = sec.nextElementSibling;
    let anyVisible = false;
    while (next && !next.classList.contains('obs-popover-section')) {
      if (next.classList.contains('obs-popover-item') && next.style.display !== 'none') anyVisible = true;
      next = next.nextElementSibling;
    }
    sec.style.display = (!lower || anyVisible) ? '' : 'none';
  });
}
function filterTagPopover(id, q) { filterPopoverItems(id, q); }

/* ── Other actions ─────────────────────────────────────────── */
function toggleFilterStrip() {
  _filterStripOpen = !_filterStripOpen;
  const strip = document.getElementById('obs-filter-strip');
  if (strip) strip.classList.toggle('open', _filterStripOpen);
}

function clearAllFilters() {
  filterStudents = []; filterTags = []; filterSentiment = null; searchQuery = '';
  const searchEl = document.getElementById('obs-search-input');
  if (searchEl) searchEl.value = '';
  document.querySelectorAll('.student-row').forEach(r => r.classList.remove('selected'));
  refreshFilterStrip();
  refreshFeedAndCount();
}

function submitOb() {
  const input = document.getElementById('capture-input');
  if (!input || selectedStudents.length === 0) return;
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  selectedStudents.forEach(sid => addQuickOb(activeCourse, sid, text, [...activeTags], activeSentiment, activeContext));
  input.value = ''; activeTags = []; activeSentiment = null; activeContext = null;
  render();
  requestAnimationFrame(() => { const inp = document.getElementById('capture-input'); if (inp) inp.focus(); });
}

function toggleSentiment(val) {
  activeSentiment = activeSentiment === val ? null : val;
  const wasOpen = _openPopover;
  const captureVal = document.getElementById('capture-input')?.value || '';
  render();
  const inp2 = document.getElementById('capture-input');
  if (inp2 && captureVal) { inp2.value = captureVal; }
  if (wasOpen === 'tags') requestAnimationFrame(() => openPopover('tags'));
  else requestAnimationFrame(() => { const inp = document.getElementById('capture-input'); if (inp) inp.focus(); });
}

function toggleContext(val) {
  activeContext = activeContext === val ? null : val;
  const wasOpen = _openPopover;
  const captureVal = document.getElementById('capture-input')?.value || '';
  render();
  const inp2 = document.getElementById('capture-input');
  if (inp2 && captureVal) { inp2.value = captureVal; }
  if (wasOpen === 'tags') requestAnimationFrame(() => openPopover('tags'));
  else requestAnimationFrame(() => { const inp = document.getElementById('capture-input'); if (inp) inp.focus(); });
}

function setFilterSentiment(val) {
  filterSentiment = filterSentiment === val ? null : val;
  const captureVal = document.getElementById('capture-input')?.value || '';
  render();
  const inp = document.getElementById('capture-input');
  if (inp && captureVal) { inp.value = captureVal; }
}

function updateAddBtn() {
  const btn = document.getElementById('capture-add-btn');
  const input = document.getElementById('capture-input');
  if (btn && input) btn.disabled = selectedStudents.length === 0 || !input.value.trim();
}

function addNewCustomTag() {
  const input = document.getElementById('custom-tag-input'); if (!input) return;
  const label = input.value.trim(); if (!label) return;
  addCustomTag(activeCourse, label);
  const key = 'tag:' + label;
  if (!activeTags.includes(key)) activeTags.push(key);
  render();
  requestAnimationFrame(() => openPopover('tags'));
}

function wireSearch() {
  const el = document.getElementById('obs-search-input');
  if (el) el.addEventListener('input', (e) => {
    clearTimeout(_searchDebounce);
    const val = e.target.value;
    _searchDebounce = setTimeout(() => { searchQuery = val; refreshFeedAndCount(); }, 120);
  });
}

const _deleteTimers = {};
function deleteOb(sid, obId, btn) {
  const key = sid+'-'+obId;
  if (!btn.classList.contains('confirming')) {
    btn.classList.add('confirming'); btn.textContent = 'Delete?';
    _deleteTimers[key] = setTimeout(() => { btn.classList.remove('confirming'); btn.textContent = '🗑'; }, 3000);
  } else { clearTimeout(_deleteTimers[key]); deleteQuickOb(activeCourse, sid, obId); refreshFeedAndCount(); }
}

/* ── Global click-away ─────────────────────────────────────── */
document.addEventListener('mousedown', (e) => {
  if (_openPopover && !e.target.closest('.obs-popover') && !e.target.closest('.obs-capture-student-btn')
      && !e.target.closest('.obs-tag-trigger') && !e.target.closest('.obs-strip-trigger')) {
    closeAllPopovers();
  }
});
document.addEventListener('input', (e) => { if (e.target.id === 'capture-input') updateAddBtn(); });

/* ── Delegated click handler ──────────────────────────────── */
document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;
  if (el.dataset.stopProp === 'true') e.stopPropagation();
  var handlers = {
    'openPopover':        function() { openPopover(el.dataset.popover); },
    'submitOb':           function() { submitOb(); },
    'toggleFilterStrip':  function() { toggleFilterStrip(); },
    'setFilterSentiment': function() { setFilterSentiment(el.dataset.sentiment); },
    'clearAllFilters':    function() { clearAllFilters(); },
    'addNewCustomTag':    function() { addNewCustomTag(); },
    'removeCaptureStudent': function() { removeCaptureStudent(el.dataset.sid); },
    'removeCaptureTag':   function() { removeCaptureTag(el.dataset.value); },
    'removeFilterStudent': function() { removeFilterStudent(el.dataset.sid); },
    'removeFilterTag':    function() { removeFilterTag(el.dataset.value); },
    'toggleSentiment':    function() { toggleSentiment(el.dataset.value); },
    'toggleContext':      function() { toggleContext(el.dataset.value); },
    'deleteOb':           function() { deleteOb(el.dataset.sid, el.dataset.obid, el); },
    'popoverToggle':      function() {
      var fn = window[el.dataset.toggleFn];
      if (fn) fn(el.dataset.value);
    }
  };
  if (handlers[action]) {
    e.preventDefault();
    handlers[action]();
  }
});
</script>
